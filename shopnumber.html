<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СМСКИВИ — Виртуальные номера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        .kiwi-btn { background: #ff8c00; transition: 0.3s; }
        .kiwi-btn:hover { background: #e67e00; transform: scale(1.02); }
        .card { background: #1a1a1a; border: 1px solid #333; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

<div class="max-w-md mx-auto">
    <!-- Шапка -->
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black italic text-orange-500 uppercase">СМСКИВИ</h1>
        <div id="balance-tag" class="bg-zinc-800 px-4 py-1 rounded-full text-sm font-bold hidden">
            <span id="user-balance">0</span> ₽
        </div>
    </header>

    <!-- Вход через данные банка -->
    <div id="auth-section" class="card p-6 rounded-2xl">
        <h2 class="text-xl font-bold mb-4">Вход через KiwiBank</h2>
        <input id="auth-code" type="text" placeholder="Код входа (3 цифры)" class="w-full p-3 rounded-lg bg-black border border-zinc-700 mb-3">
        <input id="auth-pin" type="password" placeholder="Пин-код банка" class="w-full p-3 rounded-lg bg-black border border-zinc-700 mb-4">
        <button onclick="linkBank()" class="w-full kiwi-btn py-3 rounded-lg font-bold uppercase">Авторизоваться</button>
    </div>

    <!-- Маркет номеров -->
    <div id="market-section" class="hidden">
        <h2 class="text-lg font-bold mb-4 text-zinc-400 uppercase tracking-widest">Доступные номера</h2>
        <div class="space-y-3">
            <!-- Номер 1 -->
            <div class="card p-4 rounded-xl flex justify-between items-center">
                <div>
                    <p class="font-bold">🇷🇺 Россия (VK/TG)</p>
                    <p class="text-xs text-zinc-500">Цена: 150 ₽</p>
                </div>
                <button onclick="buyNumber('Russia', 150)" class="kiwi-btn px-4 py-2 rounded-lg text-xs font-bold uppercase">Купить</button>
            </div>
            <!-- Номер 2 -->
            <div class="card p-4 rounded-xl flex justify-between items-center">
                <div>
                    <p class="font-bold">🇺🇸 США (WhatsApp)</p>
                    <p class="text-xs text-zinc-500">Цена: 300 ₽</p>
                </div>
                <button onclick="buyNumber('USA', 300)" class="kiwi-btn px-4 py-2 rounded-lg text-xs font-bold uppercase">Купить</button>
            </div>
        </div>

        <!-- Мои купленные номера -->
        <h2 class="text-lg font-bold mt-8 mb-4 text-zinc-400 uppercase tracking-widest">Мои номера</h2>
        <div id="my-numbers" class="space-y-3">
            <p class="text-zinc-600 text-sm italic">Вы еще не купили ни одного номера</p>
        </div>
    </div>
</div>

<script>
const DB_ID = 'bank_db';
const COLL_USERS = 'users';
const COLL_PURCHASED = 'purchased_numbers';

const { Client, Databases, ID, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

let currentUser = null;

// Авторизация через данные банка
async function linkBank() {
    const code = document.getElementById('auth-code').value;
    const pin = document.getElementById('auth-pin').value;

    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('personalCode', code),
            Query.equal('pin', pin)
        ]);

        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('market-section').classList.remove('hidden');
            document.getElementById('balance-tag').classList.remove('hidden');
            updateUI();
            loadMyNumbers();
        } else {
            alert("Пользователь не найден в базе KiwiBank");
        }
    } catch (e) { alert("Ошибка подключения к банку"); }
}

function updateUI() {
    document.getElementById('user-balance').innerText = currentUser.balance;
}

// Покупка номера
async function buyNumber(country, price) {
    if (currentUser.balance < price) return alert("Недостаточно денег на счету KiwiBank!");

    const confirmBuy = confirm(`Купить номер (${country}) за ${price} ₽?`);
    if (!confirmBuy) return;

    try {
        const newNumber = "+79" + Math.floor(Math.random() * 900000000 + 100000000);
        const smsCode = Math.floor(100000 + Math.random() * 899999).toString(); // Тот самый 6-значный код

        // 1. Списываем деньги в банке
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, {
            balance: currentUser.balance - price
        });

        // 2. Добавляем номер в таблицу купленных
        await databases.createDocument(DB_ID, COLL_PURCHASED, ID.unique(), {
            ownerId: currentUser.$id,
            number: newNumber,
            country: country,
            code: smsCode
        });

        alert("Покупка успешна! Номер добавлен в ваш список.");
        currentUser.balance -= price;
        updateUI();
        loadMyNumbers();
    } catch (e) { alert("Ошибка транзакции"); }
}

// Загрузка купленных номеров
async function loadMyNumbers() {
    const list = document.getElementById('my-numbers');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_PURCHASED, [
            Query.equal('ownerId', currentUser.$id)
        ]);

        if (res.documents.length === 0) return;

        list.innerHTML = res.documents.reverse().map(item => `
            <div class="card p-4 rounded-xl border-l-4 border-orange-500">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs text-zinc-500 uppercase font-bold">${item.country}</p>
                        <p class="text-lg font-mono text-orange-400">${item.number}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-zinc-500 uppercase">Код из СМС</p>
                        <p class="text-xl font-black tracking-widest text-white">${item.code}</p>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) { console.error(e); }
}
</script>
</body>
</html>
