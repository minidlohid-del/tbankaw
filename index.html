<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Elite Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .t-gold-card { 
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); 
            border: 1px solid rgba(255, 215, 0, 0.2); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .t-yellow-btn { 
            background: #ffdd2d; 
            box-shadow: 0 4px 15px rgba(255, 221, 45, 0.3); 
        }
        .hidden { display: none !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; }
        input:focus { border-color: #ffdd2d !important; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto h-screen flex flex-col">
        <!-- ЭКРАН ВХОДА / РЕГИСТРАЦИИ -->
        <div id="auth-screen" class="flex-1 flex flex-col justify-center px-8">
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-yellow-400 rounded-2xl mb-4 shadow-lg shadow-yellow-400/20">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter text-yellow-400 uppercase">T-Bank Cloud</h1>
                <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">Elite Gold Edition V3</p>
            </div>

            <div id="login-form" class="space-y-4">
                <input id="login-code" type="text" placeholder="ЛИЧНЫЙ КОД" class="w-full bg-zinc-900/50 p-4 rounded-2xl text-center font-bold tracking-widest text-white">
                <input id="login-pin" type="password" placeholder="ПИН-КОД" class="w-full bg-zinc-900/50 p-4 rounded-2xl text-center font-bold tracking-widest text-white">
                <button onclick="login()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider transition-transform active:scale-95">Войти в систему</button>
                <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer hover:text-yellow-400 transition-colors" onclick="toggleForms()">Нет счета? Создать аккаунт</p>
            </div>

            <div id="register-form" class="hidden space-y-4">
                <input id="reg-name" type="text" placeholder="ИМЯ И ФАМИЛИЯ" class="w-full bg-zinc-900/50 p-4 rounded-2xl text-white font-bold">
                <input id="reg-pin" type="password" placeholder="ПРИДУМАЙТЕ ПИН (4 ЦИФРЫ)" maxlength="4" class="w-full bg-zinc-900/50 p-4 rounded-2xl text-center font-bold tracking-widest text-white">
                <button onclick="register()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider transition-transform active:scale-95">Открыть золотой счет</button>
                <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer hover:text-yellow-400 transition-colors" onclick="toggleForms()">Уже есть счет? Авторизация</p>
            </div>
        </div>

        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="main-screen" class="hidden flex-1 flex flex-col p-6">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-yellow-400/30">
                        <span id="user-initials" class="text-yellow-400 font-bold text-sm"></span>
                    </div>
                    <span id="user-name-top" class="font-bold text-sm tracking-tight text-zinc-200"></span>
                </div>
                <button onclick="location.reload()" class="bg-zinc-900 p-2 rounded-xl border border-white/5 hover:bg-zinc-800">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </header>

            <div class="t-gold-card p-8 rounded-[32px] relative overflow-hidden mb-8">
                <div class="absolute top-0 right-0 p-6 opacity-20">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="gold" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12"/></svg>
                </div>
                <p class="text-yellow-400/50 text-[10px] font-black uppercase tracking-widest mb-2 italic">Доступный остаток</p>
                <h2 id="balance-disp" class="text-4xl font-black italic tracking-tighter mb-10 text-white">0 ₽</h2>
                <div class="flex justify-between items-end">
                    <p id="card-disp" class="font-mono text-sm tracking-[0.2em] text-zinc-400 italic">**** **** **** ****</p>
                    <span class="text-yellow-400 font-black italic text-xs tracking-tighter">GOLD</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="bg-zinc-900 border border-white/5 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-yellow-400/30 transition-colors">
                    <div class="w-10 h-10 bg-yellow-400/10 rounded-full flex items-center justify-center text-yellow-400">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                    </div>
                    <span class="text-[10px] font-bold uppercase text-zinc-400">Пополнить</span>
                </button>
                <button class="bg-zinc-900 border border-white/5 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-yellow-400/30 transition-colors">
                    <div class="w-10 h-10 bg-yellow-400/10 rounded-full flex items-center justify-center text-yellow-400">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 7l-10 10M7 7h10v10"/></svg>
                    </div>
                    <span class="text-[10px] font-bold uppercase text-zinc-400">Перевод</span>
                </button>
            </div>

            <h3 class="text-xs font-black uppercase tracking-widest text-zinc-600 mb-4 px-2 italic">История транзакций</h3>
            <div id="history-list" class="flex-1 overflow-y-auto space-y-3 pr-1">
                <div class="text-center py-10 opacity-20 text-xs italic uppercase tracking-widest">Нет операций</div>
            </div>
        </div>
    </div>

<script>
const { Client, Databases, ID, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

const DB_ID = 'bank_db';
const COLL_ID = 'users';

function toggleForms() {
    document.getElementById('login-form').classList.toggle('hidden');
    document.getElementById('register-form').classList.toggle('hidden');
}

// --- РЕГИСТРАЦИЯ ---
async function register() {
    const name = document.getElementById('reg-name').value;
    const pin = document.getElementById('reg-pin').value;

    if (!name || pin.length !== 4) {
        alert("Заполните имя и ПИН (4 цифры)");
        return;
    }

    try {
        const personalCode = Math.floor(100 + Math.random() * 899).toString();
        const cardNumber = "2200 " + Math.floor(1000 + Math.random() * 8999) + " " + Math.floor(1000 + Math.random() * 8999) + " " + Math.floor(1000 + Math.random() * 8999);
        const phone = "+7" + Math.floor(9000000000 + Math.random() * 999999999).toString();

        // Отправка в Appwrite
        await databases.createDocument(DB_ID, COLL_ID, ID.unique(), {
            name: name,
            pin: pin,
            personalCode: personalCode,
            phone: phone,
            balance: 15000,
            card: cardNumber, // Название ключа из image_8851b9.png
            history: "[]"
        });

        alert(`ЭЛИТНЫЙ СЧЕТ ОТКРЫТ!\nВАШ КОД ДЛЯ ВХОДА: ${personalCode}\nВаш ПИН: ${pin}`);
        location.reload();
    } catch (e) {
        console.error(e);
        alert("Ошибка! Проверь права доступа (Settings -> Permissions -> Any) в Appwrite.");
    }
}

// --- ВХОД ---
async function login() {
    const code = document.getElementById('login-code').value;
    const pin = document.getElementById('login-pin').value;

    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code),
            Query.equal('pin', pin)
        ]);

        if (res.documents.length > 0) {
            renderApp(res.documents[0]);
        } else {
            alert("Отказ в доступе: Неверный код или ПИН");
        }
    } catch (e) {
        alert("Ошибка авторизации. Проверь сеть.");
    }
}

function renderApp(user) {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-screen').classList.remove('hidden');
    
    document.getElementById('user-name-top').innerText = user.name;
    document.getElementById('user-initials').innerText = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
    document.getElementById('balance-disp').innerText = user.balance.toLocaleString() + " ₽";
    document.getElementById('card-disp').innerText = user.card;
}
</script>
</body>
</html>
