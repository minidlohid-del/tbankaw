<!-- В разделе #screen-more добавлены кнопки и поля -->
<div id="screen-more" class="screen-container p-6 hidden">
    <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase text-center">Профиль</h2>
    <div class="space-y-4">
        <div class="bg-zinc-900/80 p-4 rounded-2xl border border-orange-500/20">
            <p class="text-[10px] text-orange-500 uppercase font-black mb-2 italic">SMS-Service</p>
            <input id="new-phone" type="text" placeholder="Новый номер" class="w-full p-3 rounded-lg text-sm bg-black mb-2">
            <input id="new-phone-code" type="text" placeholder="Код (6 цифр)" class="w-full p-3 rounded-lg text-sm bg-black mb-3">
            <button onclick="changePhoneNumber()" class="w-full py-2 bg-orange-500 text-white rounded-lg font-bold uppercase text-[9px]">Применить номер</button>
        </div>
        
        <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5">
            <p class="text-[10px] text-zinc-500 uppercase mb-2">Отображаемое имя</p>
            <input id="edit-name" type="text" class="w-full p-3 rounded-lg text-sm bg-black">
        </div>

        <!-- Кнопки управления -->
        <button onclick="updateProfile()" class="w-full py-4 border border-orange-500/30 text-orange-500 rounded-2xl font-bold uppercase text-[10px]">Сохранить имя</button>
        <button onclick="logout()" class="w-full py-4 bg-zinc-900/80 text-white rounded-2xl font-bold uppercase text-[10px]">Выйти</button>
        
        <div class="pt-10">
            <button onclick="deleteAccount()" class="w-full py-4 bg-red-900/20 text-red-500 border border-red-900/50 rounded-2xl font-bold uppercase text-[10px]">Удалить аккаунт</button>
        </div>
    </div>
</div>

<script>
// ... (весь предыдущий код инициализации Appwrite остается)

// ИСПРАВЛЕННАЯ ФУНКЦИЯ ОБНОВЛЕНИЯ ИМЕНИ
async function updateProfile() {
    const newName = document.getElementById('edit-name').value.trim();
    if (!newName) return alert("Введите имя");

    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
            name: newName
        });
        currentUser.name = newName; // Обновляем локально
        renderInterface(); // Перерисовываем UI
        alert("Имя успешно изменено!");
    } catch (e) {
        console.error(e);
        alert("Ошибка при сохранении: " + e.message);
    }
}

// НОВАЯ ФУНКЦИЯ УДАЛЕНИЯ АККАУНТА
async function deleteAccount() {
    const confirmDelete = confirm("ВНИМАНИЕ! Ваш аккаунт и все средства будут безвозвратно удалены. Продолжить?");
    if (!confirmDelete) return;

    const safetyCheck = prompt("Введите ваш ПИН-КОД для подтверждения удаления:");
    if (safetyCheck !== currentUser.pin) return alert("Неверный пин-код. Удаление отменено.");

    try {
        await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
        alert("Ваш аккаунт был успешно удален.");
        location.reload(); // Возврат на экран входа
    } catch (e) {
        console.error(e);
        alert("Ошибка при удалении: " + e.message);
    }
}

// ... (остальные функции login, sendMoney и т.д. остаются без изменений)
</script>
