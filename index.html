<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiBank Elite V5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .kiwi-card { background: linear-gradient(135deg, #1f1f1f 0%, #000000 100%); border: 1px solid rgba(255, 140, 0, 0.2); }
        .kiwi-btn { background: #ff8c00; color: #fff; }
        .nav-blur { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .active-tab { color: #ff8c00 !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; background: rgba(24,24,27,0.8) !important; color: white; }
        input:focus { border-color: #ff8c00 !important; }
        .screen-container { height: calc(100vh - 75px); overflow-y: auto; padding-bottom: 40px; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto h-screen relative">
    
    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="h-full flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-orange-500 uppercase">KiwiBank</h1>
        </div>
        <div class="space-y-4">
            <input id="login-code" type="text" placeholder="КОД ВХОДА" class="w-full p-4 rounded-2xl text-center font-bold">
            <input id="login-pin" type="password" placeholder="ПИН-КОД" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="login()" class="w-full kiwi-btn font-black py-4 rounded-2xl uppercase shadow-lg shadow-orange-900/20">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-interface" class="hidden h-full flex flex-col">
        
        <!-- ГЛАВНАЯ -->
        <div id="screen-home" class="screen-container p-6">
            <header class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-orange-500/30">
                        <span id="user-initials" class="text-orange-500 font-bold"></span>
                    </div>
                    <div class="flex flex-col">
                        <span id="user-name-top" class="font-bold text-sm"></span>
                        <span id="user-phone-top" class="text-[10px] text-zinc-500"></span>
                    </div>
                </div>
            </header>

            <div class="kiwi-card p-6 rounded-[32px] mb-8 relative overflow-hidden">
                <div class="mb-10">
                    <p class="text-orange-500/50 text-[10px] font-black uppercase italic">Баланс</p>
                    <h2 id="balance-disp" class="text-4xl font-black italic tracking-tighter">0 ₽</h2>
                </div>
                <!-- ДОБАВЛЕН БЛОК РЕКВИЗИТОВ (ДАТА + CID) -->
                <div class="space-y-1">
                    <p id="card-num-disp" class="text-white font-mono text-sm tracking-widest">**** **** **** ****</p>
                    <div class="flex gap-4 text-[10px] text-zinc-500 font-bold mt-2">
                        <span>EXP: <span id="card-date-disp" class="text-white">--/--</span></span>
                        <span>CID: <span id="user-pcode-disp" class="text-white">---</span></span>
                    </div>
                </div>
            </div>
            <h3 class="text-xs font-black uppercase text-zinc-600 mb-4 italic">Активность</h3>
            <div id="history-list" class="space-y-3"></div>
        </div>

        <!-- ПЕРЕВОДЫ -->
        <div id="screen-payments" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase">Переводы</h2>
            <div class="bg-zinc-900/80 p-6 rounded-[24px] border border-white/5">
                <input id="pay-target" type="text" placeholder="Карта или телефон" class="w-full p-4 rounded-xl mb-3">
                <input id="pay-amount" type="number" placeholder="Сумма" class="w-full p-4 rounded-xl mb-4">
                <button onclick="sendMoney()" class="w-full kiwi-btn font-black py-4 rounded-xl uppercase text-xs">Отправить</button>
            </div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="screen-more" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase text-center">Профиль</h2>
            <div class="space-y-4">
                
                <div class="bg-zinc-900/80 p-4 rounded-2xl border border-orange-500/20">
                    <p class="text-[10px] text-orange-500 uppercase font-black mb-2 italic">SMS-Service</p>
                    <input id="new-phone" type="text" placeholder="Новый номер" class="w-full p-3 rounded-lg text-sm bg-black mb-2">
                    <input id="new-phone-code" type="text" placeholder="Код (6 цифр)" class="w-full p-3 rounded-lg text-sm bg-black mb-3">
                    <button onclick="changePhoneNumber()" class="w-full py-2 bg-orange-500 text-white rounded-lg font-bold uppercase text-[9px]">Применить номер</button>
                </div>

                <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-zinc-500 uppercase mb-2">Отображаемое имя</p>
                    <input id="edit-name" type="text" class="w-full p-3 rounded-lg text-sm bg-black mb-3">
                    <button onclick="updateProfile()" class="w-full py-3 border border-orange-500/30 text-orange-500 rounded-xl font-bold uppercase text-[10px]">Сохранить имя</button>
                </div>
                
                <button onclick="logout()" class="w-full py-4 bg-zinc-900/80 text-white rounded-2xl font-bold uppercase text-[10px]">Выйти</button>
                
                <div class="pt-8">
                    <button onclick="deleteAccount()" class="w-full py-4 bg-red-900/10 text-red-500 border border-red-900/30 rounded-2xl font-bold uppercase text-[10px]">Удалить аккаунт</button>
                </div>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <nav class="h-[75px] nav-blur flex justify-around items-center absolute bottom-0 left-0 right-0">
            <button onclick="showScreen('home', this)" class="nav-btn active-tab w-1/3 flex flex-col items-center"><span class="text-[8px] font-black uppercase">Банк</span></button>
            <button onclick="showScreen('payments', this)" class="nav-btn text-zinc-500 w-1/3 flex flex-col items-center"><span class="text-[8px] font-black uppercase">Перевод</span></button>
            <button onclick="showScreen('more', this)" class="nav-btn text-zinc-500 w-1/3 flex flex-col items-center"><span class="text-[8px] font-black uppercase">Меню</span></button>
        </nav>
    </div>
</div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);
let currentUser = null;

async function login() {
    const code = document.getElementById('login-code').value.trim();
    const pin = document.getElementById('login-pin').value.trim();
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('personalCode', code), Query.equal('pin', pin)]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            renderInterface();
        } else alert("Ошибка входа");
    } catch (e) { alert("Ошибка сети"); }
}

function renderInterface() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-interface').classList.remove('hidden');
    document.getElementById('user-name-top').innerText = currentUser.name;
    document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
    document.getElementById('user-initials').innerText = currentUser.name[0].toUpperCase();
    document.getElementById('user-phone-top').innerText = currentUser.phone;
    document.getElementById('card-num-disp').innerText = currentUser.cardNumber;
    document.getElementById('edit-name').value = currentUser.name;
    
    // Генерируем красивую случайную дату для юзера, если её нет в БД
    let expDate = currentUser.cardDate;
    if (!expDate) {
        // Делаем уникальную дату на основе кода (чтобы не менялась при обновлении страницы)
        let month = ((parseInt(currentUser.personalCode || "123") % 12) + 1).toString().padStart(2, '0');
        let year = (24 + (parseInt(currentUser.personalCode || "123") % 6)).toString();
        expDate = `${month}/${year}`;
    }
    document.getElementById('card-date-disp').innerText = expDate;
    
    // Вывод CID (трехзначный код входа)
    document.getElementById('user-pcode-disp').innerText = currentUser.personalCode || "---";

    updateHistoryUI();
}

function showScreen(screenId, btn) {
    document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('active-tab', 'text-zinc-500'));
    document.getElementById('screen-' + screenId).classList.remove('hidden');
    btn.classList.add('active-tab');
}

async function changePhoneNumber() {
    const newPhone = document.getElementById('new-phone').value.trim();
    const code = document.getElementById('new-phone-code').value.trim();
    if (newPhone.length < 5 || code.length < 3) return alert("Введите корректный номер и код");
    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { phone: newPhone });
        currentUser.phone = newPhone;
        renderInterface();
        alert("Номер успешно обновлен");
        document.getElementById('new-phone').value = "";
        document.getElementById('new-phone-code').value = "";
    } catch (e) { alert("Ошибка сохранения номера"); }
}

async function updateProfile() {
    const newName = document.getElementById('edit-name').value.trim();
    if (!newName) return;
    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { name: newName });
        currentUser.name = newName;
        renderInterface();
        alert("Имя обновлено");
    } catch (e) { alert("Ошибка сохранения"); }
}

async function deleteAccount() {
    if (!confirm("ВНИМАНИЕ! Удалить аккаунт навсегда?")) return;
    const pin = prompt("Введите ПИН-КОД для подтверждения:");
    if (pin !== currentUser.pin) return alert("Неверный ПИН");
    try {
        await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
        location.reload();
    } catch (e) { alert("Ошибка удаления"); }
}

function updateHistoryUI() {
    const list = document.getElementById('history-list');
    let history = [];
    try { history = JSON.parse(currentUser.history || "[]"); } catch(e) {}
    list.innerHTML = history.reverse().map(item => `
        <div class="flex justify-between items-center bg-zinc-900/40 p-4 rounded-2xl border border-white/5">
            <div class="flex flex-col">
                <span class="text-[10px] font-black uppercase">${item.type === 'sent' ? 'Кому: ' + item.to : 'От: ' + item.from}</span>
                <span class="text-[8px] text-zinc-600">${item.date}</span>
            </div>
            <span class="text-xs font-black italic ${item.type === 'sent' ? 'text-red-500' : 'text-green-500'}">${item.type === 'sent' ? '-' : '+'} ${item.amount} ₽</span>
        </div>
    `).join('');
}

async function sendMoney() {
    const target = document.getElementById('pay-target').value.trim();
    const amount = parseInt(document.getElementById('pay-amount').value);
    if (!target || isNaN(amount) || amount > currentUser.balance) return alert("Ошибка данных");
    try {
        let res = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('cardNumber', target)]);
        let receiver = res.documents[0] || (await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('phone', target)])).documents[0];
        if (!receiver || receiver.$id === currentUser.$id) return alert("Получатель не найден");
        const dateStr = new Date().toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
        let myH = JSON.parse(currentUser.history || "[]");
        myH.push({ type: 'sent', to: receiver.name, amount: amount, date: dateStr });
        let hisH = JSON.parse(receiver.history || "[]");
        hisH.push({ type: 'received', from: currentUser.name, amount: amount, date: dateStr });
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { balance: currentUser.balance - amount, history: JSON.stringify(myH) });
        await databases.updateDocument(DB_ID, COLL_ID, receiver.$id, { balance: receiver.balance + amount, history: JSON.stringify(hisH) });
        location.reload();
    } catch (e) { alert("Ошибка перевода"); }
}

function logout() { location.reload(); }
</script>
</body>
</html>
