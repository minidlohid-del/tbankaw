<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Elite Cloud V4.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .t-gold-card { background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); border: 1px solid rgba(255, 215, 0, 0.2); }
        .t-yellow-btn { background: #ffdd2d; }
        .nav-blur { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .active-tab { color: #ffdd2d !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; background: rgba(24,24,27,0.5) !important; color: white; }
        input:focus { border-color: #ffdd2d !important; }
        .screen-container { height: calc(100vh - 75px); overflow-y: auto; padding-bottom: 40px; }
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .receipt-body { background: white; color: #000; width: 310px; padding: 25px; border-radius: 28px; text-align: center; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; position: relative; }
        .msg-theirs { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-mine { background: #ffdd2d; color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        #chat-box::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto h-screen relative">
    
    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="h-full flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter text-yellow-400 uppercase">T-Bank Cloud</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">Elite Gold Edition V4.7</p>
        </div>
        <div id="login-form" class="space-y-4">
            <input id="login-code" type="text" placeholder="ЛИЧНЫЙ КОД (3 ЦИФРЫ)" class="w-full p-4 rounded-2xl text-center font-bold">
            <input id="login-pin" type="password" placeholder="ПИН-КОД" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="login()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider">Войти</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer" onclick="toggleForms()">Создать аккаунт</p>
        </div>
        <div id="register-form" class="hidden space-y-4">
            <input id="reg-name" type="text" placeholder="ИМЯ И ФАМИЛИЯ" class="w-full p-4 rounded-2xl font-bold">
            <input id="reg-pin" type="password" placeholder="ПИН (4 ЦИФРЫ)" maxlength="4" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="register()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider">Открыть золотой счет</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer" onclick="toggleForms()">Уже есть счет? Вход</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-interface" class="hidden h-full flex flex-col">
        
        <!-- ГЛАВНАЯ -->
        <div id="screen-home" class="screen-container p-6">
            <header class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-yellow-400/30">
                        <span id="user-initials" class="text-yellow-400 font-bold text-sm"></span>
                    </div>
                    <div class="flex flex-col">
                        <span id="user-name-top" class="font-bold text-sm text-zinc-200"></span>
                        <span id="user-phone-top" class="text-[10px] text-zinc-500 font-mono"></span>
                    </div>
                </div>
            </header>

            <div class="t-gold-card p-6 rounded-[32px] mb-8 relative overflow-hidden">
                <div class="mb-10">
                    <p class="text-yellow-400/50 text-[10px] font-black uppercase italic">Баланс</p>
                    <h2 id="balance-disp" class="text-4xl font-black italic tracking-tighter">0 ₽</h2>
                </div>
                <div class="space-y-1">
                    <p id="card-num-disp" class="text-white font-mono text-sm tracking-widest">**** **** **** ****</p>
                    <div class="flex gap-4 text-[10px] text-zinc-500 font-bold">
                        <span>DATE: <span id="card-date-disp" class="text-white">--/--</span></span>
                        <span>CODE: <span id="user-pcode-disp" class="text-white">---</span></span>
                    </div>
                </div>
            </div>
            <h3 class="text-xs font-black uppercase text-zinc-600 mb-4 px-2 italic">История</h3>
            <div id="history-list" class="space-y-3">
                <p class="text-[10px] text-zinc-500 text-center py-4">Последние операции отсутствуют</p>
            </div>
        </div>

        <!-- ЧАТ -->
        <div id="screen-chat" class="screen-container p-4 hidden flex flex-col h-full">
            <h2 class="text-2xl font-black italic mb-4 text-yellow-400 uppercase">Чат Cloud</h2>
            <div id="chat-box" class="flex-1 flex flex-col overflow-y-auto mb-4 pr-2"></div>
            <div class="flex gap-2 pb-2">
                <input id="chat-input" type="text" placeholder="Сообщение..." class="flex-1 p-4 rounded-2xl text-sm">
                <button onclick="sendChatMessage()" class="t-yellow-btn px-6 rounded-2xl text-black font-bold text-xl">➤</button>
            </div>
        </div>

        <!-- ПЛАТЕЖИ -->
        <div id="screen-payments" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-yellow-400 uppercase">Перевод</h2>
            <div class="bg-zinc-900/50 p-6 rounded-[24px] border border-white/5">
                <input id="pay-target" type="text" placeholder="Имя, телефон или карта" class="w-full p-4 rounded-xl mb-3 text-sm">
                <input id="pay-amount" type="number" placeholder="Сумма (₽)" class="w-full p-4 rounded-xl mb-4 text-sm">
                <button onclick="sendMoney()" class="w-full t-yellow-btn text-black font-black py-4 rounded-xl uppercase text-xs">Подтвердить</button>
            </div>
        </div>

        <!-- МЕНЮ НАСТРОЕК -->
        <div id="screen-more" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-yellow-400 uppercase text-center">Управление</h2>
            <div class="space-y-4">
                <div class="bg-zinc-900/50 p-4 rounded-2xl">
                    <p class="text-[10px] text-zinc-500 uppercase mb-2">Изменить имя</p>
                    <input id="edit-name" type="text" class="w-full p-3 rounded-lg text-sm bg-black">
                </div>
                <div class="bg-zinc-900/50 p-4 rounded-2xl">
                    <p class="text-[10px] text-zinc-500 uppercase mb-2">Новый ПИН-код (4 цифры)</p>
                    <input id="edit-pin" type="password" maxlength="4" class="w-full p-3 rounded-lg text-sm bg-black">
                </div>
                <button onclick="updateProfile()" class="w-full py-4 border border-yellow-400/30 text-yellow-400 rounded-2xl font-bold uppercase text-[10px]">Сохранить данные</button>
                
                <div class="pt-10 space-y-3">
                    <button onclick="logout()" class="w-full py-4 bg-zinc-900/50 text-white rounded-2xl font-bold uppercase text-[10px]">Выйти из системы</button>
                    <button onclick="deleteAccount()" class="w-full py-4 bg-red-900/20 text-red-500 rounded-2xl font-bold uppercase text-[10px]">Удалить аккаунт навсегда</button>
                </div>
            </div>
        </div>

        <!-- ТАБ-БАР -->
        <nav class="h-[75px] nav-blur flex justify-around items-center absolute bottom-0 left-0 right-0 px-2">
            <button onclick="showScreen('home', this)" class="nav-btn active-tab flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase tracking-widest">Главная</span></button>
            <button onclick="showScreen('payments', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase tracking-widest">Платежи</span></button>
            <button onclick="showScreen('chat', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase tracking-widest">Чат</span></button>
            <button onclick="showScreen('more', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase tracking-widest">Меню</span></button>
        </nav>
    </div>
</div>

<!-- ЧЕК -->
<div id="receipt-modal" onclick="this.style.display='none'">
    <div class="receipt-body" onclick="event.stopPropagation()">
        <div class="text-green-500 text-5xl mb-4">✓</div>
        <div id="rec-amount" class="text-3xl font-black my-4">0 ₽</div>
        <div class="text-left border-t border-dashed pt-4 space-y-2 text-sm">
            <div class="flex justify-between"><span>Кому:</span><b id="rec-to">---</b></div>
            <div class="flex justify-between"><span>Статус:</span><b class="text-green-600 font-black">УСПЕШНО</b></div>
        </div>
        <button onclick="document.getElementById('receipt-modal').style.display='none'" class="w-full mt-6 py-3 bg-black text-white rounded-xl font-bold uppercase text-[10px]">Готово</button>
    </div>
</div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const MSG_COLL_ID = 'messages'; 
const { Client, Databases, ID, Query } = Appwrite;

const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);
let currentUser = null;
let chatInterval = null;

function toggleForms() {
    document.getElementById('login-form').classList.toggle('hidden');
    document.getElementById('register-form').classList.toggle('hidden');
}

function showScreen(screenId, btn) {
    document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('active-tab', 'text-zinc-500'));
    document.getElementById('screen-' + screenId).classList.remove('hidden');
    btn.classList.add('active-tab');
    
    if(screenId === 'chat') {
        loadMessages();
        chatInterval = setInterval(loadMessages, 3000);
    } else {
        clearInterval(chatInterval);
    }
}

async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const pin = document.getElementById('reg-pin').value.trim();
    if (!name || pin.length !== 4) return alert("Введите имя и ПИН из 4 цифр");
    try {
        const personalCode = Math.floor(100 + Math.random() * 899).toString();
        const cardNum = "2202 " + Math.floor(1000 + Math.random() * 8999) + " " + Math.floor(1000 + Math.random() * 8999) + " " + Math.floor(1000 + Math.random() * 8999);
        await databases.createDocument(DB_ID, COLL_ID, ID.unique(), {
            name: name, pin: pin, personalCode: personalCode, balance: 1000,
            phone: "+79" + Math.floor(100000000 + Math.random() * 899999999),
            cardNumber: cardNum, cardDate: "05/29"
        });
        alert(`Счет открыт! Ваш код для входа: ${personalCode}`);
        location.reload();
    } catch (e) { alert("Ошибка: " + e.message); }
}

async function login() {
    const code = document.getElementById('login-code').value.trim();
    const pin = document.getElementById('login-pin').value.trim();
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            renderInterface();
        } else alert("Неверные данные");
    } catch (e) { alert("Ошибка входа"); }
}

function renderInterface() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-interface').classList.remove('hidden');
    document.getElementById('user-name-top').innerText = currentUser.name;
    document.getElementById('balance-disp').innerText = currentUser.balance + " ₽";
    document.getElementById('user-initials').innerText = currentUser.name[0].toUpperCase();
    document.getElementById('user-phone-top').innerText = currentUser.phone;
    document.getElementById('card-num-disp').innerText = currentUser.cardNumber;
    document.getElementById('card-date-disp').innerText = currentUser.cardDate;
    document.getElementById('user-pcode-disp').innerText = currentUser.personalCode;
    document.getElementById('edit-name').value = currentUser.name;
}

async function sendMoney() {
    const target = document.getElementById('pay-target').value.trim();
    const amount = parseInt(document.getElementById('pay-amount').value);
    if (!target || isNaN(amount) || amount <= 0) return alert("Неверная сумма");
    if (amount > currentUser.balance) return alert("Недостаточно средств");

    try {
        const searchRes = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.or([Query.equal('name', target), Query.equal('phone', target), Query.equal('cardNumber', target)])
        ]);
        if (searchRes.documents.length === 0) return alert("Получатель не найден");
        const receiver = searchRes.documents[0];
        
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { balance: currentUser.balance - amount });
        await databases.updateDocument(DB_ID, COLL_ID, receiver.$id, { balance: receiver.balance + amount });
        
        currentUser.balance -= amount;
        document.getElementById('balance-disp').innerText = currentUser.balance + " ₽";
        openReceipt(receiver.name, amount);
    } catch (e) { alert("Ошибка перевода"); }
}

async function updateProfile() {
    const newName = document.getElementById('edit-name').value.trim();
    const newPin = document.getElementById('edit-pin').value.trim();
    const data = { name: newName };
    if (newPin.length === 4) data.pin = newPin;

    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, data);
        alert("Данные обновлены!");
        location.reload();
    } catch (e) { alert("Ошибка обновления"); }
}

async function deleteAccount() {
    if (!confirm("Удалить счет навсегда? Все деньги исчезнут!")) return;
    try {
        await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
        location.reload();
    } catch (e) { alert("Ошибка удаления"); }
}

async function loadMessages() {
    try {
        const res = await databases.listDocuments(DB_ID, MSG_COLL_ID, [Query.orderDesc('timestamp'), Query.limit(30)]);
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        res.documents.reverse().forEach(msg => {
            const isMine = msg.sender === currentUser.name;
            box.innerHTML += `<div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">
                ${!isMine ? `<p class="text-[8px] text-yellow-400 font-black mb-1 uppercase">${msg.sender}</p>` : ''}
                <p class="text-sm">${msg.text}</p>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    } catch (e) {}
}

async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;
    try {
        await databases.createDocument(DB_ID, MSG_COLL_ID, ID.unique(), {
            sender: currentUser.name, text: input.value.trim(), timestamp: Date.now()
        });
        input.value = '';
        loadMessages();
    } catch (e) { alert("Ошибка чата"); }
}

function openReceipt(to, amount) {
    document.getElementById('rec-to').innerText = to;
    document.getElementById('rec-amount').innerText = amount + " ₽";
    document.getElementById('receipt-modal').style.display = 'flex';
}

function logout() { location.reload(); }
</script>
</body>
</html>
