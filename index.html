<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>owershus Bank System</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1e1e1e;
            --accent: #4CAF50;
            --text-main: #ffffff;
            --text-gray: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            min-height: 80vh;
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* ЭКРАН ВХОДА */
        #login-screen {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
        }

        input {
            width: 80%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }

        .btn {
            width: 85%;
            padding: 15px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        /* ГЛАВНЫЙ ЭКРАН */
        #main-screen {
            display: none;
            padding: 20px;
        }

        .balance-card {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .history-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .history-item:hover { background: #333; }

        /* МОДАЛЬНОЕ ОКНО ЧЕКА */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .receipt {
            background: white;
            color: #333;
            width: 80%;
            max-width: 300px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }

        .receipt-hr { border-top: 1px dashed #ccc; margin: 15px 0; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Экран входа -->
    <div id="login-screen">
        <h1 style="color: var(--accent)">owershus Pay</h1>
        <p style="color: var(--text-gray)">Введите данные для входа</p>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn" onclick="login()">Войти</button>
    </div>

    <!-- Главный экран -->
    <div id="main-screen">
        <div class="balance-card">
            <span style="opacity: 0.8">Мой Баланс</span>
            <div style="font-size: 32px; font-weight: bold;">50 000 ₽</div>
        </div>

        <h3>Перевести</h3>
        <input type="text" id="targetName" placeholder="Кому (никнейм)">
        <input type="number" id="transferAmount" placeholder="Сумма">
        <button class="btn" onclick="makeTransfer()">Отправить</button>

        <h3 style="margin-top: 30px;">История транзакций</h3>
        <div id="history-container">
            <!-- Здесь будут появляться записи -->
            <div class="history-item" onclick="showCheck('Steam', '1 200 ₽', '28.04.2026')">
                <div><span>Steam</span><br><small style="color:gray">28.04.2026</small></div>
                <div style="color:#ff5252">- 1 200 ₽</div>
            </div>
        </div>
    </div>

</div>

<!-- Окно чека -->
<div class="modal" id="checkModal">
    <div class="receipt">
        <div style="font-size: 40px; color: var(--accent);">✓</div>
        <h2 style="margin: 10px 0;">Успешно</h2>
        <div id="checkSum" style="font-size: 24px; font-weight: bold;">0 ₽</div>
        <div class="receipt-hr"></div>
        <div style="text-align: left; font-size: 14px;">
            <p><strong>Получатель:</strong> <span id="checkUser">---</span></p>
            <p><strong>Дата:</strong> <span id="checkDate">---</span></p>
            <p><strong>Статус:</strong> Исполнено</p>
        </div>
        <button class="btn" style="background: #333;" onclick="closeCheck()">Закрыть</button>
    </div>
</div>

<script>
    // 1. Логика входа
    function login() {
        const user = document.getElementById('login').value;
        if(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        } else {
            alert("Введите логин!");
        }
    }

    // 2. Функция создания перевода
    function makeTransfer() {
        const target = document.getElementById('targetName').value;
        const amount = document.getElementById('transferAmount').value;
        const date = new Date().toLocaleDateString();

        if(!target || !amount) return alert("Заполните все поля");

        // Добавляем в историю
        const container = document.getElementById('history-container');
        const newItem = document.createElement('div');
        newItem.className = 'history-item';
        // При клике вызываем чек
        newItem.onclick = () => showCheck(target, amount + ' ₽', date);
        newItem.innerHTML = `
            <div><span>Перевод: ${target}</span><br><small style="color:gray">${date}</small></div>
            <div style="color:#ff5252">- ${amount} ₽</div>
        `;
        container.prepend(newItem);

        // Сразу показываем чек после перевода
        showCheck(target, amount + ' ₽', date);
        
        // Чистим поля
        document.getElementById('targetName').value = '';
        document.getElementById('transferAmount').value = '';
    }

    // 3. Логика чеков
    function showCheck(name, sum, date) {
        document.getElementById('checkUser').innerText = name;
        document.getElementById('checkSum').innerText = sum;
        document.getElementById('checkDate').innerText = date;
        document.getElementById('checkModal').style.display = 'flex';
    }

    function closeCheck() {
        document.getElementById('checkModal').style.display = 'none';
    }
</script>

</body>
</html>
