<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiBank Elite V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .kiwi-card { background: linear-gradient(135deg, #1f1f1f 0%, #000000 100%); border: 1px solid rgba(255, 140, 0, 0.2); }
        .kiwi-btn { background: #ff8c00; color: #fff; }
        .nav-blur { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .active-tab { color: #ff8c00 !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; background: rgba(24,24,27,0.8) !important; color: white; }
        input:focus { border-color: #ff8c00 !important; }
        .screen-container { height: calc(100vh - 75px); overflow-y: auto; padding-bottom: 40px; }
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .receipt-body { background: white; color: #000; width: 310px; padding: 25px; border-radius: 28px; text-align: center; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; margin-bottom: 10px; position: relative; }
        .msg-theirs { background: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-mine { background: #ff8c00; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto h-screen relative">
    
    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="h-full flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-orange-500 uppercase">KiwiBank</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">Private Cloud Edition V5.0</p>
        </div>
        <div id="login-form" class="space-y-4">
            <input id="login-code" type="text" placeholder="КОД ВХОДА (3 ЦИФРЫ)" class="w-full p-4 rounded-2xl text-center font-bold">
            <input id="login-pin" type="password" placeholder="ПИН-КОД" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="login()" class="w-full kiwi-btn font-black py-4 rounded-2xl uppercase tracking-wider shadow-lg shadow-orange-900/20">Войти</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer" onclick="toggleForms()">Стать клиентом KiwiBank</p>
        </div>
        <div id="register-form" class="hidden space-y-4">
            <input id="reg-name" type="text" placeholder="ИМЯ И ФАМИЛИЯ" class="w-full p-4 rounded-2xl font-bold">
            <input id="reg-pin" type="password" placeholder="ПИН (4 ЦИФРЫ)" maxlength="4" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="register()" class="w-full kiwi-btn font-black py-4 rounded-2xl uppercase tracking-wider">Открыть счет</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer" onclick="toggleForms()">Уже есть счет? Вход</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-interface" class="hidden h-full flex flex-col">
        
        <!-- ГЛАВНАЯ -->
        <div id="screen-home" class="screen-container p-6">
            <header class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-orange-500/30">
                        <span id="user-initials" class="text-orange-500 font-bold text-sm"></span>
                    </div>
                    <div class="flex flex-col">
                        <span id="user-name-top" class="font-bold text-sm text-zinc-200"></span>
                        <span id="user-phone-top" class="text-[10px] text-zinc-500 font-mono"></span>
                    </div>
                </div>
            </header>

            <div class="kiwi-card p-6 rounded-[32px] mb-8 relative overflow-hidden">
                <div class="mb-10">
                    <p class="text-orange-500/50 text-[10px] font-black uppercase italic">Баланс счета</p>
                    <h2 id="balance-disp" class="text-4xl font-black italic tracking-tighter">0 ₽</h2>
                </div>
                <div class="space-y-1">
                    <p id="card-num-disp" class="text-white font-mono text-sm tracking-widest">**** **** **** ****</p>
                    <div class="flex gap-4 text-[10px] text-zinc-500 font-bold">
                        <span>EXP: <span id="card-date-disp" class="text-white">--/--</span></span>
                        <span>CID: <span id="user-pcode-disp" class="text-white">---</span></span>
                    </div>
                </div>
            </div>
            <h3 class="text-xs font-black uppercase text-zinc-600 mb-4 px-2 italic">Активность</h3>
            <div id="history-list" class="space-y-3 text-[10px] text-zinc-500 text-center py-10 italic">
                История операций пуста
            </div>
        </div>

        <!-- ЧАТ -->
        <div id="screen-chat" class="screen-container p-4 hidden flex flex-col h-full">
            <h2 class="text-2xl font-black italic mb-4 text-orange-500 uppercase">Kiwi Chat</h2>
            <div id="chat-box" class="flex-1 flex flex-col overflow-y-auto mb-4 pr-2"></div>
            <div class="flex gap-2 pb-2">
                <input id="chat-input" type="text" placeholder="Написать сообщение..." class="flex-1 p-4 rounded-2xl text-sm">
                <button onclick="sendChatMessage()" class="kiwi-btn px-6 rounded-2xl font-bold text-xl">➤</button>
            </div>
        </div>

        <!-- ПЛАТЕЖИ -->
        <div id="screen-payments" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase">Переводы</h2>
            <div class="bg-zinc-900/80 p-6 rounded-[24px] border border-white/5">
                <input id="pay-target" type="text" placeholder="Карта, телефон или имя" class="w-full p-4 rounded-xl mb-3 text-sm">
                <input id="pay-amount" type="number" placeholder="Сумма в рублях" class="w-full p-4 rounded-xl mb-4 text-sm">
                <button onclick="sendMoney()" class="w-full kiwi-btn font-black py-4 rounded-xl uppercase text-xs shadow-lg">Отправить средства</button>
            </div>
        </div>

        <!-- МЕНЮ -->
        <div id="screen-more" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase text-center">Профиль</h2>
            <div class="space-y-4">
                <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-zinc-500 uppercase mb-2">Отображаемое имя</p>
                    <input id="edit-name" type="text" class="w-full p-3 rounded-lg text-sm bg-black">
                </div>
                <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5">
                    <p class="text-[10px] text-zinc-500 uppercase mb-2">Изменить ПИН-код</p>
                    <input id="edit-pin" type="password" maxlength="4" class="w-full p-3 rounded-lg text-sm bg-black">
                </div>
                <button onclick="updateProfile()" class="w-full py-4 border border-orange-500/30 text-orange-500 rounded-2xl font-bold uppercase text-[10px]">Применить изменения</button>
                
                <div class="pt-10 space-y-3">
                    <button onclick="logout()" class="w-full py-4 bg-zinc-900/80 text-white rounded-2xl font-bold uppercase text-[10px]">Выйти из аккаунта</button>
                    <button onclick="deleteAccount()" class="w-full py-4 bg-red-900/20 text-red-500 rounded-2xl font-bold uppercase text-[10px]">Удалить счет KiwiBank</button>
                </div>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <nav class="h-[75px] nav-blur flex justify-around items-center absolute bottom-0 left-0 right-0 px-2">
            <button onclick="showScreen('home', this)" class="nav-btn active-tab flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase">Банк</span></button>
            <button onclick="showScreen('payments', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase">Перевод</span></button>
            <button onclick="showScreen('chat', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase">Чат</span></button>
            <button onclick="showScreen('more', this)" class="nav-btn text-zinc-500 flex flex-col items-center w-1/4"><span class="text-[8px] font-black uppercase">Меню</span></button>
        </nav>
    </div>
</div>

<!-- ЧЕК -->
<div id="receipt-modal" onclick="this.style.display='none'">
    <div class="receipt-body" onclick="event.stopPropagation()">
        <div class="text-orange-500 text-6xl mb-4">★</div>
        <div id="rec-amount" class="text-3xl font-black my-4">0 ₽</div>
        <div class="text-left border-t border-dashed border-zinc-300 pt-4 space-y-2 text-sm">
            <div class="flex justify-between"><span>Кому:</span><b id="rec-to">---</b></div>
            <div class="flex justify-between"><span>Банк:</span><b class="text-orange-600">KiwiBank</b></div>
            <div class="flex justify-between"><span>Статус:</span><b class="text-green-600">ВЫПОЛНЕНО</b></div>
        </div>
        <button onclick="document.getElementById('receipt-modal').style.display='none'" class="w-full mt-6 py-4 bg-black text-white rounded-xl font-bold uppercase text-[10px]">Закрыть чек</button>
    </div>
</div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const MSG_COLL_ID = 'messages'; 
const { Client, Databases, ID, Query } = Appwrite;

const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);
let currentUser = null;

function toggleForms() {
    document.getElementById('login-form').classList.toggle('hidden');
    document.getElementById('register-form').classList.toggle('hidden');
}

function showScreen(screenId, btn) {
    document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('active-tab', 'text-zinc-500'));
    document.getElementById('screen-' + screenId).classList.remove('hidden');
    btn.classList.add('active-tab');
    if(screenId === 'chat') { loadMessages(); }
}

async function register() {
    const name = document.getElementById('reg-name').value.trim();
    const pin = document.getElementById('reg-pin').value.trim();
    if (!name || pin.length !== 4) return alert("Заполните данные (ПИН 4 цифры)");

    try {
        const personalCode = Math.floor(100 + Math.random() * 899).toString();
        const cardNum = `2202 ${Math.floor(1000 + Math.random()*8999)} ${Math.floor(1000 + Math.random()*8999)} ${Math.floor(1000 + Math.random()*8999)}`;
        const cardDate = `${String(Math.floor(1 + Math.random()*12)).padStart(2, '0')}/${Math.floor(28+Math.random()*4)}`;

        await databases.createDocument(DB_ID, COLL_ID, ID.unique(), {
            name, pin, personalCode, balance: 1000,
            phone: "+79" + Math.floor(100000000 + Math.random() * 899999999),
            cardNumber: cardNum, cardDate
        });
        alert(`KiwiBank приветствует вас! Ваш код входа: ${personalCode}`);
        location.reload();
    } catch (e) { alert("Ошибка при регистрации"); }
}

async function login() {
    const code = document.getElementById('login-code').value.trim();
    const pin = document.getElementById('login-pin').value.trim();
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            renderInterface();
        } else alert("Доступ запрещен: проверьте код и ПИН");
    } catch (e) { alert("Ошибка подключения к серверу"); }
}

function renderInterface() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-interface').classList.remove('hidden');
    document.getElementById('user-name-top').innerText = currentUser.name;
    document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
    document.getElementById('user-initials').innerText = currentUser.name[0].toUpperCase();
    document.getElementById('user-phone-top').innerText = currentUser.phone;
    document.getElementById('card-num-disp').innerText = currentUser.cardNumber;
    document.getElementById('card-date-disp').innerText = currentUser.cardDate;
    document.getElementById('user-pcode-disp').innerText = currentUser.personalCode;
    document.getElementById('edit-name').value = currentUser.name;
}

async function sendMoney() {
    const target = document.getElementById('pay-target').value.trim();
    const amount = parseInt(document.getElementById('pay-amount').value);
    
    if (!target || isNaN(amount) || amount <= 0) return alert("Введите корректную сумму");
    if (amount > currentUser.balance) return alert("Недостаточно средств на балансе");

    try {
        let receiver = null;
        // Поочередный поиск для обхода ошибок индексации
        const cardSearch = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('cardNumber', target)]);
        if (cardSearch.documents.length > 0) receiver = cardSearch.documents[0];

        if (!receiver) {
            const phoneSearch = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('phone', target)]);
            if (phoneSearch.documents.length > 0) receiver = phoneSearch.documents[0];
        }

        if (!receiver) {
            const nameSearch = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('name', target)]);
            if (nameSearch.documents.length > 0) receiver = nameSearch.documents[0];
        }

        if (!receiver) return alert("Получатель в KiwiBank не найден");
        if (receiver.$id === currentUser.$id) return alert("Самоперевод недоступен");

        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { balance: currentUser.balance - amount });
        await databases.updateDocument(DB_ID, COLL_ID, receiver.$id, { balance: receiver.balance + amount });
        
        currentUser.balance -= amount;
        document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
        openReceipt(receiver.name, amount);
    } catch (e) { 
        alert("Транзакция отклонена сервером"); 
    }
}

async function updateProfile() {
    const newName = document.getElementById('edit-name').value.trim();
    const newPin = document.getElementById('edit-pin').value.trim();
    const data = { name: newName };
    if (newPin.length === 4) data.pin = newPin;
    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, data);
        alert("Профиль обновлен");
        location.reload();
    } catch (e) { alert("Ошибка сохранения"); }
}

async function deleteAccount() {
    if(!confirm("Вы уверены, что хотите закрыть счет в KiwiBank?")) return;
    try {
        await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
        location.reload();
    } catch (e) { alert("Ошибка при удалении"); }
}

async function loadMessages() {
    try {
        const res = await databases.listDocuments(DB_ID, MSG_COLL_ID, [Query.orderDesc('timestamp'), Query.limit(30)]);
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        res.documents.reverse().forEach(msg => {
            const isMine = msg.sender === currentUser.name;
            box.innerHTML += `<div class="msg-bubble ${isMine ? 'msg-mine' : 'msg-theirs'}">
                ${!isMine ? `<p class="text-[8px] text-orange-500 font-black mb-1 uppercase">${msg.sender}</p>` : ''}
                <p class="text-sm">${msg.text}</p>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    } catch (e) {}
}

async function sendChatMessage() {
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;
    try {
        await databases.createDocument(DB_ID, MSG_COLL_ID, ID.unique(), {
            sender: currentUser.name, text: input.value.trim(), timestamp: Date.now()
        });
        input.value = '';
        loadMessages();
    } catch (e) {}
}

function openReceipt(to, amount) {
    document.getElementById('rec-to').innerText = to;
    document.getElementById('rec-amount').innerText = amount.toLocaleString() + " ₽";
    document.getElementById('receipt-modal').style.display = 'flex';
}

function logout() { location.reload(); }
</script>
</body>
</html>
