<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Gold V3 Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .t-gold-card { background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); border: 1px solid rgba(255, 215, 0, 0.2); }
        .t-yellow-btn { background: #ffdd2d; }
        .nav-blur { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; background: rgba(24,24,27,0.5) !important; color: white; }
        .screen-container { height: calc(100vh - 70px); overflow-y: auto; padding-bottom: 30px; }
        
        /* Стиль чека */
        #modal-receipt {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .receipt-paper { background: white; color: black; padding: 25px; border-radius: 24px; width: 300px; text-align: center; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto h-screen relative">
    
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="h-full flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-yellow-400 uppercase">GOLD V3</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">Elite Edition</p>
        </div>
        <div class="space-y-4">
            <input id="login-code" type="text" placeholder="ЛИЧНЫЙ КОД" class="w-full p-4 rounded-2xl text-center font-bold">
            <button onclick="login()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase">Войти</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-interface" class="hidden h-full flex flex-col">
        <div id="screen-home" class="screen-container p-6">
            <div class="t-gold-card p-8 rounded-[32px] mb-8 shadow-2xl">
                <p class="text-yellow-400/50 text-[10px] font-black uppercase mb-2">Баланс</p>
                <h2 id="balance-disp" class="text-4xl font-black italic">100 ₽</h2> <!-- Начальный счет 100 -->
            </div>

            <h3 class="text-xs font-black uppercase text-zinc-600 mb-4 px-2">История (нажми для чека)</h3>
            <div id="history-list" class="space-y-3">
                <!-- Сюда добавляются переводы -->
                <div class="p-4 bg-zinc-900 rounded-2xl flex justify-between items-center" onclick="openReceipt('Гадан', '100 ₽', '30.04.2026')">
                    <div>
                        <p class="text-sm font-bold">Гадану</p>
                        <p class="text-[10px] text-zinc-500">30.04.2026</p>
                    </div>
                    <p class="text-red-500 font-bold">- 100 ₽</p>
                </div>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <nav class="h-[70px] nav-blur flex justify-around items-center absolute bottom-0 left-0 right-0">
            <button class="text-yellow-400 flex flex-col items-center"><span class="text-[8px] font-bold uppercase">Главная</span></button>
            <button class="text-zinc-500 flex flex-col items-center"><span class="text-[8px] font-bold uppercase">Платежи</span></button>
        </nav>
    </div>
</div>

<!-- МОДАЛКА ЧЕКА -->
<div id="modal-receipt" onclick="this.style.display='none'">
    <div class="receipt-paper" onclick="event.stopPropagation()">
        <div class="text-green-600 text-4xl mb-2">✓</div>
        <h2 class="font-black text-xl mb-4">Чек перевода</h2>
        <div class="text-3xl font-bold mb-6" id="r-amount">0 ₽</div>
        <div class="text-left space-y-2 text-sm border-t border-dashed pt-4">
            <div class="flex justify-between"><span>Кому:</span><b id="r-to">---</b></div>
            <div class="flex justify-between"><span>Дата:</span><b id="r-date">---</b></div>
            <div class="flex justify-between"><span>Статус:</span><b class="text-green-600">Исполнено</b></div>
        </div>
        <button onclick="document.getElementById('modal-receipt').style.display='none'" class="mt-6 w-full py-3 bg-black text-white rounded-xl font-bold">Закрыть</button>
    </div>
</div>

<script>
    function login() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-interface').classList.remove('hidden');
    }

    function openReceipt(to, amount, date) {
        document.getElementById('r-to').innerText = to;
        document.getElementById('r-amount').innerText = amount;
        document.getElementById('r-date').innerText = date;
        document.getElementById('modal-receipt').style.display = 'flex';
    }
</script>

</body>
</html>
