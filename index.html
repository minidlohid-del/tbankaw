<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-BANK CLOUD | ELITE GOLD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Inter', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #ffdd2d 0%, #b39700 100%); }
        .glass { background: rgba(20, 20, 20, 0.8); border: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-6">
        
        <!-- ЭКРАН РЕГИСТРАЦИИ/ВХОДА -->
        <div id="auth-box" class="mt-20">
            <div class="text-center mb-10">
                <div class="inline-block p-4 gold-gradient rounded-3xl shadow-[0_0_50px_rgba(255,221,45,0.2)] mb-6">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="black"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <h1 class="text-4xl font-black tracking-tighter uppercase italic text-yellow-400">T-BANK CLOUD</h1>
                <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-[0.3em] mt-2">Elite Gold Edition V4.1</p>
            </div>

            <div class="glass rounded-[32px] p-8 shadow-2xl">
                <div id="reg-fields">
                    <input id="name" type="text" placeholder="Имя владельца" class="w-full bg-transparent border-b border-zinc-800 p-4 mb-4 outline-none focus:border-yellow-400 transition-all font-bold uppercase tracking-widest text-sm">
                </div>
                <input id="code" type="password" maxlength="3" placeholder="КОД (3 цифры)" class="w-full bg-transparent border-b border-zinc-800 p-4 mb-4 text-center text-2xl outline-none focus:border-yellow-400 transition-all font-mono">
                <input id="pin" type="password" maxlength="4" placeholder="ПИН (4 цифры)" class="w-full bg-transparent border-b border-zinc-800 p-4 mb-10 text-center text-xl outline-none focus:border-yellow-400 transition-all font-mono">
                
                <button id="main-btn" onclick="handleAuth()" class="w-full gold-gradient text-black font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest text-xs shadow-lg">Открыть золотой счет</button>
                <p onclick="toggleMode()" id="toggle-text" class="text-center text-zinc-600 text-[10px] uppercase font-black mt-8 cursor-pointer hover:text-zinc-400">Уже есть счет? Авторизация</p>
            </div>
        </div>

        <!-- ЛИЧНЫЙ КАБИНЕТ -->
        <div id="cabinet" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <p class="text-zinc-500 text-[9px] font-black uppercase tracking-widest">GOLD STATUS</p>
                    <h2 id="user-name" class="text-xl font-black italic uppercase">...</h2>
                </div>
                <div class="w-12 h-12 gold-gradient rounded-full flex items-center justify-center text-black font-black">T</div>
            </div>

            <div class="glass rounded-[40px] p-10 mb-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-6 opacity-10 underline text-[60px] font-black italic">T-BANK</div>
                <p class="text-zinc-500 text-xs font-bold mb-2 uppercase tracking-tighter">Доступный остаток</p>
                <h3 id="balance" class="text-5xl font-black italic text-yellow-400 tracking-tighter">0 ₽</h3>
                <div class="mt-12 flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <p id="user-id" class="text-zinc-600 font-mono text-[10px]">ID: ...</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('Скоро!')" class="glass p-6 rounded-3xl text-center active:scale-95 transition-all">
                    <div class="text-2xl mb-2">💸</div>
                    <p class="text-[9px] font-black uppercase text-zinc-400">Перевести</p>
                </button>
                <button onclick="location.reload()" class="glass p-6 rounded-3xl text-center active:scale-95 transition-all">
                    <div class="text-2xl mb-2">🔒</div>
                    <p class="text-[9px] font-black uppercase text-zinc-400">Выход</p>
                </button>
            </div>
        </div>
    </div>

<script>
const { Client, Databases, ID, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('fra-69f253c500057ce0124f');
const databases = new Databases(client);

const DB_ID = '69f2543d001072173afd';
const COLL_USERS = 'users';

let isLoginMode = false;

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('reg-fields').classList.toggle('hidden');
    document.getElementById('main-btn').innerText = isLoginMode ? 'Войти в систему' : 'Открыть золотой счет';
    document.getElementById('toggle-text').innerText = isLoginMode ? 'Нет счета? Регистрация' : 'Уже есть счет? Авторизация';
}

async function handleAuth() {
    const code = document.getElementById('code').value;
    const pin = document.getElementById('pin').value;
    const name = document.getElementById('name').value;

    if (code.length < 3 || pin.length < 4) return alert("Заполните коды!");

    try {
        if (isLoginMode) {
            const res = await databases.listDocuments(DB_ID, COLL_USERS, [
                Query.equal('code', code),
                Query.equal('pin', pin)
            ]);
            if (res.documents.length > 0) showCabinet(res.documents[0]);
            else alert("Счет не найден");
        } else {
            const newUser = await databases.createDocument(DB_ID, COLL_USERS, ID.unique(), {
                name: name || "Elite User",
                code: code,
                pin: pin,
                balance: 5000 // Стартовый баланс
            });
            showCabinet(newUser);
        }
    } catch (e) {
        console.error("ОШИБКА:", e);
        alert("Ошибка сети или базы. Проверьте CORS и атрибуты в Appwrite.");
    }
}

function showCabinet(user) {
    document.getElementById('auth-box').classList.add('hidden');
    document.getElementById('cabinet').classList.remove('hidden');
    document.getElementById('user-name').innerText = user.name;
    document.getElementById('balance').innerText = user.balance.toLocaleString() + ' ₽';
    document.getElementById('user-id').innerText = 'ID: @' + user.$id.slice(-6).toUpperCase();
}
</script>
</body>
</html>
