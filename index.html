<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Interface - owershus</title>
    <style>
        /* Основные стили твоего интерфейса */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212; /* Темная тема под стать твоим проектам */
            color: white;
            margin: 0;
            padding: 20px;
        }

        .bank-container {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 20px; margin-bottom: 20px; }

        /* Стили истории */
        .history-section {
            margin-top: 30px;
        }

        .transaction-card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .transaction-card:active { transform: scale(0.97); }

        .info .title { font-weight: 600; display: block; }
        .info .date { font-size: 12px; color: #888; }
        .amount.negative { color: #ff5f5f; font-weight: bold; }

        /* МОДАЛЬНОЕ ОКНО (ЧЕК) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* Скрыто по умолчанию */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .receipt {
            background: white;
            color: #333;
            width: 85%;
            max-width: 320px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .receipt-icon {
            width: 50px; height: 50px; background: #4CAF50;
            color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 15px; font-size: 24px;
        }

        .receipt-amount { font-size: 26px; font-weight: bold; margin-bottom: 20px; }

        .receipt-details { text-align: left; border-top: 1px dashed #ccc; padding-top: 15px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .row .label { color: #777; }
        .row .val { font-weight: 600; }

        .close-btn {
            margin-top: 20px; width: 100%; padding: 12px;
            background: #000; color: white; border: none;
            border-radius: 12px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="bank-container">
    <h2>Мой Банк</h2>
    
    <!-- Секция баланса (твой текущий интерфейс) -->
    <div style="background: linear-gradient(135deg, #3a3a3a, #1a1a1a); padding: 20px; border-radius: 20px; margin-bottom: 25px;">
        <span style="color: #aaa; font-size: 14px;">Баланс</span>
        <div style="font-size: 28px; font-weight: bold; margin-top: 5px;">45 200,00 ₽</div>
    </div>

    <!-- Кнопка действия (например, для проверки нового чека) -->
    <button onclick="openReceipt('owershus', '2 000 ₽', '30.04.2026')" style="width: 100%; padding: 15px; border-radius: 15px; border: none; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; margin-bottom: 20px;">
        Сделать новый перевод
    </button>

    <div class="history-section">
        <h3>История</h3>
        
        <!-- Записи в истории -->
        <div class="transaction-card" onclick="openReceipt('Steam', '1 500 ₽', '29.04.2026')">
            <div class="info">
                <span class="title">Steam Games</span>
                <span class="date">Вчера, 20:15</span>
            </div>
            <div class="amount negative">- 1 500 ₽</div>
        </div>

        <div class="transaction-card" onclick="openReceipt('owershus', '5 000 ₽', '28.04.2026')">
            <div class="info">
                <span class="title">Перевод owershus</span>
                <span class="date">28 апреля, 12:40</span>
            </div>
            <div class="amount negative">- 5 000 ₽</div>
        </div>
    </div>
</div>

<!-- Всплывающее окно чека -->
<div class="modal-overlay" id="receiptModal">
    <div class="receipt">
        <div class="receipt-icon">✓</div>
        <div style="color: #4CAF50; font-weight: bold;">Операция успешна</div>
        <div class="receipt-amount" id="sumText">0 ₽</div>
        
        <div class="receipt-details">
            <div class="row"><span class="label">Кому</span><span class="val" id="targetText">---</span></div>
            <div class="row"><span class="label">Дата</span><span class="val" id="dateText">---</span></div>
            <div class="row"><span class="label">Статус</span><span class="val">Исполнено</span></div>
            <div class="row"><span class="label">Комиссия</span><span class="val">0 ₽</span></div>
        </div>

        <button class="close-btn" onclick="closeReceipt()">Закрыть</button>
    </div>
</div>

<script>
    // Функция открытия чека
    function openReceipt(name, amount, date) {
        document.getElementById('targetText').innerText = name;
        document.getElementById('sumText').innerText = amount;
        document.getElementById('dateText').innerText = date;
        
        document.getElementById('receiptModal').style.display = 'flex';
    }

    // Функция закрытия чека
    function closeReceipt() {
        document.getElementById('receiptModal').style.display = 'none';
    }

    // Закрытие при клике на темный фон
    window.onclick = function(event) {
        let modal = document.getElementById('receiptModal');
        if (event.target == modal) {
            closeReceipt();
        }
    }
</script>

</body>
</html>
