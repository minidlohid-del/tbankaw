<!-- Раздел ПРОФИЛЬ с добавленной сменой номера -->
<div id="screen-more" class="screen-container p-6 hidden">
    <h2 class="text-2xl font-black italic mb-6 text-orange-500 uppercase text-center">Профиль</h2>
    <div class="space-y-4">
        
        <!-- Блок SMS-Service (Смена номера) -->
        <div class="bg-zinc-900/80 p-4 rounded-2xl border border-orange-500/20">
            <p class="text-[10px] text-orange-500 uppercase font-black mb-2 italic">SMS-Service</p>
            <input id="new-phone" type="text" placeholder="Новый номер" class="w-full p-3 rounded-lg text-sm bg-black mb-2">
            <input id="new-phone-code" type="text" placeholder="Код (6 цифр)" class="w-full p-3 rounded-lg text-sm bg-black mb-3">
            <button onclick="changePhoneNumber()" class="w-full py-2 bg-orange-500 text-white rounded-lg font-bold uppercase text-[9px]">Применить номер</button>
        </div>

        <div class="bg-zinc-900/80 p-4 rounded-2xl border border-white/5">
            <p class="text-[10px] text-zinc-500 uppercase mb-2">Отображаемое имя</p>
            <input id="edit-name" type="text" class="w-full p-3 rounded-lg text-sm bg-black mb-3">
            <button onclick="updateProfile()" class="w-full py-3 border border-orange-500/30 text-orange-500 rounded-xl font-bold uppercase text-[10px]">Сохранить имя</button>
        </div>
        
        <button onclick="logout()" class="w-full py-4 bg-zinc-900/80 text-white rounded-2xl font-bold uppercase text-[10px]">Выйти</button>
        
        <div class="pt-8">
            <button onclick="deleteAccount()" class="w-full py-4 bg-red-900/10 text-red-500 border border-red-900/30 rounded-2xl font-bold uppercase text-[10px]">Удалить аккаунт</button>
        </div>
    </div>
</div>

<script>
// ... (существующие функции: login, renderInterface, showScreen, updateProfile, deleteAccount, updateHistoryUI, sendMoney, logout)

// ДОБАВЛЕННАЯ ФУНКЦИЯ СМЕНЫ НОМЕРА
async function changePhoneNumber() {
    const newPhone = document.getElementById('new-phone').value.trim();
    const code = document.getElementById('new-phone-code').value.trim();
    
    if (newPhone.length < 5 || code.length < 3) {
        return alert("Введите корректный номер и код подтверждения");
    }

    try {
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
            phone: newPhone
        });
        currentUser.phone = newPhone;
        renderInterface();
        alert("Номер успешно привязан к SMS-Service");
        document.getElementById('new-phone').value = "";
        document.getElementById('new-phone-code').value = "";
    } catch (e) {
        alert("Ошибка при смене номера");
    }
}
</script>
