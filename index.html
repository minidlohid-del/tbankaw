<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold V3 Private - Banking</title>
    <style>
        :root {
            --gold: #ffcc00;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .app-box {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 10px rgba(255, 204, 0, 0.1);
            min-height: 600px;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: var(--gold); text-align: center; font-size: 26px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }

        /* Поля ввода */
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            box-sizing: border-box;
            background: #252525;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Банковский интерфейс */
        .balance-card {
            background: linear-gradient(135deg, #222, #111);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #333;
            margin-bottom: 25px;
            text-align: center;
        }

        .history-title { color: var(--gold); margin: 25px 0 10px; font-size: 18px; }

        .history-item {
            background: #222;
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            border-left: 3px solid var(--gold);
        }

        /* ЧЕК (МОДАЛКА) */
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .receipt {
            background: #fff;
            color: #222;
            width: 85%;
            max-width: 300px;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .receipt-header { color: #27ae60; font-size: 50px; margin-bottom: 10px; }
        .receipt-amount { font-size: 28px; font-weight: 900; margin-bottom: 20px; color: #000; }
        .receipt-info { text-align: left; border-top: 1px dashed #bbb; padding-top: 15px; }
        .receipt-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .receipt-line b { color: #000; }
    </style>
</head>
<body>

<div class="app-box">
    <!-- ЭКРАН ВХОДА -->
    <div id="loginScreen" class="screen active">
        <h1>GOLD V3</h1>
        <p style="text-align: center; color: #888;">Вход в систему</p>
        <input type="text" id="userLog" placeholder="Логин">
        <input type="password" id="passLog" placeholder="Пароль">
        <button class="btn" onclick="nav('mainScreen')">Войти</button>
        <p onclick="nav('regScreen')" style="text-align: center; color: var(--gold); cursor: pointer; font-size: 13px;">Нет аккаунта? Регистрация</p>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div id="regScreen" class="screen">
        <h1>Регистрация</h1>
        <input type="text" placeholder="Придумайте логин">
        <input type="password" placeholder="Пароль">
        <button class="btn" onclick="nav('loginScreen')">Создать аккаунт</button>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="mainScreen" class="screen">
        <div class="balance-card">
            <div style="color: #888; font-size: 14px;">Ваш баланс</div>
            <div style="font-size: 30px; font-weight: bold; margin-top: 5px;">82 400 ₽</div>
        </div>

        <div style="background: #222; padding: 15px; border-radius: 15px;">
            <div style="margin-bottom: 10px; color: var(--gold); font-weight: bold;">Новый перевод</div>
            <input type="text" id="friendName" placeholder="Кому (например: Гадан)">
            <input type="number" id="sendSum" placeholder="Сумма ₽">
            <button class="btn" onclick="sendMoney()">Перевести</button>
        </div>

        <div class="history-title">История транзакций</div>
        <div id="historyList">
            <!-- Пример из истории -->
            <div class="history-item" onclick="openCheck('Гадан', '2 500 ₽', '29.04.2026')">
                <div>
                    <div style="font-weight: bold;">Гадану</div>
                    <div style="font-size: 11px; color: #777;">29.04.2026</div>
                </div>
                <div style="color: #ff5555; font-weight: bold;">- 2 500 ₽</div>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНОЕ ОКНО ЧЕКА -->
<div id="modalOverlay">
    <div class="receipt">
        <div class="receipt-header">✓</div>
        <div style="font-weight: bold; color: #27ae60; margin-bottom: 5px;">Перевод исполнен</div>
        <div class="receipt-amount" id="checkSum">0 ₽</div>
        
        <div class="receipt-info">
            <div class="receipt-line"><span>Получатель</span><b id="checkTo">---</b></div>
            <div class="receipt-line"><span>Дата и время</span><b id="checkDate">---</b></div>
            <div class="receipt-line"><span>Комиссия</span><b>0 ₽</b></div>
            <div class="receipt-line"><span>Сервис</span><b>Gold V3 Private</b></div>
        </div>

        <button class="btn" style="background: #e0e0e0; margin-top: 25px;" onclick="closeCheck()">Понятно</button>
    </div>
</div>

<script>
    // Навигация между экранами
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Логика перевода
    function sendMoney() {
        const name = document.getElementById('friendName').value;
        const sum = document.getElementById('sendSum').value;
        const date = new Date().toLocaleString('ru-RU').slice(0, 10);

        if(!name || !sum) return alert("Введите имя друга и сумму!");

        // 1. Добавляем в список истории
        const list = document.getElementById('historyList');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.onclick = () => openCheck(name, sum + ' ₽', date);
        item.innerHTML = `
            <div>
                <div style="font-weight: bold;">${name}</div>
                <div style="font-size: 11px; color: #777;">${date}</div>
            </div>
            <div style="color: #ff5555; font-weight: bold;">- ${sum} ₽</div>
        `;
        list.prepend(item);

        // 2. Показываем чек
        openCheck(name, sum + ' ₽', date);

        // Очистка полей
        document.getElementById('friendName').value = '';
        document.getElementById('sendSum').value = '';
    }

    // Открытие/закрытие чека
    function openCheck(to, amount, date) {
        document.getElementById('checkTo').innerText = to;
        document.getElementById('checkSum').innerText = amount;
        document.getElementById('checkDate').innerText = date;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeCheck() {
        document.getElementById('modalOverlay').style.display = 'none';
    }
</script>

</body>
</html>
