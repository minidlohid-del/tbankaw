<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Elite Cloud V4.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .t-gold-card { 
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%); 
            border: 1px solid rgba(255, 215, 0, 0.2); 
        }
        .t-yellow-btn { background: #ffdd2d; }
        .nav-blur { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
        .active-tab { color: #ffdd2d !important; }
        input { outline: none; border: 1px solid rgba(255,255,255,0.1) !important; background: rgba(24,24,27,0.5) !important; color: white; }
        input:focus { border-color: #ffdd2d !important; }
        .screen-container { height: calc(100vh - 70px); overflow-y: auto; padding-bottom: 30px; }
        
        .qiwi-logo {
            width: 80px; height: 80px;
            background: #ffdd2d;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px;
        }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto h-screen relative">
    
    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="h-full flex flex-col justify-center px-8">
        <div class="text-center mb-10">
            <div class="inline-block p-4 bg-yellow-400 rounded-2xl mb-4 shadow-lg shadow-yellow-400/20">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="text-3xl font-black italic tracking-tighter text-yellow-400 uppercase">T-Bank Cloud</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em] mt-2">Elite Gold Edition V4.1</p>
        </div>

        <div id="login-form" class="space-y-4">
            <input id="login-code" type="text" placeholder="ЛИЧНЫЙ КОД" class="w-full p-4 rounded-2xl text-center font-bold tracking-widest">
            <input id="login-pin" type="password" placeholder="ПИН-КОД" class="w-full p-4 rounded-2xl text-center font-bold tracking-widest">
            <button onclick="login()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider transition-transform active:scale-95">Войти в систему</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer hover:text-yellow-400" onclick="toggleForms()">Нет счета? Создать аккаунт</p>
        </div>

        <div id="register-form" class="hidden space-y-4">
            <input id="reg-name" type="text" placeholder="ИМЯ И ФАМИЛИЯ" class="w-full p-4 rounded-2xl font-bold">
            <input id="reg-pin" type="password" placeholder="ПРИДУМАЙТЕ ПИН (4 ЦИФРЫ)" maxlength="4" class="w-full p-4 rounded-2xl text-center font-bold tracking-widest">
            <button onclick="register()" class="w-full t-yellow-btn text-black font-black py-4 rounded-2xl uppercase tracking-wider transition-transform active:scale-95">Открыть золотой счет</button>
            <p class="text-center text-zinc-500 text-xs mt-6 cursor-pointer hover:text-yellow-400" onclick="toggleForms()">Уже есть счет? Авторизация</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-interface" class="hidden h-full flex flex-col">
        
        <div id="screen-home" class="screen-container p-6">
            <header class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-zinc-800 rounded-full flex items-center justify-center border border-yellow-400/30">
                        <span id="user-initials" class="text-yellow-400 font-bold text-sm"></span>
                    </div>
                    <div class="flex flex-col">
                        <span id="user-name-top" class="font-bold text-sm text-zinc-200"></span>
                        <span id="user-phone-top" class="text-[10px] text-zinc-500 font-mono"></span>
                    </div>
                </div>
            </header>

            <div class="t-gold-card p-8 rounded-[32px] relative overflow-hidden mb-8 shadow-2xl">
                <p class="text-yellow-400/50 text-[10px] font-black uppercase tracking-widest mb-2 italic">Баланс</p>
                <h2 id="balance-disp" class="text-4xl font-black italic tracking-tighter mb-10">0 ₽</h2>
                <div class="flex justify-between items-end">
                    <p id="card-short-disp" class="font-mono text-sm tracking-widest text-zinc-400">•••• 0000</p>
                    <span class="text-yellow-400 font-black italic text-xs">GOLD</span>
                </div>
            </div>

            <h3 class="text-xs font-black uppercase tracking-widest text-zinc-600 mb-4 px-2 italic">История</h3>
            <div id="history-list" class="space-y-3 opacity-30 text-center py-10 italic text-xs uppercase">Нет операций</div>
        </div>

        <div id="screen-payments" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-yellow-400 uppercase">Платежи</h2>
            <div class="bg-zinc-900/50 p-6 rounded-[24px] border border-white/5">
                <input id="pay-target" type="text" placeholder="Номер карты или телефон" class="w-full p-4 rounded-xl mb-3 text-sm">
                <input id="pay-amount" type="number" placeholder="Сумма (₽)" class="w-full p-4 rounded-xl mb-4 text-sm">
                <button id="send-btn" onclick="sendMoney()" class="w-full t-yellow-btn text-black font-black py-4 rounded-xl uppercase text-xs">Отправить</button>
            </div>
        </div>

        <div id="screen-city" class="screen-container p-6 hidden flex flex-col items-center justify-center">
             <h2 class="text-2xl font-black italic mb-10 text-yellow-400 uppercase self-start">Город</h2>
             <div class="text-center">
                <div class="qiwi-logo">
                    <svg width="50" height="50" viewBox="0 0 24 24" fill="black"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.01 13.56c-.05.11-.12.21-.22.28-.1.07-.22.1-.34.1-.12 0-.23-.03-.33-.09l-3.21-1.85c-.17-.1-.28-.28-.28-.48V9.1c0-.12.03-.24.1-.34.07-.1.16-.17.28-.22.11-.05.24-.07.36-.05.12.02.23.08.31.17l3.21 3.73c.1.12.16.27.16.43 0 .15-.05.31-.14.44z"/></svg>
                </div>
                <p class="text-yellow-400 font-black italic uppercase tracking-widest mb-1">QIWI Рынок</p>
                <p class="text-zinc-500 text-[10px] font-bold uppercase">Скоро открытие</p>
             </div>
        </div>

        <div id="screen-info" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-yellow-400 uppercase">Реквизиты</h2>
            <div class="bg-zinc-900/50 p-6 rounded-[24px] border border-white/5 space-y-6">
                <div>
                    <p class="text-zinc-500 text-[9px] uppercase font-bold mb-1">Номер карты</p>
                    <p id="full-card-num" class="text-lg font-mono tracking-wider text-yellow-100 italic"></p>
                </div>
                <div class="flex justify-between">
                    <div>
                        <p class="text-zinc-500 text-[9px] uppercase font-bold mb-1">Личный код (Вход)</p>
                        <p id="full-code-info" class="text-lg font-mono text-yellow-400 italic font-bold"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-zinc-500 text-[9px] uppercase font-bold mb-1">Срок действия</p>
                        <p class="text-lg font-mono text-zinc-200">13/30</p>
                    </div>
                </div>
                <div>
                    <p class="text-zinc-500 text-[9px] uppercase font-bold mb-1">Ваш телефон</p>
                    <p id="full-phone" class="text-lg font-mono text-zinc-200"></p>
                </div>
            </div>
        </div>

        <div id="screen-more" class="screen-container p-6 hidden">
            <h2 class="text-2xl font-black italic mb-6 text-yellow-400 uppercase">Еще</h2>
            <div class="space-y-4">
                <button onclick="logout()" class="w-full bg-zinc-900/30 p-5 rounded-2xl border border-white/5 text-zinc-300 text-xs font-bold uppercase hover:bg-zinc-800 transition-all">Выйти из системы</button>
                <button onclick="deleteAccount()" class="w-full p-5 rounded-2xl border border-red-900/20 text-red-700 text-[10px] font-black uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">Удалить аккаунт навсегда</button>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <nav class="h-[70px] nav-blur flex justify-around items-center absolute bottom-0 left-0 right-0">
            <button onclick="showScreen('home', this)" class="nav-btn active-tab flex flex-col items-center gap-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="text-[8px] font-bold uppercase">Главная</span>
            </button>
            <button onclick="showScreen('payments', this)" class="nav-btn text-zinc-500 flex flex-col items-center gap-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 7l-10 10M7 7h10v10"/></svg>
                <span class="text-[8px] font-bold uppercase">Платежи</span>
            </button>
            <button onclick="showScreen('city', this)" class="nav-btn text-zinc-500 flex flex-col items-center gap-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v20M2 12h20"/></svg>
                <span class="text-[8px] font-bold uppercase">Город</span>
            </button>
            <button onclick="showScreen('info', this)" class="nav-btn text-zinc-500 flex flex-col items-center gap-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                <span class="text-[8px] font-bold uppercase">Реквизиты</span>
            </button>
            <button onclick="showScreen('more', this)" class="nav-btn text-zinc-500 flex flex-col items-center gap-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                <span class="text-[8px] font-bold uppercase">Еще</span>
            </button>
        </nav>
    </div>
</div>

<script>
// ТВОИ АКТУАЛЬНЫЕ ID ИЗ СКРИНШОТОВ
const DB_ID = '69f2543d001072173afd'; 
const COLL_ID = 'users'; 

const { Client, Databases, ID, Query } = Appwrite;
const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('fra-69f253c500057ce0124f');

const databases = new Databases(client);
let currentUser = null;

function toggleForms() {
    document.getElementById('login-form').classList.toggle('hidden');
    document.getElementById('register-form').classList.toggle('hidden');
}

function showScreen(screenId, btn) {
    document.querySelectorAll('.screen-container').forEach(s => s.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.remove('active-tab');
        b.classList.add('text-zinc-500');
    });
    document.getElementById('screen-' + screenId).classList.remove('hidden');
    btn.classList.add('active-tab');
    btn.classList.remove('text-zinc-500');
}

async function register() {
    const name = document.getElementById('reg-name').value;
    const pin = document.getElementById('reg-pin').value;
    if (!name || pin.length !== 4) return alert("Введите имя и ПИН (4 цифры)");

    try {
        const personalCode = Math.floor(100 + Math.random() * 899).toString();
        const cardNumber = "2022 " + Array.from({length: 3}, () => Math.floor(1000 + Math.random() * 8999)).join(" ");
        const phone = "+7912" + Math.floor(1000000 + Math.random() * 8999999);

        await databases.createDocument(DB_ID, COLL_ID, ID.unique(), {
            name: name,
            pin: pin,
            code: personalCode, // Исправлено на 'code'
            phone: phone,
            balance: 100,
            cardNumber: cardNumber,
            cardDate: "13/30"
        });

        alert(`Счет открыт!\nВАШ ЛИЧНЫЙ КОД: ${personalCode}\nПИН: ${pin}`);
        location.reload();
    } catch (e) {
        alert("Ошибка регистрации: " + e.message);
    }
}

async function login() {
    const code = document.getElementById('login-code').value;
    const pin = document.getElementById('login-pin').value;
    try {
        // ИСПРАВЛЕНО: 'code' вместо 'personalCode'
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('code', code),
            Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            renderInterface();
        } else alert("Неверный код или ПИН");
    } catch (e) {
        alert("Ошибка входа: " + e.message + "\nПроверьте Indexes в Appwrite!");
    }
}

function renderInterface() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main-interface').classList.remove('hidden');
    document.getElementById('user-name-top').innerText = currentUser.name;
    document.getElementById('user-phone-top').innerText = currentUser.phone;
    document.getElementById('user-initials').innerText = currentUser.name[0].toUpperCase();
    document.getElementById('balance-disp').innerText = (currentUser.balance || 0).toLocaleString() + " ₽";
    document.getElementById('card-short-disp').innerText = "•••• " + (currentUser.cardNumber || "0000").slice(-4);
    document.getElementById('full-card-num').innerText = currentUser.cardNumber;
    document.getElementById('full-phone').innerText = currentUser.phone;
    document.getElementById('full-code-info').innerText = currentUser.code;
}

async function deleteAccount() {
    if (confirm("ВНИМАНИЕ: Ваш золотой счет будет полностью уничтожен. Продолжить?")) {
        try {
            await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
            alert("Счет успешно аннулирован.");
            location.reload();
        } catch (e) {
            alert("Ошибка удаления: " + e.message);
        }
    }
}

async function sendMoney() {
    const target = document.getElementById('pay-target').value;
    const amount = parseInt(document.getElementById('pay-amount').value);
    const btn = document.getElementById('send-btn');
    
    if (!target || !amount || amount <= 0) return alert("Введите данные корректно");
    if (amount > currentUser.balance) return alert("Недостаточно средств");

    btn.disabled = true;
    btn.innerText = "ОТПРАВКА...";

    try {
        let search = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('phone', target)]);
        if (search.documents.length === 0) {
            search = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('cardNumber', target)]);
        }

        if (search.documents.length === 0) {
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ";
            return alert("Получатель не найден");
        }
        
        const recipient = search.documents[0];
        if (recipient.$id === currentUser.$id) {
            btn.disabled = false;
            btn.innerText = "ОТПРАВИТЬ";
            return alert("Нельзя переводить самому себе");
        }

        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { balance: currentUser.balance - amount });
        await databases.updateDocument(DB_ID, COLL_ID, recipient.$id, { balance: recipient.balance + amount });

        currentUser.balance -= amount;
        document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
        
        alert("Перевод успешно выполнен!");
        document.getElementById('pay-target').value = "";
        document.getElementById('pay-amount').value = "";
        
    } catch (e) {
        alert("Ошибка транзакции: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "ОТПРАВИТЬ";
    }
}

function logout() { location.reload(); }
</script>
</body>
</html>
