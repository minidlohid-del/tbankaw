<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>T-Bank Elite Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        /* Твой оригинальный стиль из скриншота */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .auth-container {
            background-color: #111;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            width: 380px;
        }

        h1 {
            color: #bfa330;
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background-color: #44464a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 5px;
            background-color: #7a6207;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Новые блоки меню в твоем стиле */
        .hidden { display: none; }
        .card-box {
            background: #222;
            padding: 20px;
            border: 1px solid #7a6207;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .small-text { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1>T-BANK CLOUD</h1>

        <!-- ФОРМА ВХОДА -->
        <div id="login-screen">
            <input type="text" id="name" placeholder="Имя">
            <input type="password" id="pin" placeholder="••••" maxlength="4">
            <button onclick="handleAuth()">ОТКРЫТЬ ЗОЛОТОЙ СЧЕТ</button>
        </div>

        <!-- ГЛАВНОЕ МЕНЮ -->
        <div id="main-menu" class="hidden">
            <h2 id="user-greeting" style="color: #bfa330;"></h2>
            <button onclick="showScreen('requisites-screen')">РЕКВИЗИТЫ</button>
            <button onclick="showScreen('settings-screen')">НАСТРОЙКИ</button>
            <button onclick="location.reload()" style="background: #333; color: #fff;">ВЫЙТИ</button>
        </div>

        <!-- РЕКВИЗИТЫ -->
        <div id="requisites-screen" class="hidden">
            <div class="card-box">
                <div class="small-text">Elite Gold Card</div>
                <div id="card-num" style="margin: 15px 0; font-size: 18px; letter-spacing: 2px;"></div>
                <div style="display: flex; justify-content: space-between;">
                    <span id="card-holder" style="text-transform: uppercase;"></span>
                    <span id="card-exp"></span>
                </div>
            </div>
            <input type="text" placeholder="Номер для перевода">
            <button onclick="alert('Переводы временно недоступны')">ПЕРЕВЕСТИ</button>
            <button onclick="showScreen('main-menu')" style="background: #333; color: #fff;">НАЗАД</button>
        </div>

        <!-- НАСТРОЙКИ -->
        <div id="settings-screen" class="hidden">
            <input type="text" id="upd-name" placeholder="Новое имя">
            <input type="password" id="upd-pin" placeholder="Новый ПИН" maxlength="4">
            <button onclick="updateData()">СОХРАНИТЬ</button>
            <button onclick="deleteAccount()" style="background: #600; color: #fff;">УДАЛИТЬ АККАУНТ</button>
            <button onclick="showScreen('main-menu')" style="background: #333; color: #fff;">НАЗАД</button>
        </div>
    </div>

    <script>
        const { Client, Databases, ID, Query } = Appwrite;
        const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
        const db = new Databases(client);

        let userDoc = null;

        const rndCard = () => `2202 ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)}`;
        const rndDate = () => `${String(Math.floor(1+Math.random()*12)).padStart(2,'0')}/${Math.floor(26+Math.random()*5)}`;

        async function handleAuth() {
            const name = document.getElementById('name').value;
            const pin = document.getElementById('pin').value;
            try {
                const res = await db.listDocuments('bank_db', 'users', [Query.equal('name', name), Query.equal('pin', pin)]);
                if (res.documents.length > 0) {
                    enterBank(res.documents[0]);
                } else {
                    const code = Math.floor(100000 + Math.random() * 900000);
                    const newUser = await db.createDocument('bank_db', 'users', ID.unique(), {
                        name: name, pin: pin, personalCode: String(code),
                        cardNumber: rndCard(), cardDate: rndDate()
                    });
                    alert("Ваш код: " + code);
                    enterBank(newUser);
                }
            } catch (e) { alert("Ошибка сети. Проверь атрибуты в Appwrite."); }
        }

        function enterBank(doc) {
            userDoc = doc;
            document.getElementById('user-greeting').innerText = "Привет, " + doc.name;
            document.getElementById('card-num').innerText = doc.cardNumber || "Ошибка карты";
            document.getElementById('card-holder').innerText = doc.name;
            document.getElementById('card-exp').innerText = doc.cardDate || "00/00";
            showScreen('main-menu');
        }

        function showScreen(id) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('requisites-screen').classList.add('hidden');
            document.getElementById('settings-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        async function updateData() {
            const n = document.getElementById('upd-name').value;
            const p = document.getElementById('upd-pin').value;
            await db.updateDocument('bank_db', 'users', userDoc.$id, { name: n, pin: p });
            location.reload();
        }

        async function deleteAccount() {
            if(confirm("Удалить счет?")) {
                await db.deleteDocument('bank_db', 'users', userDoc.$id);
                location.reload();
            }
        }
    </script>
</body>
</html>
