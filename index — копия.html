<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Bank Cloud Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        /* Сохраняем твой оригинальный стиль */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
            width: 350px;
        }

        h1 { color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ffcc00;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #e6b800; transform: scale(1.02); }

        /* Стили для новых меню */
        .menu-section { display: none; margin-top: 20px; text-align: left; }
        
        .bank-card {
            background: linear-gradient(135deg, #444, #111);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #ffcc00;
            margin-bottom: 20px;
        }

        .card-number { font-size: 1.2em; letter-spacing: 3px; margin: 15px 0; display: block; }
        .secondary-btn { background: #333; color: #fff; font-size: 0.9em; }
        .danger-btn { background: #900; color: #fff; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <h1>T-BANK CLOUD</h1>
        
        <!-- Форма входа/регистрации -->
        <div id="auth-form">
            <input type="text" id="name" placeholder="Ваше имя">
            <input type="password" id="pin" placeholder="ПИН-код (4 цифры)" maxlength="4">
            <button onclick="handleAuth()">ОТКРЫТЬ ЗОЛОТОЙ СЧЕТ</button>
            <p id="status" style="font-size: 0.8em; color: #888;"></p>
        </div>

        <!-- Главное меню (после входа) -->
        <div id="main-menu" class="menu-section">
            <h2 id="welcome-msg"></h2>
            <button onclick="showSection('requisites')">РЕКВИЗИТЫ</button>
            <button onclick="showSection('settings')">НАСТРОЙКИ</button>
            <button onclick="logout()" class="secondary-btn">ВЫЙТИ</button>
        </div>

        <!-- Секция Реквизиты -->
        <div id="requisites" class="menu-section">
            <div class="bank-card">
                <small>Elite Gold Edition</small>
                <span class="card-number" id="display-card-number">0000 0000 0000 0000</span>
                <div style="display: flex; justify-content: space-between;">
                    <span id="display-card-name">NAME</span>
                    <span id="display-card-date">00/00</span>
                </div>
            </div>
            <input type="text" placeholder="Номер карты или телефона">
            <button onclick="alert('Переводы временно недоступны')">ПЕРЕВЕСТИ</button>
            <button onclick="showSection('main-menu')" class="secondary-btn">НАЗАД</button>
        </div>

        <!-- Секция Настройки -->
        <div id="settings" class="menu-section">
            <h3>НАСТРОЙКИ</h3>
            <input type="text" id="new-name" placeholder="Новое имя">
            <input type="password" id="new-pin" placeholder="Новый ПИН" maxlength="4">
            <button onclick="updateProfile()">СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
            <button onclick="deleteAccount()" class="danger-btn">УДАЛИТЬ АККАУНТ</button>
            <button onclick="showSection('main-menu')" class="secondary-btn">НАЗАД</button>
        </div>
    </div>

    <script>
        const { Client, Databases, ID, Query } = Appwrite;
        const client = new Client()
            .setEndpoint('https://cloud.appwrite.io/v1')
            .setProject('69f223f4002d7c30c1b9'); // Твой ID проекта

        const databases = new Databases(client);
        const DB_ID = 'bank_db';
        const COLL_ID = 'users';

        let currentUser = null;

        // Рандомная генерация
        const genCard = () => `2202 ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)} ${Math.floor(1000+Math.random()*9000)}`;
        const genDate = () => `${String(Math.floor(1+Math.random()*12)).padStart(2,'0')}/${Math.floor(26+Math.random()*5)}`;

        async function handleAuth() {
            const name = document.getElementById('name').value;
            const pin = document.getElementById('pin').value;
            
            try {
                const res = await databases.listDocuments(DB_ID, COLL_ID, [
                    Query.equal('name', name),
                    Query.equal('pin', pin)
                ]);

                if (res.documents.length > 0) {
                    login(res.documents[0]);
                } else {
                    const code = Math.floor(100000 + Math.random() * 900000);
                    const newUser = await databases.createDocument(DB_ID, COLL_ID, ID.unique(), {
                        name: name,
                        pin: pin,
                        personalCode: String(code),
                        cardNumber: genCard(),
                        cardDate: genDate()
                    });
                    alert(`Ваш личный код: ${code}`);
                    login(newUser);
                }
            } catch (e) {
                alert("Ошибка сети. Проверь платформу в Appwrite.");
            }
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-form').style.display = 'none';
            showSection('main-menu');
            document.getElementById('welcome-msg').innerText = `Привет, ${user.name}`;
            
            // Заполняем реквизиты
            document.getElementById('display-card-number').innerText = user.cardNumber;
            document.getElementById('display-card-date').innerText = user.cardDate;
            document.getElementById('display-card-name').innerText = user.name.toUpperCase();
        }

        function showSection(id) {
            document.querySelectorAll('.menu-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        async function updateProfile() {
            const nName = document.getElementById('new-name').value;
            const nPin = document.getElementById('new-pin').value;
            if(!nName || !nPin) return alert("Заполните поля");

            await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { name: nName, pin: nPin });
            alert("Данные обновлены. Перезайдите.");
            location.reload();
        }

        async function deleteAccount() {
            if(confirm("Удалить счет безвозвратно?")) {
                await databases.deleteDocument(DB_ID, COLL_ID, currentUser.$id);
                location.reload();
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
