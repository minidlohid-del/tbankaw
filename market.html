<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | HARDCORE & ANTI-CHEAT</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #3399ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { padding: 10px 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .search-container { width: 100%; position: relative; margin-top: 10px; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; width: 100%; background: #151515; z-index: 1000; border-radius: 0 0 10px 10px; display: none; border: 1px solid var(--green); max-height: 200px; overflow-y: auto; }
        .search-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .container { padding: 15px; }
        .item { display: flex; align-items: center; background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        .img-box { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.7em; font-weight: bold; cursor: pointer; }
        .n-btn.active { color: var(--green); }
        .btn { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .mine-btn { width: 160px; height: 160px; border-radius: 50%; border: 5px solid var(--green); background: none; color: var(--green); font-size: 1.5em; font-weight: bold; cursor: pointer; margin-top: 20px; transition: transform 0.1s; }
        .mine-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--green)">KIWI ELITE</h1>
        <input type="text" id="cid" placeholder="ЦИФРЫ КАРТЫ" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <button class="btn buy" style="width:300px; margin-top:15px" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size: 0.85em;">ID: <span id="pub-id" style="color:var(--green); font-weight: 900;">...</span></div>
                <div style="text-align: right;">
                    <div style="color:var(--green); font-weight:bold;"><span id="bal-main">0</span> ₽</div>
                    <div style="color:var(--blue); font-size:0.8em;"><span id="bal-market">0</span> ₽</div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Поиск по ID..." oninput="liveSearch()">
                <div id="search-results"></div>
            </div>
        </div>

        <div class="container" id="screen"></div>

        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins')">БИРЖА</button>
            <button class="n-btn" onclick="tab('nfts')">МАРКЕТ</button>
            <button class="n-btn" onclick="tab('work')">РАБОТА</button>
            <button class="n-btn" onclick="tab('inv')">СКЛАД</button>
            <button class="n-btn" onclick="tab('me')">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';

let user = null;
let clicks = 0;
let lastClickTime = 0;

async function login() {
    const c = String(document.getElementById('cid').value), p = String(document.getElementById('pin').value);
    if(!c || !p) return;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("Неверный PIN");
        } else {
            const genID = "ID" + Math.floor(100000 + Math.random() * 899999);
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { 
                personalCode: c, pin: p, balance: 1000, publicID: genID, marketBalance: 0 
            });
        }
        startApp();
    } catch(e) { alert("Ошибка входа"); }
}

function startApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('pub-id').innerText = user.publicID;
    updateUI(); tab('coins');
}

function updateUI() { 
    document.getElementById('bal-main').innerText = Math.floor(user.balance).toLocaleString(); 
    document.getElementById('bal-market').innerText = Math.floor(user.marketBalance || 0).toLocaleString(); 
}

// АНТИ-КЛИКЕР (ЗАЩИТА)
function mine() {
    const currentTime = new Date().getTime();
    if (currentTime - lastClickTime < 80) return; // Слишком быстро = игнор
    lastClickTime = currentTime;

    clicks++;
    document.getElementById('click-count').innerText = clicks;
    
    if(clicks % 10 === 0) {
        user.marketBalance = (user.marketBalance || 0) + 30;
        updateUI();
        db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance });
    }
    if(clicks % 15 === 0) {
        db.createDocument(DB_ID, MARKET, ID.unique(), { 
            name: "Добытый Киви", price: 50, ownerId: user.$id, image: "photo_2026-04-29_23-50-11.jpg" 
        });
    }
}

// ПРОДАЖА С ЗАЩИТОЙ ОТ ДАБЛ-КЛИКА
async function sellItem(id, price, btn) {
    btn.disabled = true; // Сразу выключаем кнопку
    const earn = Math.floor(price * 0.7);
    user.marketBalance = (user.marketBalance || 0) + earn;
    updateUI();
    
    try {
        await db.deleteDocument(DB_ID, MARKET, id);
        await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance });
        const el = document.getElementById(`item-${id}`);
        if(el) el.remove();
    } catch(e) {
        btn.disabled = false;
        alert("Ошибка продажи");
    }
}

async function withdraw() {
    const mb = user.marketBalance || 0;
    if(mb < 500) return alert("Нужно минимум 500 ₽");
    
    // Комиссия 70% (из 50 получаешь 15)
    const result = Math.floor(mb * 0.3); 
    const fee = mb - result;

    if(confirm(`Вывод: ${mb} ₽\nКомиссия системы: ${fee} ₽\nК зачислению: ${result} ₽`)) {
        user.balance += result;
        user.marketBalance = 0;
        updateUI();
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance, marketBalance: 0 });
        tab('me');
    }
}

async function tab(t) {
    const screen = document.getElementById('screen');
    screen.innerHTML = `<h2 style="color:var(--green);">${t.toUpperCase()}</h2>`;
    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
    
    if(t === 'coins') renderList('Coin', 8, 3000);
    if(t === 'nfts') renderList('NFT-Elite', 5, 8000);
    if(t === 'work') {
        screen.innerHTML += `
            <div style="text-align:center; padding:30px;">
                <h1 id="click-count" style="color:var(--green); font-size:4em; margin:0;">0</h1>
                <button onclick="mine()" class="mine-btn">МАЙНИТЬ</button>
                <p style="color:gray; margin-top:20px;">Защита от кликера: Активна</p>
            </div>`;
    }
    if(t === 'inv') renderInventory();
    if(t === 'me') renderProfile();
}

function renderList(type, count, base) {
    const screen = document.getElementById('screen');
    for(let i=1; i<=count; i++) {
        let p = base + (i * 1000) + Math.floor(Math.random() * 500);
        screen.innerHTML += `
            <div class="item">
                <div class="img-box"><img src="photo_2026-04-29_23-50-11.jpg"></div>
                <div style="flex:1"><b>${type} #${i}</b><br><small>${p} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('${type} #${i}', ${p})">КУПИТЬ</button>
            </div>`;
    }
}

async function buyAsset(name, price) {
    if(user.balance < price) return alert("Мало денег в банке");
    user.balance -= price;
    updateUI();
    try {
        await db.createDocument(DB_ID, MARKET, ID.unique(), { 
            name: name, price: price, ownerId: user.$id, image: "photo_2026-04-29_23-50-11.jpg" 
        });
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
        alert("Куплено!");
    } catch(e) {}
}

async function renderInventory() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
        res.documents.forEach(doc => {
            screen.innerHTML += `
                <div class="item" id="item-${doc.$id}">
                    <div class="img-box"><img src="${doc.image}"></div>
                    <div style="flex:1"><b>${doc.name}</b></div>
                    <button class="btn sell" onclick="sellItem('${doc.$id}', ${doc.price}, this)">ПРОДАТЬ</button>
                </div>`;
        });
    } catch(e) {}
}

function renderProfile() {
    document.getElementById('screen').innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; text-align:center; border:1px solid #222;">
            <p style="color:gray;">ВАШ ID В СЕТИ</p>
            <h2 style="color:var(--green); font-size:2.3em; margin:10px 0;">${user.publicID}</h2>
            <div style="margin-top:20px; border-top:1px solid #222; padding-top:10px;">
                <p>БАНК: ${user.balance} ₽</p>
                <p>МАРКЕТ: ${user.marketBalance || 0} ₽</p>
                <button class="btn buy" style="width:100%; padding:15px" onclick="withdraw()">ВЫВОД (ОТ 500)</button>
            </div>
        </div>`;
}

async function liveSearch() {
    const val = document.getElementById('search-input').value.trim();
    const resDiv = document.getElementById('search-results');
    if(val.length < 2) { resDiv.style.display = 'none'; return; }
    try {
        const q = val.toUpperCase().startsWith('ID') ? val : "ID" + val;
        const r = await db.listDocuments(DB_ID, USERS, [Query.startsWith('publicID', q)]);
        resDiv.innerHTML = '';
        if(r.documents.length > 0) {
            resDiv.style.display = 'block';
            r.documents.forEach(u => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `👤 ${u.publicID}`;
                item.onclick = () => alert(`ID: ${u.publicID}\nБанк: ${u.balance} ₽`);
                resDiv.appendChild(item);
            });
        }
    } catch(e) {}
}
</script>
</body>
</html>
