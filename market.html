<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD V3 | MARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --gold: #ffd700; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; user-select: none; overflow: hidden; }
        
        .header { position: fixed; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; z-index: 1000; }
        .stat { background: #111; border: 1px solid var(--gold); padding: 8px 15px; border-radius: 12px; font-size: 0.9em; box-shadow: 0 0 10px rgba(255,215,0,0.1); }
        .stat b { color: var(--gold); display: block; font-size: 0.7em; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; border-top: 1px solid #222; }
        .n-btn { flex: 1; padding: 20px; background: none; border: none; color: #444; font-weight: bold; cursor: pointer; }
        .n-btn.active { color: var(--gold); }

        #screen { height: 100vh; padding-top: 100px; display: flex; flex-direction: column; align-items: center; }
        
        .mine-btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 6px solid var(--gold); 
            background: radial-gradient(circle, #222, #000); color: var(--gold); font-size: 3em; font-weight: bold;
            cursor: pointer; transition: 0.1s; box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        .mine-btn:active { transform: scale(0.9); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal { background: #111; border: 1px solid var(--gold); padding: 25px; border-radius: 20px; width: 90%; max-width: 320px; text-align: center; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: black; }

        #auth { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .inpt { background: #111; border: 1px solid #222; color: white; padding: 15px; width: 280px; margin: 5px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="auth">
    <h1 style="color:var(--gold); letter-spacing:8px;">GOLD V3</h1>
    <input type="text" id="cid" class="inpt" placeholder="ID КАРТЫ">
    <input type="password" id="pin" class="inpt" placeholder="PIN">
    <button class="btn btn-gold" style="width:280px;" onclick="login()">ВХОД</button>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 style="color:var(--gold);">ВЫВОД СРЕДСТВ</h3>
        <div style="background:#000; padding:15px; border-radius:12px; text-align: left;">
            <div style="display:flex;justify-content:space-between"><span>Сумма:</span> <span id="m-sum">0 ₽</span></div>
            <div style="display:flex;justify-content:space-between;color:red;"><span>Комиссия:</span> <span>90%</span></div>
            <div style="display:flex;justify-content:space-between;border-top:1px solid #222;margin-top:10px;padding-top:10px;"><span>К зачислению:</span> <span id="m-net" style="color:var(--gold);">0 ₽</span></div>
        </div>
        <button class="btn btn-gold" id="confirm-btn" onclick="confirmWithdraw()">ПОДТВЕРДИТЬ</button>
        <button class="btn" style="background:#222;color:gray;" onclick="closeModal()">ОТМЕНА</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div class="stat"><b>БАНК</b> <span id="bal-bank">0</span> ₽</div>
        <div class="stat" style="border-color:#00ccff;"><b>МАРКЕТ</b> <span id="bal-market" style="color:#00ccff;">0</span> ₽</div>
    </div>
    <div id="screen"></div>
    <nav class="nav">
        <button class="n-btn active" onclick="tab('work', this)">РАБОТА</button>
        <button class="n-btn" onclick="tab('me', this)">ПРОФИЛЬ</button>
    </nav>
</div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
// Все ID взяты строго с твоих скриншотов
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users';

let user = null;
let clicks = 0;
let isSyncing = false;

function getNum(v) { return isNaN(Number(v)) ? 0 : Number(v); }

async function login() {
    const c = document.getElementById('cid').value, p = document.getElementById('pin').value;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("PIN неверный");
        } else {
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { 
                personalCode: c, pin: p, balance: 1000, marketBalance: 0 
            });
        }
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        updateUI();
        tab('work', document.querySelector('.n-btn'));
    } catch(e) { alert("Ошибка входа: " + e.message); }
}

function updateUI() {
    if(!user) return;
    document.getElementById('bal-bank').innerText = getNum(user.balance).toLocaleString();
    document.getElementById('bal-market').innerText = getNum(user.marketBalance).toLocaleString();
}

async function tab(name, btn) {
    const s = document.getElementById('screen');
    if(btn) { document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    if(name === 'work') {
        s.innerHTML = `
            <p style="color:gray;">ЦЕЛЬ: 15 КЛИКОВ</p>
            <h1 style="font-size:4em;margin:10px 0;color:var(--gold);" id="cc">${clicks}</h1>
            <button class="mine-btn" onclick="doWork()">GOLD</button>
            <p id="st" style="margin-top:20px;color:gray;"></p>`;
    }

    if(name === 'me') {
        const fresh = await db.getDocument(DB_ID, USERS, user.$id);
        user.marketBalance = getNum(fresh.marketBalance);
        updateUI();
        s.innerHTML = `
            <div style="background:#111;padding:30px;border-radius:25px;border:1px solid #222;width:85%;text-align:center;">
                <p style="color:gray;font-size:0.8em;margin:0;">СЧЕТ МАРКЕТА</p>
                <h1 style="font-size:3em;margin:10px 0;color:#00ccff;">${getNum(user.marketBalance).toLocaleString()} ₽</h1>
                <button class="btn btn-gold" onclick="openWithdraw()">ВЫВЕСТИ В БАНК</button>
            </div>`;
    }
}

async function doWork() {
    clicks++;
    document.getElementById('cc').innerText = clicks;
    if(clicks % 15 === 0 && !isSyncing) {
        isSyncing = true;
        document.getElementById('st').innerText = "Синхронизация...";
        try {
            const fresh = await db.getDocument(DB_ID, USERS, user.$id);
            const newM = getNum(fresh.marketBalance) + 50;
            await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: newM });
            user.marketBalance = newM;
            updateUI();
            document.getElementById('st').innerText = "Зачислено +50 ₽";
        } catch(e) { document.getElementById('st').innerText = "Ошибка: " + e.message; }
        finally { isSyncing = false; }
    }
}

function openWithdraw() {
    const m = getNum(user.marketBalance);
    if(m < 500) return alert("Нужно минимум 500 ₽");
    const net = Math.floor(m * 0.1);
    document.getElementById('m-sum').innerText = m + " ₽";
    document.getElementById('m-net').innerText = net + " ₽";
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function confirmWithdraw() {
    try {
        const fresh = await db.getDocument(DB_ID, USERS, user.$id);
        const m = getNum(fresh.marketBalance);
        if(m < 500) return alert("Мало денег");
        const payout = Math.floor(m * 0.1);
        const newB = getNum(fresh.balance) + payout;
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: newB, marketBalance: 0 });
        user.balance = newB; user.marketBalance = 0;
        updateUI(); closeModal(); tab('me');
        alert("Выведено: " + payout + " ₽");
    } catch(e) { alert(e.message); }
}
</script>
</body>
</html>
