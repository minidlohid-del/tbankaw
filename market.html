<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiMarket — Фарминг и Вывод</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        .kiwi-coin { 
            width: 200px; height: 200px; 
            background: radial-gradient(circle, #ff8c00 0%, #cc7000 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.2);
            display: flex; items-center; justify-content: center;
            cursor: pointer; transition: transform 0.05s;
        }
        .kiwi-coin:active { transform: scale(0.92); }
        .card-glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-6">

    <!-- ВХОД -->
    <div id="auth-section" class="w-full max-w-xs p-6 card-glass rounded-[32px]">
        <h2 class="text-center font-black text-orange-500 mb-6 uppercase tracking-tighter">Вход в Маркет</h2>
        <input id="auth-code" type="text" placeholder="Код входа банка" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-3 text-center font-bold text-white">
        <input id="auth-pin" type="password" placeholder="Пин-код" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-4 text-center font-bold text-white">
        <button onclick="linkBank()" class="w-full bg-orange-500 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Авторизация</button>
    </div>

    <!-- ИНТЕРФЕЙС ФАРМИНГА -->
    <div id="market-section" class="hidden w-full max-w-sm flex flex-col items-center">
        
        <!-- СЧЕТ МАРКЕТА -->
        <div class="w-full card-glass p-6 rounded-[32px] mb-8 text-center">
            <p class="text-zinc-500 text-[10px] uppercase font-black tracking-widest mb-1">Нафармлено в Маркете</p>
            <h2 id="market-balance-disp" class="text-5xl font-black italic tracking-tighter text-white">0 ₽</h2>
            
            <div class="mt-6 pt-6 border-t border-white/5">
                <p class="text-[9px] text-zinc-500 uppercase mb-3">Минимальный вывод: <b>500 ₽</b> | Комиссия: <b>90%</b></p>
                <button onclick="withdrawFunds()" class="w-full py-3 bg-zinc-800 hover:bg-orange-500 text-white rounded-xl text-[10px] font-black uppercase transition">
                    Вывести в банк
                </button>
            </div>
        </div>

        <!-- МОНЕТА -->
        <div class="kiwi-coin" id="coin-trigger">
            <span class="text-7xl font-black italic text-black/20">K</span>
        </div>

        <div class="mt-10 text-center">
            <p id="sync-status" class="text-orange-500 text-[8px] font-black uppercase tracking-[0.3em] opacity-0">Синхронизация...</p>
            <button onclick="location.href='index.html'" class="mt-4 text-zinc-600 text-[10px] font-bold uppercase tracking-widest">Вернуться в банк</button>
        </div>
    </div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const { Client, Databases, Query } = Appwrite;

const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

let currentUser = null;
let marketBalance = 0; // Внутренний счет маркета
let syncTimeout = null;

async function linkBank() {
    const code = document.getElementById('auth-code').value;
    const pin = document.getElementById('auth-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            // Подгружаем нафармленное (используем доп. поле если есть, или начинаем с 0)
            marketBalance = currentUser.market_wallet || 0; 
            startMarket();
        } else alert("Ошибка данных");
    } catch (e) { alert("Нет связи с базой"); }
}

function startMarket() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('market-section').classList.remove('hidden');
    updateDisplay();
    
    document.getElementById('coin-trigger').addEventListener('pointerdown', () => {
        marketBalance += 1;
        updateDisplay();
        saveProgress();
    });
}

function updateDisplay() {
    document.getElementById('market-balance-disp').innerText = marketBalance.toLocaleString() + " ₽";
}

// Сохраняем прогресс кликов в отдельное поле market_wallet
function saveProgress() {
    document.getElementById('sync-status').style.opacity = "1";
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(async () => {
        try {
            await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
                market_wallet: marketBalance
            });
            document.getElementById('sync-status').style.opacity = "0";
        } catch (e) { console.error("Ошибка сейва"); }
    }, 1000);
}

// ФУНКЦИЯ ВЫВОДА С КОМИССИЕЙ 90%
async function withdrawFunds() {
    if (marketBalance < 500) {
        return alert("Минимальная сумма для вывода — 500 ₽");
    }

    const confirmWithdraw = confirm(`Вывести ${marketBalance} ₽?\nС учетом комиссии 90% вы получите ${Math.floor(marketBalance * 0.1)} ₽ на основной счет.`);
    
    if (!confirmWithdraw) return;

    try {
        const amountToReceive = Math.floor(marketBalance * 0.1); // Получаешь 10% (комиссия 90%)
        const newBankBalance = (currentUser.balance || 0) + amountToReceive;

        // Обнуляем баланс маркета и прибавляем к балансу банка
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
            balance: newBankBalance,
            market_wallet: 0
        });

        alert(`Успешно! На ваш счет зачислено ${amountToReceive} ₽ (Комиссия KiwiMarket 90% удержана).`);
        marketBalance = 0;
        currentUser.balance = newBankBalance;
        updateDisplay();
    } catch (e) {
        alert("Ошибка при транзакции");
    }
}
</script>
</body>
</html>
