<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE EXCHANGE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .yellow-circle { width: 12px; height: 12px; background: #ffdd2d; border-radius: 50%; display: inline-block; }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; }
        .h-scroll { display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; padding-bottom: 5px; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .tab-btn.active { color: #ffdd2d; border-bottom: 2px solid #ffdd2d; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-black">

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="p-6 pt-24 max-w-sm mx-auto">
        <div class="text-center mb-10">
            <div class="inline-block w-16 h-16 bg-yellow-400 rounded-full mb-4 shadow-[0_0_30px_rgba(255,221,45,0.3)]"></div>
            <h1 class="text-3xl font-black italic text-yellow-400 uppercase tracking-tighter">KIWI TERMINAL</h1>
        </div>
        <div class="glass-card p-8 border-zinc-900 shadow-2xl">
            <input id="login-code" type="password" maxlength="3" placeholder="•••" class="w-full bg-transparent border-b-2 border-zinc-800 p-4 mb-6 text-center text-3xl outline-none focus:border-yellow-400 transition-all font-mono">
            <input id="login-pin" type="password" maxlength="4" placeholder="••••" class="w-full bg-transparent border-b-2 border-zinc-800 p-4 mb-10 text-center text-xl outline-none focus:border-yellow-400 transition-all font-mono">
            <button onclick="auth()" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl active:scale-95 transition-all uppercase tracking-widest">Авторизация</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden min-h-screen flex flex-col">
        <!-- Шапка -->
        <div class="p-5 flex justify-between items-end sticky top-0 bg-black/80 backdrop-blur-md z-20 border-b border-zinc-900">
            <div>
                <p id="user-at" class="text-zinc-600 text-[9px] font-bold uppercase tracking-[0.2em] mb-1">ID: @NOT_AUTH</p>
                <p id="user-balance" class="text-2xl font-black text-yellow-400 italic">0 ₽</p>
            </div>
            <button onclick="showSearch()" class="p-3 bg-zinc-900 rounded-full text-xl shadow-lg">🔍</button>
        </div>

        <!-- Навигация -->
        <div class="flex justify-around bg-zinc-950 border-b border-zinc-900 sticky top-[77px] z-20">
            <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn py-4 px-2 text-[10px] font-black active uppercase tracking-wider">Крипта</button>
            <button onclick="switchTab('market')" id="tab-market" class="tab-btn py-4 px-2 text-[10px] font-black text-zinc-500 uppercase tracking-wider">Рынок</button>
            <button onclick="switchTab('inv')" id="tab-inv" class="tab-btn py-4 px-2 text-[10px] font-black text-zinc-500 uppercase tracking-wider">Инвентарь</button>
            <button onclick="switchTab('profile')" id="tab-profile" class="tab-btn py-4 px-2 text-[10px] font-black text-zinc-500 uppercase tracking-wider">Профиль</button>
        </div>

        <!-- КОНТЕНТ -->
        <div id="tab-content" class="flex-1 pb-10">
            
            <!-- КРИПТА -->
            <div id="section-crypto" class="p-5 animate-in fade-in duration-500">
                <div class="h-scroll mb-10" id="crypto-list"></div>
                
                <div class="glass-card p-6 border-yellow-500/20 bg-gradient-to-b from-zinc-900/50 to-black">
                    <div class="flex justify-between items-center mb-4">
                        <p class="text-[10px] text-zinc-400 uppercase font-black tracking-widest">Риск-Игра (25%)</p>
                        <span class="text-[9px] bg-yellow-400 text-black px-2 py-0.5 rounded font-bold italic">WIN x3</span>
                    </div>
                    <div class="flex gap-3">
                        <input id="bet-val" type="number" placeholder="Сумма" class="bg-black border border-zinc-800 rounded-xl p-4 flex-1 text-sm outline-none focus:border-yellow-400 font-bold">
                        <button id="bet-btn" onclick="playRisk()" class="bg-yellow-400 text-black px-6 rounded-xl font-black text-xs uppercase shadow-[0_0_15px_rgba(255,221,45,0.2)]">Ставка</button>
                    </div>
                    <p id="bet-timer" class="text-[9px] mt-4 text-zinc-600 text-center uppercase font-bold italic tracking-tighter">Терминал готов к работе</p>
                </div>
            </div>

            <!-- РЫНОК КИВИ -->
            <div id="section-market" class="hidden p-5 grid grid-cols-2 gap-4 animate-in slide-in-from-bottom-5"></div>

            <!-- ИНВЕНТАРЬ -->
            <div id="section-inv" class="hidden p-5 animate-in fade-in">
                <div class="flex gap-2 mb-8">
                    <button onclick="filterInv('kiwi')" class="flex-1 bg-zinc-900 border border-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-yellow-400">Киви</button>
                    <button onclick="filterInv('crypto')" class="flex-1 bg-zinc-800 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest text-zinc-500">Крипта</button>
                </div>
                <div id="inventory-list" class="space-y-4 text-center py-20">
                    <p class="text-zinc-700 text-xs font-bold uppercase italic">Ваш сейф пуст</p>
                </div>
            </div>

            <!-- ПРОФИЛЬ -->
            <div id="section-profile" class="hidden p-8 text-center animate-in zoom-in-95">
                <div class="w-24 h-24 bg-yellow-400 rounded-full mx-auto mb-6 flex items-center justify-center text-black text-4xl font-black italic shadow-2xl">K</div>
                <h2 id="profile-name" class="text-2xl font-black italic mb-1 uppercase">Loading...</h2>
                <p id="profile-id-display" class="text-yellow-400 text-xs font-mono mb-12 tracking-widest">@id000000</p>
                
                <div class="space-y-3">
                    <button onclick="showSearch()" class="w-full bg-zinc-900 border border-zinc-800 py-5 rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] text-white">Поиск игрока</button>
                    <button onclick="logout()" class="w-full bg-zinc-950 py-4 rounded-2xl text-[10px] font-bold uppercase text-zinc-500">Выход из системы</button>
                    <button onclick="confirmDelete()" class="w-full py-6 text-red-900 text-[10px] font-black uppercase tracking-widest opacity-30 hover:opacity-100 transition-all mt-10">Удалить профиль навсегда</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА СДЕЛКИ -->
    <div id="trade-modal" class="fixed inset-0 bg-black hidden z-[100] p-6 overflow-y-auto">
        <button onclick="closeTrade()" class="text-zinc-600 mb-8 uppercase text-[10px] font-black tracking-[0.4em] flex items-center gap-2">
            <span class="text-xl">←</span> Назад в терминал
        </button>
        <div id="trade-content"></div>
    </div>

    <!-- ПОИСК -->
    <div id="search-modal" class="fixed inset-0 bg-black/98 hidden z-[110] p-8 backdrop-blur-xl">
        <div class="flex justify-between items-center mb-16">
            <h3 class="text-yellow-400 font-black uppercase text-[10px] tracking-widest italic">Global Search</h3>
            <button onclick="closeSearch()" class="text-white text-2xl">✕</button>
        </div>
        <input id="search-input" type="text" placeholder="@ID ИЛИ ЦИФРЫ" class="w-full bg-transparent border-b-2 border-yellow-400 p-5 text-2xl outline-none mb-10 font-black placeholder:text-zinc-800 uppercase italic">
        <button onclick="performSearch()" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-2xl">Найти в базе данных</button>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

// ДАННЫЕ ИЗ СКРИНШОТА image_289943.png
const DB_ID = '69f2543d001072173afd'; 
const COLL_USERS = 'users';
const COLL_MARKET = 'market';

let currentUser = null;
let lastBetTime = 0;

const cryptoAssets = [
    { id: 'gas', name: 'кивиГаз', price: 1204, slot: 20 },
    { id: 'crys', name: 'кивиКристалл', price: 2349, slot: 15 },
    { id: 'coin', name: 'кивиКоин', price: 50, slot: 1000 },
    { id: 'serv', name: 'кивиУслуги', price: 890, slot: 5 }
];

async function auth() {
    const code = document.getElementById('login-code').value;
    const pin = document.getElementById('login-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            initApp();
        } else { alert("ДОСТУП ЗАПРЕЩЕН: НЕВЕРНЫЙ КОД"); }
    } catch (e) { alert("ОШИБКА ТЕРМИНАЛА: Проверьте базу данных"); }
}

function initApp() {
    const shortId = currentUser.$id.slice(-7);
    document.getElementById('user-at').innerText = `@${shortId}`;
    document.getElementById('profile-id-display').innerText = `@${shortId}`;
    document.getElementById('profile-name').innerText = currentUser.name;
    updateBalanceDisplay();
    renderCrypto();
    renderMarket();
}

function updateBalanceDisplay() {
    document.getElementById('user-balance').innerText = currentUser.balance.toLocaleString() + " ₽";
}

function switchTab(tab) {
    ['crypto', 'market', 'inv', 'profile'].forEach(t => {
        document.getElementById('section-' + t)?.classList.add('hidden');
        document.getElementById('tab-' + t).classList.remove('active', 'text-yellow-400');
        document.getElementById('tab-' + t).classList.add('text-zinc-500');
    });
    document.getElementById('section-' + tab)?.classList.remove('hidden');
    document.getElementById('tab-' + tab).classList.add('active', 'text-yellow-400');
}

function renderCrypto() {
    const list = document.getElementById('crypto-list');
    list.innerHTML = cryptoAssets.map(asset => `
        <div onclick="openTrade('${asset.name}', 'crypto', ${asset.price})" class="glass-card p-5 min-w-[150px] border-zinc-900 bg-zinc-950/50 active:scale-95 transition-all">
            <div class="yellow-circle mb-3 shadow-[0_0_10px_#ffdd2d]"></div>
            <p class="text-[9px] text-zinc-500 uppercase font-black tracking-widest mb-1">${asset.name}</p>
            <p class="text-xl font-black italic tracking-tighter">${asset.price} ₽</p>
        </div>
    `).join('');
}

async function renderMarket() {
    const list = document.getElementById('section-market');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET);
        list.innerHTML = res.documents.map(kiwi => `
            <div onclick="openTrade('${kiwi.name}', 'kiwi', ${kiwi.price}, '${kiwi.image}')" class="glass-card p-4 text-center border-zinc-900 active:scale-95 transition-all">
                <img src="${kiwi.image}" class="w-full h-24 object-contain mb-3 drop-shadow-2xl">
                <p class="text-[9px] text-zinc-500 font-black uppercase mb-1">${kiwi.name}</p>
                <p class="text-sm font-black italic text-yellow-400">${kiwi.price} ₽</p>
                <p class="text-[7px] text-zinc-700 mt-2 font-bold italic uppercase tracking-tighter">Слот: 2 шт</p>
            </div>
        `).join('');
    } catch (e) { list.innerHTML = "<p class='text-xs text-zinc-800 text-center col-span-2'>Рынок временно пуст</p>"; }
}

function openTrade(name, type, price, img = null) {
    const modal = document.getElementById('trade-modal');
    const content = document.getElementById('trade-content');
    modal.classList.remove('hidden');
    
    const history = Array.from({length: 15}, () => Math.floor(price * (0.7 + Math.random() * 0.6)));
    const commission = Math.floor(price * 0.08);

    content.innerHTML = `
        <div class="flex flex-col items-center mb-10 mt-4">
            ${img ? `<img src="${img}" class="h-40 mb-6 drop-shadow-[0_20px_30px_rgba(0,0,0,0.5)]">` : `<div class="w-20 h-20 bg-yellow-400 rounded-full mb-6 shadow-2xl flex items-center justify-center text-black text-3xl font-black italic">!</div>`}
            <h2 class="text-3xl font-black italic uppercase tracking-tighter">${name}</h2>
            <div class="bg-zinc-900 text-zinc-500 text-[8px] font-black px-3 py-1 rounded-full mt-3 tracking-[0.3em]">SLOT ID: FREE_20</div>
        </div>

        <div class="text-center mb-10">
            <p class="text-[10px] text-zinc-600 uppercase font-black tracking-widest mb-2">Рыночная стоимость</p>
            <div class="text-6xl font-black italic text-yellow-400 tracking-tighter">${price.toLocaleString()} ₽</div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="space-y-2">
                <button onclick="alert('Ошибка: Торги временно закрыты')" class="w-full bg-green-600/10 border border-green-600/30 text-green-500 font-black py-5 rounded-2xl uppercase text-[10px] active:scale-95 transition-all">Купить+</button>
                <p class="text-center text-[8px] text-zinc-700 font-bold">В наличии: 0</p>
            </div>
            <div class="space-y-2">
                <button onclick="alert('Ошибка: Актив не найден в инвентаре')" class="w-full bg-red-600/10 border border-red-600/30 text-red-500 font-black py-5 rounded-2xl uppercase text-[10px] active:scale-95 transition-all">Продать-</button>
                <p class="text-center text-[8px] text-zinc-700 font-bold">В наличии: 0</p>
            </div>
        </div>
        
        <p class="text-center text-zinc-600 text-[9px] font-bold uppercase mb-8">Комиссия системы: ${commission} ₽</p>
        
        <div class="glass-card p-6 h-56 border-zinc-900 bg-zinc-950">
             <canvas id="tradeChart"></canvas>
        </div>
    `;
    
    setTimeout(() => {
        const ctx = document.getElementById('tradeChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(() => ''),
                datasets: [{ 
                    data: history, 
                    borderColor: '#ffdd2d', 
                    borderWidth: 3, 
                    tension: 0.4, 
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(255, 221, 45, 0.05)'
                }]
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }, 
                scales: { x: { display: false }, y: { display: false } } 
            }
        });
    }, 100);
}

function closeTrade() { document.getElementById('trade-modal').classList.add('hidden'); }
function showSearch() { document.getElementById('search-modal').classList.remove('hidden'); }
function closeSearch() { document.getElementById('search-modal').classList.add('hidden'); }
function logout() { location.reload(); }

async function playRisk() {
    const now = Date.now();
    if (now - lastBetTime < 10000) {
        alert("ТЕРМИНАЛ ПЕРЕГРЕТ. ОЖИДАНИЕ: " + Math.ceil((10000 - (now - lastBetTime))/1000) + " СЕК.");
        return;
    }
    
    const amount = parseInt(document.getElementById('bet-val').value);
    
    if (!amount || amount <= 0) return alert("УКАЖИТЕ СУММУ");
    if (amount > currentUser.balance) return alert("НЕДОСТАТОЧНО СРЕДСТВ");
    
    lastBetTime = now;
    const win = Math.random() < 0.25; // ШАНС 25%
    
    try {
        if (win) {
            currentUser.balance += amount * 2; // x3 не делаем чтобы не сломать экономику сразу, но ты просил x3 в визуале. Исправил логику на + (amount * 2) чтобы в сумме было х3
            alert("🔥 СИСТЕМА ВЗЛОМАНА! + " + (amount * 2) + " ₽");
        } else {
            currentUser.balance -= amount;
            alert("💀 ДОСТУП ПРЕРВАН: СТАВКА АННУЛИРОВАНА");
        }
        
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: currentUser.balance });
        updateBalanceDisplay();
        
    } catch (e) { alert("КРИТИЧЕСКАЯ ОШИБКА БАЛАНСА"); }
}

function performSearch() {
    const val = document.getElementById('search-input').value.replace('@', '');
    if (val.length < 3) return alert("МИНИМУМ 3 СИМВОЛА");
    alert("ПОЛЬЗОВАТЕЛЬ @" + val + " НАЙДЕН\n\nСТАТУС: ONLINE\nАКТИВЫ: СКРЫТО");
}

async function confirmDelete() {
    if (confirm("ВНИМАНИЕ! Вы собираетесь удалить терминал и все счета. Продолжить?")) {
        if (confirm("ПОДТВЕРДИТЕ ЛИЧНОСТЬ: Точно удалить профиль навсегда?")) {
            try {
                await databases.deleteDocument(DB_ID, COLL_USERS, currentUser.$id);
                alert("ПРОФИЛЬ УНИЧТОЖЕН");
                location.reload();
            } catch (e) { alert("ОШИБКА УДАЛЕНИЯ"); }
        }
    }
}
</script>
</body>
</html>
