<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI MARKET | БИРЖА</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #00ff00; text-transform: uppercase; text-shadow: 0 0 10px #00ff0055; }
        
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #111; border: 1px solid #00ff0033; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00ff00; box-shadow: 0 0 15px #00ff0033; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; background: #222; }
        .card p { color: #00ff00; font-weight: bold; font-size: 1.3em; margin: 10px 0; }
        
        .buy-btn { background: #008000; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        .buy-btn:hover { background: #00ff00; color: black; }
        .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 12px; margin: 10px; border-radius: 6px; border: 1px solid #333; width: 260px; background: #111; color: white; text-align: center; font-size: 1.1em; }
        input:focus { border-color: #00ff00; outline: none; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="font-size: 2.5em;">ВХОД В БИРЖУ</h1>
        <input type="text" id="user-code" placeholder="ВАШ КОД">
        <input type="password" id="user-pin" placeholder="PIN-КОД">
        <button class="buy-btn" style="width: 286px; font-size: 1.1em;" onclick="login()">ВОЙТИ</button>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <h1>KIWI EXCHANGE | MARKET</h1>
        <div style="display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-radius: 10px; border-left: 5px solid #00ff00;">
            <span>СТАТУС: <b style="color:#00ff00;">ONLINE</b></span>
            <span>БАЛАНС: <b id="balance" style="color:#00ff00; font-size: 1.2em;">0</b> ₽</span>
        </div>
        <div class="market-grid" id="market-list"></div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;

// Настройка клиента по данным со скриншота image_d79835.png
const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('69f223f4002d7c30c1b9'); 

const databases = new Databases(client);

// Константы из image_d7a6d9.png
const DB_ID = 'bank_db';
const COLL_MARKET = 'market';
const COLL_USERS = 'users';

let currentUser = null;

async function login() {
    const code = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;

    if(!code || !pin) { alert("Введите данные!"); return; }

    try {
        console.log("Попытка входа...");
        const response = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code),
            Query.equal('pin', pin)
        ]);

        if (response.documents.length > 0) {
            currentUser = response.documents[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('balance').innerText = currentUser.balance;
            loadMarket();
        } else {
            alert("Ошибка: Неверный код или PIN!");
        }
    } catch (e) {
        console.error("ПОЛНАЯ ОШИБКА:", e);
        alert("ОШИБКА ПОДКЛЮЧЕНИЯ!\n\n1. Проверь интернет.\n2. Убедись, что в Appwrite -> Settings -> Platforms есть этот сайт.");
    }
}

async function loadMarket() {
    try {
        const response = await databases.listDocuments(DB_ID, COLL_MARKET);
        const list = document.getElementById('market-list');
        list.innerHTML = '';

        response.documents.forEach(item => {
            const isSold = item.ownerId && item.ownerId !== "NULL" && item.ownerId !== "";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.image || ''}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                <h3>${item.name || 'Киви'}</h3>
                <p>${item.price || 0} ₽</p>
                <button class="buy-btn" ${isSold ? 'disabled' : ''} onclick="buyItem('${item.$id}', ${item.price})">
                    ${isSold ? 'ПРОДАНО' : 'КУПИТЬ'}
                </button>
            `;
            list.appendChild(card);
        });
    } catch (e) { 
        console.error("Ошибка загрузки товаров:", e); 
    }
}

async function buyItem(itemId, price) {
    if (currentUser.balance < price) { alert("НЕДОСТАТОЧНО СРЕДСТВ!"); return; }

    try {
        const newBalance = currentUser.balance - price;
        // Обновляем баланс
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: newBalance });
        currentUser.balance = newBalance;
        document.getElementById('balance').innerText = newBalance;

        // Обновляем владельца
        await databases.updateDocument(DB_ID, COLL_MARKET, itemId, { ownerId: currentUser.$id });
        
        alert("ПОЗДРАВЛЯЕМ! КИВИ КУПЛЕН!");
        loadMarket();
    } catch (e) { 
        console.error("Ошибка транзакции:", e);
        alert("Ошибка при покупке. Проверь права доступа (Update) в таблице."); 
    }
}
</script>
</body>
</html>
