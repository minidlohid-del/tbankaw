<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KIWI EXCHANGE | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow-x: hidden; }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; transition: 0.3s; }
        .glass-card:active { border-color: #ffdd2d; }
        .tab-btn.active { color: #ffdd2d; border-bottom: 2px solid #ffdd2d; }
        .hidden { display: none !important; }
        input { background: transparent; outline: none; border-bottom: 1px solid #333; }
        input:focus { border-color: #ffdd2d; }
        .scanline { width: 100%; height: 2px; background: rgba(255, 221, 45, 0.1); position: fixed; top: 0; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0; } to { top: 100vh; } }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="p-6 pt-24 max-w-sm mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-yellow-400 uppercase">KIWI TERMINAL</h1>
            <p class="text-[8px] tracking-[0.3em] text-zinc-600 mt-2">SHARED ACCOUNT ACCESS</p>
        </div>
        <div class="glass-card p-8 border-zinc-900">
            <input id="login-code" type="text" maxlength="3" placeholder="КОД" class="w-full p-4 mb-6 text-center text-3xl font-mono">
            <input id="login-pin" type="text" maxlength="4" placeholder="ПИН" class="w-full p-4 mb-10 text-center text-xl font-mono">
            <button onclick="auth()" id="auth-btn" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs">Авторизация</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden min-h-screen flex flex-col">
        <div class="p-5 flex justify-between items-end border-b border-zinc-900 sticky top-0 bg-black z-50">
            <div>
                <p id="user-at" class="text-zinc-600 text-[9px] font-bold uppercase tracking-widest">@USER</p>
                <p id="user-balance" class="text-2xl font-black text-yellow-400 italic">0 ₽</p>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-zinc-700 font-bold uppercase">Logout</button>
        </div>

        <div class="flex justify-around bg-zinc-950 border-b border-zinc-900">
            <button onclick="switchTab('market')" id="tab-market" class="tab-btn py-4 px-2 text-[10px] font-black active uppercase">Маркет</button>
            <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn py-4 px-2 text-[10px] font-black text-zinc-500 uppercase">Крипта</button>
        </div>

        <!-- МАРКЕТ -->
        <div id="section-market" class="p-5 space-y-4 pb-20">
            <div id="market-items" class="space-y-4">
                <div class="text-zinc-500 text-xs text-center py-10 animate-pulse">Загрузка протоколов...</div>
            </div>
        </div>

        <!-- КРИПТА (ЗАГЛУШКА) -->
        <div id="section-crypto" class="hidden p-5">
            <p class="text-center text-[9px] text-zinc-700 uppercase py-10 italic">Биржа временно закрыта на обслуживание</p>
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;

// ТВОИ ДАННЫЕ ИЗ СКРИНШОТОВ
const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('69f253c500057ce0124f'); //

const databases = new Databases(client);
const DB_ID = '69f2543d001072173afd'; //
const COLL_USERS = 'users';           //
const COLL_MARKET = 'market';         // Твоя таблица товаров

let currentUser = null;

async function auth() {
    const codeInput = document.getElementById('login-code').value.trim();
    const pinInput = document.getElementById('login-pin').value.trim();
    const btn = document.getElementById('auth-btn');
    
    btn.innerText = "CHECKING...";
    btn.disabled = true;

    try {
        // Пробуем найти пользователя
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', codeInput),
            Query.equal('pin', pinInput)
        ]);

        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            updateUI();
            loadMarket();
        } else {
            alert("ОШИБКА: ДОСТУП ЗАПРЕЩЕН. Проверь данные в таблице Appwrite.");
            btn.innerText = "Авторизация";
            btn.disabled = false;
        }
    } catch (e) {
        console.error(e);
        alert("ОШИБКА ПОДКЛЮЧЕНИЯ. Убедись, что в Settings -> Permissions стоит 'Any'");
        btn.innerText = "Авторизация";
        btn.disabled = false;
    }
}

function updateUI() {
    document.getElementById('user-balance').innerText = currentUser.balance.toLocaleString() + ' ₽';
    document.getElementById('user-at').innerText = '@' + (currentUser.name || 'ANON').toUpperCase();
}

function switchTab(tab) {
    document.getElementById('section-market').classList.toggle('hidden', tab !== 'market');
    document.getElementById('section-crypto').classList.toggle('hidden', tab !== 'crypto');
    document.getElementById('tab-market').classList.toggle('active', tab === 'market');
    document.getElementById('tab-crypto').classList.toggle('active', tab === 'crypto');
}

async function loadMarket() {
    const container = document.getElementById('market-items');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET);
        container.innerHTML = '';
        
        if(res.documents.length === 0) {
            container.innerHTML = '<p class="text-center text-zinc-600 text-xs italic">Товаров нет</p>';
            return;
        }

        res.documents.forEach(item => {
            const isSold = item.ownerId && item.ownerId !== "NULL";
            container.innerHTML += `
                <div class="glass-card p-5 border-zinc-900 flex justify-between items-center ${isSold ? 'opacity-40' : ''}">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-zinc-900 rounded-xl overflow-hidden border border-white/5">
                           <img src="${item.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/100x100?text=IMG'">
                        </div>
                        <div>
                            <p class="text-xs font-black uppercase italic">${item.name}</p>
                            <p class="text-[14px] font-black text-yellow-400">${item.price.toLocaleString()} ₽</p>
                        </div>
                    </div>
                    ${isSold ? 
                        `<span class="text-[8px] font-black text-zinc-600 uppercase">SOLD</span>` :
                        `<button onclick="buyItem('${item.$id}', ${item.price})" class="bg-white text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">BUY</button>`
                    }
                </div>
            `;
        });
    } catch (e) {
        container.innerHTML = '<p class="text-red-500 text-center text-xs">Ошибка базы товаров</p>';
    }
}

async function buyItem(itemId, price) {
    if (currentUser.balance < price) return alert("НЕДОСТАТОЧНО СРЕДСТВ");
    if (!confirm("ПОДТВЕРДИТЬ ПОКУПКУ?")) return;

    try {
        const newBalance = currentUser.balance - price;
        // Обновляем деньги
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: newBalance });
        // Помечаем товар как купленный
        await databases.updateDocument(DB_ID, COLL_MARKET, itemId, { ownerId: currentUser.$id });
        
        currentUser.balance = newBalance;
        updateUI();
        loadMarket();
        alert("УСПЕШНО");
    } catch (e) {
        alert("ОШИБКА ПРИ ПОКУПКЕ");
    }
}
</script>
</body>
</html>
