<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI EXCHANGE | TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; }
        .tab-btn.active { color: #ffdd2d; border-bottom: 2px solid #ffdd2d; }
    </style>
</head>
<body>
    <!-- ВХОД (Копия логики банка) -->
    <div id="auth-screen" class="p-6 pt-24 max-w-sm mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic text-yellow-400 uppercase italic">KIWI TERMINAL</h1>
        </div>
        <div class="glass-card p-8 border-zinc-900">
            <input id="login-code" type="password" maxlength="3" placeholder="КОД" class="w-full bg-transparent border-b-2 border-zinc-800 p-4 mb-6 text-center text-3xl outline-none focus:border-yellow-400 font-mono">
            <input id="login-pin" type="password" maxlength="4" placeholder="ПИН" class="w-full bg-transparent border-b-2 border-zinc-800 p-4 mb-10 text-center text-xl outline-none focus:border-yellow-400 font-mono">
            <button onclick="auth()" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl uppercase tracking-widest text-xs">Авторизация</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div id="main-ui" class="hidden min-h-screen flex flex-col">
        <div class="p-5 flex justify-between items-end border-b border-zinc-900">
            <div>
                <p id="user-at" class="text-zinc-600 text-[9px] font-bold uppercase tracking-widest">@USER</p>
                <p id="user-balance" class="text-2xl font-black text-yellow-400 italic">0 ₽</p>
            </div>
            <div class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center">🔍</div>
        </div>

        <div class="flex justify-around bg-zinc-950 border-b border-zinc-900">
            <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn py-4 px-2 text-[10px] font-black active uppercase">Крипта</button>
            <button onclick="switchTab('risk')" id="tab-risk" class="tab-btn py-4 px-2 text-[10px] font-black text-zinc-500 uppercase">Риск-Игра</button>
        </div>

        <div id="section-crypto" class="p-5 space-y-4">
            <div class="glass-card p-6 flex justify-between items-center">
                <div><p class="text-xs font-bold text-zinc-500 uppercase">кивиКоин</p><p class="text-xl font-black italic">142 ₽</p></div>
                <button class="bg-yellow-400 text-black px-4 py-2 rounded-lg text-[10px] font-black uppercase">Торговать</button>
            </div>
        </div>

        <div id="section-risk" class="hidden p-5">
            <div class="glass-card p-6 border-yellow-500/20">
                <p class="text-[10px] text-zinc-400 uppercase font-black mb-4">Шанс выигрыша 25% (x3)</p>
                <input id="bet-val" type="number" placeholder="Сумма ставки" class="w-full bg-black border border-zinc-800 rounded-xl p-4 mb-4 outline-none focus:border-yellow-400 font-bold">
                <button onclick="playRisk()" class="w-full bg-yellow-400 text-black py-4 rounded-xl font-black uppercase text-xs">Сделать ставку</button>
            </div>
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('fra-69f253c500057ce0124f');
const databases = new Databases(client);

const DB_ID = '69f2543d001072173afd';
const COLL_USERS = 'users';

let currentUser = null;

async function auth() {
    const code = document.getElementById('login-code').value;
    const pin = document.getElementById('login-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code),
            Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            updateUI();
        } else { alert("Ошибка доступа"); }
    } catch (e) { alert("Failed to fetch: проверь консоль"); }
}

function updateUI() {
    document.getElementById('user-balance').innerText = currentUser.balance.toLocaleString() + ' ₽';
    document.getElementById('user-at').innerText = '@' + currentUser.$id.slice(-6).toUpperCase();
}

function switchTab(tab) {
    document.getElementById('section-crypto').classList.toggle('hidden', tab !== 'crypto');
    document.getElementById('section-risk').classList.toggle('hidden', tab !== 'risk');
}

async function playRisk() {
    const amount = parseInt(document.getElementById('bet-val').value);
    if (!amount || amount > currentUser.balance) return alert("Недостаточно средств");

    const win = Math.random() < 0.25;
    if (win) {
        currentUser.balance += (amount * 2);
        alert("ВЫИГРЫШ! + " + (amount * 2));
    } else {
        currentUser.balance -= amount;
        alert("ПРОИГРЫШ");
    }

    try {
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: currentUser.balance });
        updateUI();
    } catch (e) { alert("Ошибка сохранения баланса"); }
}
</script>
</body>
</html>
