<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD V3 | MARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { 
            --gold: #ffd700; 
            --gold-dark: #b8860b;
            --bg: #0a0a0a; 
            --card: #151515; 
            --text: #ffffff;
        }
        * { box-sizing: border-box; outline: none; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            overflow-x: hidden;
            user-select: none;
        }

        /* Фиксированный заголовок с балансами */
        .header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .stat-box { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9em; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .bank { color: var(--gold); }
        .market { color: #00ccff; border-color: #00ccff; box-shadow: 0 0 10px rgba(0,204,255,0.2); }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; border-top: 2px solid var(--gold); }
        .n-btn { flex: 1; padding: 20px; background: none; border: none; color: #555; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .n-btn.active { color: var(--gold); background: rgba(255,215,0,0.05); }

        /* Экраны */
        #screen { padding-top: 100px; padding-bottom: 100px; text-align: center; }
        
        /* Кнопка работы */
        .mine-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; }
        .mine-btn { 
            width: 220px; height: 220px; border-radius: 50%; 
            border: 8px solid var(--gold); 
            background: radial-gradient(circle, #1a1a1a, #000);
            color: var(--gold); font-size: 2.5em; font-weight: bold;
            cursor: pointer; transition: 0.1s;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }
        .mine-btn:active { transform: scale(0.9); box-shadow: 0 0 10px var(--gold); }

        /* Окно вывода (Modal) */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; align-items: center; justify-content: center; z-index: 3000; 
        }
        .modal { 
            background: var(--card); border: 2px solid var(--gold); 
            padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center;
        }
        .modal h2 { color: var(--gold); margin-top: 0; }
        .m-info { background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 0.9em; text-align: left; }
        .m-info div { display: flex; justify-content: space-between; margin-bottom: 8px; }

        .btn { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-gold { background: var(--gold); color: black; }
        .btn-cancel { background: #222; color: white; }

        /* Авторизация */
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gold-input { background: #111; border: 1px solid #333; color: white; padding: 15px; width: 280px; margin: 5px; border-radius: 10px; text-align: center; }
        .gold-input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

<!-- Авторизация (используем те же данные, что в User Summary) -->
<div id="auth">
    <h1 style="color:var(--gold); letter-spacing:8px;">GOLD V3</h1>
    <input type="text" id="cid" class="gold-input" placeholder="CARD ID">
    <input type="password" id="pin" class="gold-input" placeholder="PIN CODE">
    <button class="btn btn-gold" style="width:280px; margin-top:20px;" onclick="login()">ВОЙТИ В СИСТЕМУ</button>
</div>

<!-- Модальное окно вывода -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2>ВЫВОД СРЕДСТВ</h2>
        <div class="m-info">
            <div><span>Сумма:</span> <span id="m-sum">0 ₽</span></div>
            <div><span>Комиссия (90%):</span> <span id="m-com" style="color:red;">0 ₽</span></div>
            <hr style="border:0; border-top:1px solid #333;">
            <div><span>К получению:</span> <span id="m-total" style="color:var(--gold); font-size:1.2em;">0 ₽</span></div>
        </div>
        <button class="btn btn-gold" onclick="confirmWithdraw()">ПОДТВЕРДИТЬ</button>
        <button class="btn btn-cancel" onclick="closeModal()">ОТМЕНА</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div class="stat-box bank">БАНК: <span id="bal-main">0</span> ₽</div>
        <div class="stat-box market">МАРКЕТ: <span id="bal-market">0</span> ₽</div>
    </div>

    <div id="screen"></div>

    <nav class="nav">
        <button class="n-btn active" onclick="tab('work', this)">РАБОТА</button>
        <button class="n-btn" onclick="tab('me', this)">ПРОФИЛЬ</button>
    </nav>
</div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9'); //
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users'; //

let user = null;
let clicks = 0;

function getNum(v) { return isNaN(Number(v)) ? 0 : Number(v); }

async function login() {
    const c = document.getElementById('cid').value, p = document.getElementById('pin').value;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("PIN неверный");
        } else {
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { 
                personalCode: c, pin: p, balance: 1000, marketBalance: 0 
            });
        }
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        updateUI();
        tab('work', document.querySelector('.n-btn'));
    } catch(e) { alert("Ошибка: " + e.message); }
}

function updateUI() {
    if(!user) return;
    document.getElementById('bal-main').innerText = getNum(user.balance).toLocaleString();
    document.getElementById('bal-market').innerText = getNum(user.marketBalance).toLocaleString();
}

async function tab(t, btn) {
    const s = document.getElementById('screen');
    if(btn) { document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    if(t === 'work') {
        s.innerHTML = `
            <div class="mine-container">
                <p style="color:gray;">КАЖДЫЕ 15 КЛИКОВ = 50 ₽</p>
                <h1 style="font-size:4em; margin:10px 0; color:var(--gold);" id="cc">${clicks}</h1>
                <button class="mine-btn" onclick="doWork()">GOLD</button>
            </div>`;
    }

    if(t === 'me') {
        // - оптимизация memorization/краткости
        const fresh = await db.getDocument(DB_ID, USERS, user.$id);
        user.marketBalance = getNum(fresh.marketBalance);
        updateUI();

        s.innerHTML = `
            <div style="padding:40px;">
                <div style="background:var(--card); padding:30px; border-radius:20px; border:1px solid #333;">
                    <p style="color:gray; margin:0;">ВАШ МАРКЕТ СЧЕТ</p>
                    <h1 style="font-size:3em; margin:10px 0; color:#00ccff;">${getNum(user.marketBalance).toLocaleString()} ₽</h1>
                    <button class="btn btn-gold" style="padding:20px; font-size:1.1em;" onclick="openWithdraw()">ВЫВЕСТИ СРЕДСТВА</button>
                </div>
                <p style="margin-top:30px; color:#444; font-size:0.8em;">ID: ${user.personalCode}</p>
            </div>`;
    }
}

async function doWork() {
    clicks++;
    document.getElementById('cc').innerText = clicks;
    if(clicks % 15 === 0) {
        try {
            const fresh = await db.getDocument(DB_ID, USERS, user.$id);
            const newM = getNum(fresh.marketBalance) + 50;
            await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: newM });
            user.marketBalance = newM;
            updateUI();
        } catch(e) { console.error("Ошибка клика", e); }
    }
}

// ─── ЛОГИКА ВЫВОДА ───

function openWithdraw() {
    const mBal = getNum(user.marketBalance);
    if(mBal < 50) return alert("Минимум 50 ₽ для вывода");
    
    const commission = Math.floor(mBal * 0.9);
    const total = mBal - commission;

    document.getElementById('m-sum').innerText = mBal + " ₽";
    document.getElementById('m-com').innerText = commission + " ₽";
    document.getElementById('m-total').innerText = total + " ₽";
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function confirmWithdraw() {
    document.getElementById('modal').style.display = 'none';
    try {
        const fresh = await db.getDocument(DB_ID, USERS, user.$id);
        const mBal = getNum(fresh.marketBalance);
        
        const commission = Math.floor(mBal * 0.9);
        const payout = mBal - commission;
        const newBank = getNum(fresh.balance) + payout;

        await db.updateDocument(DB_ID, USERS, user.$id, { 
            balance: newBank, 
            marketBalance: 0 
        });

        user.balance = newBank;
        user.marketBalance = 0;
        updateUI();
        tab('me');
        alert(`Успешно! Получено ${payout} ₽`);
    } catch(e) { alert("Ошибка транзакции: " + e.message); }
}
</script>
</body>
</html>
