<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | FULL SHOP</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #00ccff; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; user-select: none; }
        .header { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .item { display: flex; align-items: center; background: var(--card); margin: 10px; padding: 12px; border-radius: 12px; border: 1px solid #222; transition: 0.2s; }
        .img-box { width: 50px; height: 50px; border-radius: 8px; margin-right: 12px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.7em; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .n-btn.active { color: var(--green); }
        .btn { padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .mine-btn { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--green); background: none; color: var(--green); font-size: 1.8em; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.05s; outline: none; }
        .mine-btn:active { transform: scale(0.90); background: rgba(0,255,0,0.15); box-shadow: 0 0 20px var(--green); }
        .disabled { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--green); letter-spacing: 4px; margin-bottom: 30px;">KIWI ELITE</h1>
        <input type="text" id="cid" placeholder="ID КАРТЫ" style="padding:15px; margin:5px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center; font-size: 1.1em;">
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; margin:5px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center; font-size: 1.1em;">
        <button class="btn buy" style="width:290px; margin-top:20px; padding: 15px;" onclick="login()">ВХОД В СИСТЕМУ</button>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size:0.85em; color:gray;">БАНК: <span id="bal-main" style="color:var(--green); font-weight:bold;">0 ₽</span></div>
                <div style="font-size:0.85em; color:gray;">МАРКЕТ: <span id="bal-market" style="color:var(--blue); font-weight:bold;">0 ₽</span></div>
            </div>
        </div>
        <div id="screen"></div>
        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins', this)">БИРЖА</button>
            <button class="n-btn" onclick="tab('nft', this)">NFT КИВИ</button>
            <button class="n-btn" onclick="tab('work', this)">РАБОТАТЬ</button>
            <button class="n-btn" onclick="tab('inv', this)">СКЛАД</button>
            <button class="n-btn" onclick="tab('me', this)">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';

let user = null;
let clickCounter = 0;

// МАССИВ ВСЕХ ТВОИХ ФОТОГРАФИЙ КИВИ
const allKiwiPhotos = [
    'photo_2026-04-29_23-50-09.jpg', 'photo_2026-04-29_23-50-11.jpg', 'photo_2026-04-29_23-50-18.jpg',
    'photo_2026-04-29_23-50-19.jpg', 'photo_2026-04-29_23-50-20.jpg', 'photo_2026-04-29_23-50-20 (2).jpg',
    'photo_2026-04-29_23-50-21.jpg', 'photo_2026-04-29_23-50-21 (2).jpg', 'photo_2026-04-29_23-50-38.jpg',
    'photo_2026-04-29_23-50-38 (2).jpg', 'photo_2026-04-29_23-50-39.jpg', 'photo_2026-04-29_23-50-40.jpg',
    'photo_2026-04-29_23-50-40 (2).jpg', 'photo_2026-04-29_23-50-42.jpg', 'photo_2026-04-29_23-50-42 (2).jpg',
    'photo_2026-04-29_23-50-43.jpg', 'photo_2026-04-29_23-50-43 (2).jpg', 'photo_2026-04-29_23-50-44.jpg',
    'photo_2026-04-29_23-50-44 (2).jpg', 'photo_2026-04-29_23-50-45.jpg', 'photo_2026-04-29_23-50-45 (2).jpg',
    'photo_2026-04-29_23-50-46.jpg', 'photo_2026-04-29_23-50-46 (2).jpg', 'photo_2026-04-29_23-50-48.jpg',
    'photo_2026-04-29_23-50-48 (2).jpg', 'photo_2026-04-29_23-50-49.jpg', 'photo_2026-04-29_23-50-49 (2).jpg',
    'photo_2026-04-29_23-50-50.jpg', 'photo_2026-04-29_23-50-50 (2).jpg', 'photo_2026-04-29_23-50-51.jpg',
    'photo_2026-04-29_23-50-51 (2).jpg', 'photo_2026-04-29_23-50-52.jpg', 'photo_2026-04-29_23-50-52 (2).jpg',
    'photo_2026-04-29_23-50-53.jpg', 'photo_2026-04-29_23-50-53 (2).jpg', 'photo_2026-04-29_23-50-54.jpg',
    'photo_2026-04-29_23-50-54 (2).jpg', 'photo_2026-04-29_23-50-55.jpg', 'photo_2026-04-29_23-50-55 (2).jpg',
    'photo_2026-04-29_23-50-56.jpg', 'photo_2026-04-29_23-50-56 (2).jpg', 'photo_2026-04-29_23-50-58.jpg',
    'photo_2026-04-29_23-50-59.jpg'
];

const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

async function login() {
    const c = document.getElementById('cid').value, p = document.getElementById('pin').value;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        user = res.documents.length > 0 ? res.documents[0] : await db.createDocument(DB_ID, USERS, ID.unique(), { personalCode:c, pin:p, balance:1000, marketBalance:0 });
        if(String(user.pin) !== p) return alert("ОШИБКА ДОСТУПА");
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        updateUI(); tab('coins', document.querySelector('.n-btn'));
    } catch(e) { alert("ОШИБКА СЕТИ ИЛИ БАЗЫ ДАННЫХ"); }
}

function updateUI() {
    if(!user) return;
    document.getElementById('bal-main').innerText = Math.floor(user.balance || 0).toLocaleString() + " ₽";
    document.getElementById('bal-market').innerText = Math.floor(user.marketBalance || 0).toLocaleString() + " ₽";
}

async function tab(t, btn) {
    const s = document.getElementById('screen');
    s.innerHTML = `<h3 style="margin:20px; color:var(--green); letter-spacing:1px;">${t.toUpperCase()}</h3>`;
    if(btn) { document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

    if(t === 'coins') {
        ["Киви Акции", "Киви Инвест"].forEach(n => {
            const price = rnd(800, 3500); 
            s.innerHTML += `<div class="item"><div class="img-box"><img src="photo_2026-04-29_23-50-11.jpg"></div><div style="flex:1"><b>${n}</b><br><span style="color:var(--green)">${price} ₽</span></div><button class="btn buy" onclick="buyAsset('${n}', ${price}, 'photo_2026-04-29_23-50-11.jpg', this)">КУПИТЬ</button></div>`;
        });
    }
    if(t === 'nft') {
        // Выводим все фото из огромного массива
        allKiwiPhotos.forEach((img, i) => {
            const price = rnd(2000, 15000);
            s.innerHTML += `<div class="item"><div class="img-box"><img src="${img}" onerror="this.src='photo_2026-04-29_23-50-11.jpg'"></div><div style="flex:1"><b>КИВИ NFT #${i+1}</b><br><span style="color:var(--blue)">${price} ₽</span></div><button class="btn buy" onclick="buyAsset('NFT КИВИ #${i+1}', ${price}, '${img}', this)">КУПИТЬ</button></div>`;
        });
    }
    if(t === 'work') {
        s.innerHTML += `<div style="text-align:center; padding:40px;"><h1 id="clicks-val" style="color:var(--blue); font-size:4em; margin-bottom:10px;">${clickCounter}</h1><p style="color:gray; margin-bottom:30px;">КЛИКАЙ БЕЗ ОСТАНОВКИ</p><button id="mbtn" class="mine-btn" onclick="mine()">КЛИК</button></div>`;
    }
    if(t === 'inv') {
        s.innerHTML += "<p id='inv-loading' style='text-align:center; padding:40px; opacity:0.5;'>ЗАГРУЗКА СКЛАДА...</p>";
        try {
            const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
            document.getElementById('inv-loading')?.remove();
            if(res.documents.length === 0) s.innerHTML += "<p style='text-align:center; color:gray; margin-top:50px;'>СКЛАД ПУСТ</p>";
            
            res.documents.forEach(doc => {
                s.innerHTML += `<div class="item" id="c-${doc.$id}"><div class="img-box"><img src="${doc.image}"></div><div style="flex:1"><b>${doc.name}</b><br><small style="color:gray">ЦЕНА: ${doc.price} ₽</small></div><button class="btn sell" onclick="sellItem('${doc.$id}', ${doc.price}, this)">ПРОДАТЬ</button></div>`;
            });
        } catch(e) { s.innerHTML += "<p style='color:red; text-align:center;'>Ошибка загрузки инвентаря</p>"; }
    }
    if(t === 'me') {
        const mBal = parseInt(user.marketBalance) || 0;
        s.innerHTML += `<div style="padding:20px;"><div class="item" style="flex-direction:column; padding:40px; text-align:center; background:#050505;">
            <p style="color:gray; font-size:0.9em;">ДОСТУПНО К ВЫВОДУ:</p>
            <h1 id="me-bal" style="color:var(--green); margin:15px 0;">${mBal.toLocaleString()} ₽</h1>
            <button class="btn buy" style="width:100%; padding:18px; font-size:1em;" onclick="withdraw(this)">ВЫВЕСТИ В БАНК</button>
            <p style="color:#444; font-size:0.7em; margin-top:20px;">УДЕРЖИВАЕТСЯ КОМИССИЯ 90%</p>
        </div></div>`;
    }
}

function mine() {
    clickCounter++;
    document.getElementById('clicks-val').innerText = clickCounter;
    if(clickCounter % 20 === 0) {
        backgroundSyncReward();
    }
}

async function backgroundSyncReward() {
    if(!user) return;
    try {
        user.marketBalance = (parseInt(user.marketBalance) || 0) + 50;
        updateUI();
        await Promise.all([
            db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance }),
            db.createDocument(DB_ID, MARKET, ID.unique(), { 
                name: "Майнинг Киви", 
                price: 200, 
                ownerId: user.$id, 
                image: 'photo_2026-04-29_23-50-20.jpg' 
            })
        ]);
    } catch(e) { console.error("Ошибка сохранения кликов в фоне"); }
}

async function buyAsset(n, p, i, btn) {
    if(user.balance < p) return;
    btn.classList.add('disabled');
    btn.innerText = "КУПЛЕНО";
    user.balance = parseInt(user.balance) - p;
    updateUI();

    try {
        await Promise.all([
            db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance }),
            db.createDocument(DB_ID, MARKET, ID.unique(), { name:n, price:p, ownerId:user.$id, image:i })
        ]);
    } catch(e) { 
        user.balance += p; updateUI(); btn.innerText = "КУПИТЬ"; btn.classList.remove('disabled');
        alert("ОШИБКА! Appwrite заблокировал сохранение. Настрой права (Roles).");
    }
}

async function sellItem(id, price, btn) {
    const itemRow = document.getElementById(`c-${id}`);
    const profit = Math.floor(price * 0.1);
    
    itemRow.style.display = 'none';
    user.marketBalance = (parseInt(user.marketBalance) || 0) + profit;
    updateUI();

    try {
        await Promise.all([
            db.deleteDocument(DB_ID, MARKET, id),
            db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance })
        ]);
        itemRow.remove(); 
    } catch(e) {
        user.marketBalance -= profit; updateUI(); itemRow.style.display = 'flex';
        alert("ОШИБКА УДАЛЕНИЯ! В базе данных Appwrite для коллекции MARKET не стоит галочка Delete для роли Any.");
    }
}

async function withdraw(btn) {
    btn.classList.add('disabled');
    btn.innerText = "ПРОВЕРКА...";
    
    try {
        // Принудительно запрашиваем точный баланс с сервера перед выводом
        user = await db.getDocument(DB_ID, USERS, user.$id);
        const mBal = parseInt(user.marketBalance) || 0;
        
        if(mBal < 500) {
            btn.classList.remove('disabled');
            btn.innerText = "ВЫВЕСТИ В БАНК";
            return alert(`НУЖНО МИНИМУМ 500 ₽! У тебя сейчас: ${mBal} ₽`);
        }
        
        const cleanMoney = Math.floor(mBal * 0.1); 
        user.balance = (parseInt(user.balance) || 0) + cleanMoney;
        user.marketBalance = 0;
        
        await db.updateDocument(DB_ID, USERS, user.$id, { 
            balance: user.balance, 
            marketBalance: 0 
        });
        
        updateUI();
        document.getElementById('me-bal').innerText = "0 ₽";
        alert(`УСПЕШНО ПЕРЕВЕДЕНО: +${cleanMoney} ₽ в БАНК`);
    } catch(e) { 
        alert("ОШИБКА ВЫВОДА! База данных заблокировала обновление."); 
    } finally {
        btn.classList.remove('disabled');
        btn.innerText = "ВЫВЕСТИ В БАНК";
    }
}
</script>
</body>
</html>
