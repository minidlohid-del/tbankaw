<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiMarket V3 — Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; touch-action: manipulation; }
        .kiwi-coin { 
            width: 240px; height: 240px; 
            background: linear-gradient(135deg, #ffb347 0%, #ff8c00 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(255, 140, 0, 0.25), inset 0 0 20px rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.05s, filter 0.1s;
        }
        .kiwi-coin:active { transform: scale(0.92); filter: brightness(1.2); }
        .glass-panel { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { flex: 1; padding: 16px 0; text-align: center; color: #555; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;}
        .nav-btn.active { color: #ff8c00; border-bottom: 3px solid #ff8c00; background: linear-gradient(to top, rgba(255,140,0,0.1), transparent); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="auth-section" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-xs p-8 glass-panel rounded-[32px] text-center">
            <h2 class="text-orange-500 font-black italic text-xl mb-8 tracking-tighter">KIWI MARKET V3</h2>
            <input id="auth-code" type="text" placeholder="Код входа" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-3 text-center font-bold text-white outline-none">
            <input id="auth-pin" type="password" placeholder="Пин-код" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-8 text-center font-bold text-white outline-none">
            <button onclick="linkBank()" class="w-full bg-gradient-to-r from-orange-500 to-yellow-500 py-4 rounded-2xl font-black uppercase text-[11px] text-black tracking-widest">Войти</button>
        </div>
    </div>

    <div id="app-section" class="hidden flex-1 flex flex-col">
        <header class="p-6 flex justify-between items-start border-b border-white/5">
            <div class="text-left">
                <p class="text-[9px] text-zinc-500 font-black uppercase tracking-widest mb-1">Банк</p>
                <h2 id="bank-disp" class="text-xl font-black italic text-white">0 ₽</h2>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-orange-500 font-black uppercase tracking-widest mb-1">Маркет</p>
                <h2 id="market-disp" class="text-xl font-black italic text-orange-500">0 ₽</h2>
            </div>
        </header>

        <main class="flex-1 relative overflow-hidden">
            <div id="tab-work" class="absolute inset-0 flex flex-col items-center justify-center p-6 transition-opacity duration-300">
                <div class="kiwi-coin" onclick="handleFarmClick()">
                    <span class="text-8xl font-black italic text-black/20">K</span>
                </div>
                <div class="mt-12 text-center">
                    <p class="text-orange-500 text-xs font-black uppercase tracking-widest">+100 ₽ ЗА КЛИК</p>
                    <p id="sync-status" class="mt-4 text-[8px] font-bold text-zinc-600 uppercase tracking-widest opacity-0">Сохранение...</p>
                </div>
            </div>

            <div id="tab-profile" class="absolute inset-0 flex flex-col items-center justify-center p-6 opacity-0 pointer-events-none transition-opacity duration-300">
                <div class="w-full max-w-sm glass-panel p-8 rounded-[32px] text-center">
                    <h3 class="text-lg font-black uppercase mb-1">Профиль</h3>
                    <div class="bg-black/50 p-4 rounded-2xl border border-white/5 my-6 text-left">
                        <p class="text-[10px] text-zinc-500 uppercase font-black mb-1">Нафармлено:</p>
                        <p id="profile-market-balance" class="text-2xl font-black italic text-orange-500 mb-4">0 ₽</p>
                        <div class="flex justify-between items-center text-[9px] font-bold text-zinc-400 border-t border-white/10 pt-3">
                            <span>Минимум: 500 ₽</span>
                            <span>Комиссия: 90%</span>
                        </div>
                    </div>
                    <button onclick="withdraw()" class="w-full bg-orange-500 py-4 rounded-xl font-black uppercase text-xs text-black">Вывести</button>
                </div>
            </div>
        </main>

        <nav class="glass-panel flex">
            <button onclick="switchTab('work')" id="nav-work" class="nav-btn active">Работа</button>
            <button onclick="switchTab('profile')" id="nav-profile" class="nav-btn">Профиль</button>
        </nav>
    </div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

let currentUser = null;
let syncTimeout = null;

async function linkBank() {
    const code = document.getElementById('auth-code').value;
    const pin = document.getElementById('auth-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [Query.equal('personalCode', code), Query.equal('pin', pin)]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            updateUI();
        } else alert("Ошибка данных");
    } catch (e) { alert("Ошибка сети"); }
}

function updateUI() {
    document.getElementById('bank-disp').innerText = (currentUser.balance || 0).toLocaleString() + " ₽";
    document.getElementById('market-disp').innerText = (currentUser.market_wallet || 0).toLocaleString() + " ₽";
    document.getElementById('profile-market-balance').innerText = (currentUser.market_wallet || 0).toLocaleString() + " ₽";
}

function switchTab(tab) {
    document.getElementById('tab-work').classList.toggle('opacity-0', tab !== 'work');
    document.getElementById('tab-work').classList.toggle('pointer-events-none', tab !== 'work');
    document.getElementById('tab-profile').classList.toggle('opacity-0', tab !== 'profile');
    document.getElementById('tab-profile').classList.toggle('pointer-events-none', tab !== 'profile');
    document.getElementById('nav-work').classList.toggle('active', tab === 'work');
    document.getElementById('nav-profile').classList.toggle('active', tab === 'profile');
}

async function handleFarmClick() {
    if(navigator.vibrate) navigator.vibrate(15);
    currentUser.market_wallet = (currentUser.market_wallet || 0) + 100;
    updateUI();
    document.getElementById('sync-status').style.opacity = "1";
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(async () => {
        try {
            await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { market_wallet: currentUser.market_wallet });
            document.getElementById('sync-status').style.opacity = "0";
        } catch (e) { console.error(e); }
    }, 1000);
}

// === ИЗМЕНЕННАЯ ФУНКЦИЯ ВЫВОДА ===
async function withdraw() {
    if (currentUser.market_wallet < 500) return alert("Минимум 500 ₽");
    const receive = Math.floor(currentUser.market_wallet * 0.1);
    
    if (!confirm(`Вывести ${currentUser.market_wallet} ₽?\nПолучите: ${receive} ₽`)) return;
    
    try {
        const names = ["Иван", "Алексей", "Иброгим", "Михаил", "Рынок (P2P)", "DarkSeller"];
        const randomFrom = names[Math.floor(Math.random() * names.length)];
        const dateStr = new Date().toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});

        let history = [];
        try { if (currentUser.history && currentUser.history.startsWith('[')) history = JSON.parse(currentUser.history); } catch(e) {}
        
        // Добавляем запись от рандомного человека
        history.push({ type: 'received', from: randomFrom, amount: receive, date: dateStr });
        if (history.length > 15) history.shift();

        const newBank = (currentUser.balance || 0) + receive;
        
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, { 
            balance: newBank, 
            market_wallet: 0,
            history: JSON.stringify(history)
        });

        currentUser.balance = newBank;
        currentUser.market_wallet = 0;
        currentUser.history = JSON.stringify(history);
        updateUI();
        alert(`Переведено! Отправитель: ${randomFrom}`);
    } catch (e) { alert("Ошибка: " + e.message); }
}
</script>
</body>
</html>
