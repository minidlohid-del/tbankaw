<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | OFFICIAL MARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --main-green: #00ff00; --bg-dark: #000; --card-bg: #111; --red: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 50; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-box input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 12px 8px 35px; border-radius: 20px; width: 100px; transition: 0.3s; }
        .search-box input:focus { width: 150px; border-color: var(--main-green); outline: none; }
        .search-icon { position: absolute; left: 10px; width: 16px; filter: invert(1); opacity: 0.5; }
        .top-balance { color: var(--main-green); font-weight: bold; font-size: 1.1em; }

        /* Контент */
        .container { padding: 15px; }
        .section-title { font-size: 1.4em; margin-bottom: 15px; color: var(--main-green); text-transform: uppercase; }
        
        .list-item { display: flex; align-items: center; background: var(--card-bg); margin-bottom: 10px; padding: 12px; border-radius: 12px; border: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .circle-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid var(--main-green); }
        .item-info { flex-grow: 1; }
        .item-price { color: var(--main-green); font-weight: bold; font-size: 1.1em; text-align: right; }

        /* Навигация */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-btn { background: none; border: none; color: #555; font-size: 0.75em; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: var(--main-green); }
        .nav-icon { width: 22px; height: 22px; margin-bottom: 5px; opacity: 0.4; }
        .active .nav-icon { opacity: 1; filter: drop-shadow(0 0 5px var(--main-green)); }

        /* Модальное окно */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; padding-top: 40px; z-index: 200; }
        .modal-img { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--main-green); margin-bottom: 15px; }
        .action-btn { padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1em; width: 100%; }
        .btn-buy { background: var(--main-green); color: black; }
        .btn-sell { background: var(--red); color: white; }
        .price-history { width: 85%; background: #0a0a0a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #222; }

        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        .auth-input { padding: 14px; margin: 8px; border-radius: 8px; border: 1px solid #222; width: 260px; background: #111; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="color:var(--main-green)">KIWI ELITE</h1>
        <input type="text" id="user-code" class="auth-input" placeholder="ID (например, 574)">
        <input type="password" id="user-pin" class="auth-input" placeholder="PIN-КОД">
        <button class="action-btn btn-buy" style="width:290px" onclick="login()">ВХОД</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="search-box">
                <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" class="search-icon">
                <input type="text" id="search-user" placeholder="Поиск @id" onchange="findUser()">
            </div>
            <div class="top-balance"><span id="header-balance">0</span> ₽</div>
        </div>

        <div class="container" id="content-area"></div>

        <nav class="bottom-nav">
            <div class="nav-btn active" onclick="showTab('crypto')">
                <img src="https://cdn-icons-png.flaticon.com/512/2500/2500201.png" class="nav-icon"> Биржа
            </div>
            <div class="nav-btn" onclick="showTab('nft')">
                <img src="https://cdn-icons-png.flaticon.com/512/10543/10543265.png" class="nav-icon"> NFT
            </div>
            <div class="nav-btn" onclick="showTab('inventory')">
                <img src="https://cdn-icons-png.flaticon.com/512/2897/2897857.png" class="nav-icon"> Инвентарь
            </div>
            <div class="nav-btn" onclick="showTab('profile')">
                <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" class="nav-icon"> Профиль
            </div>
        </nav>
    </div>

    <div id="item-modal" class="modal">
        <button onclick="closeModal()" style="position:absolute; right:20px; top:15px; background:none; border:none; color:white; font-size:2.5em;">&times;</button>
        <img id="modal-img" class="modal-img" src="">
        <h2 id="modal-name">Название</h2>
        <h1 id="modal-price" style="color:var(--main-green)">0 ₽</h1>
        <div id="modal-stock" style="margin-bottom: 15px; color: #777;">Доступно: 0 шт.</div>
        
        <div style="display: flex; gap: 10px; width: 85%;">
            <button class="action-btn btn-sell" onclick="tradeItem('sell')">Продать -</button>
            <button class="action-btn btn-buy" onclick="tradeItem('buy')">Купить +</button>
        </div>

        <div class="price-history">
            <div id="history-list"></div>
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

const DB_ID = 'bank_db';
const COLL_USERS = 'users';
const COLL_MARKET = 'market';

let currentUser = null;
let activeItem = null;
const cryptoNames = ["КивиКоин", "КивиГаз", "КивиКристалл", "КивиГолд", "КивиНефть", "КивиКристал"];

async function login() {
    const code = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', code), Query.equal('pin', pin)]);
        if(res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            updateHeader();
            showTab('crypto');
            // Обновление цен каждую минуту
            setInterval(() => { if(window.currentTab === 'crypto' || window.currentTab === 'nft') showTab(window.currentTab); }, 60000);
        } else { alert("Неверный вход!"); }
    } catch(e) { alert("Ошибка подключения"); }
}

function updateHeader() {
    document.getElementById('header-balance').innerText = currentUser.balance.toLocaleString();
}

function showTab(tab) {
    window.currentTab = tab;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const btns = document.querySelectorAll('.nav-btn');
    if(tab === 'crypto') btns[0].classList.add('active');
    if(tab === 'nft') btns[1].classList.add('active');
    if(tab === 'inventory') btns[2].classList.add('active');
    if(tab === 'profile') btns[3].classList.add('active');

    const container = document.getElementById('content-area');
    container.innerHTML = `<h2 class="section-title">${tab === 'crypto' ? 'Крипто Биржа' : tab === 'nft' ? 'NFT Маркет' : tab === 'inventory' ? 'Инвентарь' : 'Профиль'}</h2>`;

    if(tab === 'crypto') renderCrypto();
    if(tab === 'nft') renderNFT();
    if(tab === 'inventory') renderInventory();
    if(tab === 'profile') renderProfile();
}

function renderCrypto() {
    cryptoNames.forEach(name => {
        const price = Math.floor(Math.random() * 50000) + 100;
        const stock = [1, 4, 10][Math.floor(Math.random() * 3)];
        const div = createListItem(name, price, stock, 'photo_2026-04-29_23-50-11');
        div.onclick = () => openModal({name, price, stock, image:'photo_2026-04-29_23-50-11'});
        document.getElementById('content-area').appendChild(div);
    });
}

async function renderNFT() {
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET);
        const sorted = res.documents.sort((a, b) => a.price - b.price);
        sorted.forEach(nft => {
            const stock = [1, 4, 10][Math.floor(Math.random() * 3)];
            const div = createListItem(nft.name, nft.price, stock, nft.image);
            div.onclick = () => openModal({...nft, stock});
            document.getElementById('content-area').appendChild(div);
        });
    } catch(e) {}
}

function createListItem(name, price, stock, img) {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `
        <img src="${img}" class="circle-img">
        <div class="item-info">
            <div style="font-weight:bold">${name}</div>
            <div style="font-size:0.8em; color:#555">В наличии: ${stock} шт.</div>
        </div>
        <div class="item-price">${price.toLocaleString()} ₽</div>
    `;
    return div;
}

async function renderInventory() {
    const container = document.getElementById('content-area');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET, [Query.equal('ownerId', currentUser.$id)]);
        if(res.documents.length === 0) container.innerHTML += "<p>У вас нет NFT</p>";
        res.documents.forEach(nft => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.style.flexDirection = 'column';
            div.innerHTML = `
                <div style="display:flex; width:100%; align-items:center;">
                    <img src="${nft.image}" class="circle-img">
                    <div class="item-info"><b>${nft.name}</b></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1.5fr; gap:8px; width:100%; margin-top:10px;">
                    <button class="action-btn btn-buy" style="padding:8px" onclick="showTab('nft')">Еще</button>
                    <button class="action-btn btn-sell" style="padding:8px" onclick="tradeItem('sell', '${nft.$id}')">Продать</button>
                    <button class="action-btn" style="padding:8px; background:#444; color:white" onclick="giftNFT('${nft.$id}')">Подарок</button>
                </div>
            `;
            container.appendChild(div);
        });
    } catch(e) {}
}

async function giftNFT(nftId) {
    const friendCode = prompt("Введите ID друга (например, 2242):");
    if(!friendCode) return;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', friendCode.replace('@', ''))]);
        if(res.documents.length === 0) { alert("Друг не найден!"); return; }
        
        await databases.updateDocument(DB_ID, COLL_MARKET, nftId, { ownerId: res.documents[0].$id });
        alert("Киви успешно подарен пользователю @" + friendCode);
        showTab('inventory');
    } catch(e) { alert("Ошибка при передаче!"); }
}

function renderProfile() {
    document.getElementById('content-area').innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; border-left: 5px solid var(--main-green);">
            <p>ID: <b style="color:var(--main-green)">@${currentUser.personalCode}</b></p>
            <p>Баланс: <b>${currentUser.balance.toLocaleString()} ₽</b></p>
            <p>Телефон: <b>${currentUser.phone || '+7 (900) ***-**-**'}</b></p>
        </div>
    `;
}

function openModal(item) {
    activeItem = item;
    document.getElementById('item-modal').style.display = 'flex';
    document.getElementById('modal-img').src = item.image;
    document.getElementById('modal-name').innerText = item.name;
    document.getElementById('modal-price').innerText = item.price.toLocaleString() + " ₽";
    document.getElementById('modal-stock').innerText = `В наличии: ${item.stock} шт.`;
    
    const hList = document.getElementById('history-list');
    hList.innerHTML = '<h3>История цены</h3>';
    for(let i=0; i<4; i++) {
        const oldP = Math.floor(item.price * (0.5 + Math.random()));
        hList.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #1a1a1a">
            <span>Замер ${4-i}</span> <b>${oldP.toLocaleString()} ₽</b>
        </div>`;
    }
}

function closeModal() { document.getElementById('item-modal').style.display = 'none'; }

async function findUser() {
    const id = document.getElementById('search-user').value.replace('@', '');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', id)]);
        if(res.documents.length > 0) alert("Пользователь @" + id + " в сети!");
        else alert("Пользователь не найден.");
    } catch(e) {}
}

async function tradeItem(type, id = null) {
    // Временно для теста. Для реальной покупки нужно updateDocument для баланса и ownerId
    alert(type === 'buy' ? "Предмет куплен!" : "Предмет продан!");
    closeModal();
}
</script>
</body>
</html>
