<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI MARKET - Биржа</title>
    <!-- Подключаем библиотеку для графиков -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .kiwi-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(255,221,45,0.1); border-radius: 24px; padding: 15px; }
        .win-gradient { background: linear-gradient(180deg, #ffdd2d 0%, #f59e0b 100%); }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-md mx-auto">
        <!-- Заголовок -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black italic text-yellow-400">KIWI MARKET</h1>
            <div class="text-right">
                <p class="text-[10px] text-zinc-500 uppercase">Баланс</p>
                <p id="user-balance" class="font-bold text-xl">0 ₽</p>
            </div>
        </div>

        <!-- Секция 30/70 -->
        <div class="kiwi-card mb-6">
            <h3 class="text-xs font-bold uppercase text-zinc-400 mb-3">Риск-игра (30% на успех)</h3>
            <div class="flex gap-2">
                <input id="bet-amount" type="number" placeholder="Ставка" class="bg-black border border-zinc-800 rounded-lg p-2 flex-1 outline-none focus:border-yellow-500">
                <button onclick="playRisk()" class="win-gradient text-black font-bold px-4 rounded-lg text-sm">ИГРАТЬ</button>
            </div>
        </div>

        <!-- Список Киви -->
        <h2 class="text-sm font-bold uppercase text-zinc-500 mb-4">Торговая площадка</h2>
        <div id="kiwi-list" class="space-y-4">
            <!-- Сюда подгрузится Киви-снег -->
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('69f223f4002d7c30c1b9'); // Твой ID проекта

const databases = new Databases(client);
const DB_ID = 'bank_db';
const USERS_COLL = 'users';
const MARKET_COLL = 'market';

// Это временные данные для графиков (имитация истории)
const priceHistory = [100, 150, 80, 120, 95, 110, 500]; 

// Имитация входа (позже прикрутим проверку через 3 цифры)
let userBalance = 5000; 
document.getElementById('user-balance').innerText = userBalance + " ₽";

async function loadKiwis() {
    const list = document.getElementById('kiwi-list');
    try {
        const res = await databases.listDocuments(DB_ID, MARKET_COLL);
        list.innerHTML = "";
        
        res.documents.forEach(kiwi => {
            const card = `
                <div class="kiwi-card">
                    <img src="${kiwi.image}" class="w-full h-40 object-contain rounded-xl mb-3 bg-black">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <h4 class="font-black italic uppercase">${kiwi.name}</h4>
                            <p class="text-green-400 font-bold text-lg">${kiwi.price} ₽</p>
                        </div>
                        <button class="bg-white text-black font-bold px-4 py-2 rounded-xl text-xs uppercase">Купить</button>
                    </div>
                    <!-- Место для графика -->
                    <canvas id="chart-${kiwi.$id}" height="100"></canvas>
                </div>
            `;
            list.innerHTML += card;
            
            // Рисуем график после вставки карточки
            setTimeout(() => drawChart(kiwi.$id), 100);
        });
    } catch (e) { console.error(e); }
}

function drawChart(id) {
    const ctx = document.getElementById(`chart-${id}`).getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['', '', '', '', '', '', ''],
            datasets: [{
                data: priceHistory,
                borderColor: '#f59e0b',
                borderWidth: 2,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } }
        }
    });
}

function playRisk() {
    const amount = parseInt(document.getElementById('bet-amount').value);
    if (amount > 0) {
        const win = Math.random() < 0.3;
        if (win) {
            userBalance += amount * 2;
            alert("🔥 Победил!");
        } else {
            userBalance -= amount;
            alert("💀 Проиграл");
        }
        document.getElementById('user-balance').innerText = userBalance + " ₽";
    }
}

loadKiwis();
</script>
</body>
</html>
