<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | ANIMATED</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #00ccff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        /* Анимации */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes sellOut {
            to { opacity: 0; transform: scale(0.8); height: 0; margin: 0; padding: 0; }
        }

        .header { padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; }
        
        .item { 
            display: flex; align-items: center; background: var(--card); margin: 10px; padding: 12px; 
            border-radius: 12px; border: 1px solid #222; animation: fadeUp 0.3s ease forwards;
        }
        .item.removing { animation: sellOut 0.4s ease forwards !important; }

        .img-box { width: 55px; height: 55px; border-radius: 10px; margin-right: 12px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.65em; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .n-btn.active { color: var(--green); transform: translateY(-2px); }

        .btn { padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }

        .mine-btn { 
            width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--green); 
            background: none; color: var(--green); font-size: 1.3em; font-weight: bold; 
            cursor: pointer; margin-top: 20px; transition: 0.1s; 
        }
        .mine-btn:active { transform: scale(0.9); box-shadow: 0 0 20px var(--green); }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 style="color:var(--green); letter-spacing: 2px;">KIWI ELITE</h2>
        <input type="text" id="cid" placeholder="КАРТА" style="padding:14px; margin:5px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <input type="password" id="pin" placeholder="PIN" style="padding:14px; margin:5px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <button class="btn buy" style="width:290px; margin-top:15px; padding:15px" onclick="login()">ВОЙТИ В СИСТЕМУ</button>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size:0.85em; color:#aaa;">БАНК: <span id="bal-main" style="color:var(--green); font-weight:900;">0 ₽</span></div>
                <div style="font-size:0.85em; color:#aaa;">МАРКЕТ: <span id="bal-market" style="color:var(--blue); font-weight:900;">0 ₽</span></div>
            </div>
        </div>

        <div id="screen"></div>

        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins', this)">БИРЖА</button>
            <button class="n-btn" onclick="tab('nft', this)">NFT КИВИ</button>
            <button class="n-btn" onclick="tab('work', this)">РАБОТАТЬ</button>
            <button class="n-btn" onclick="tab('inv', this)">СКЛАД</button>
            <button class="n-btn" onclick="tab('me', this)">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';

let user = null;
let lastClick = 0;

const kiwiPhotos = [
    'photo_2026-04-29_23-50-11.jpg', 'photo_2026-04-29_23-50-19.jpg', 
    'photo_2026-04-29_23-50-20.jpg', 'photo_2026-04-29_23-50-21.jpg', 
    'photo_2026-04-29_23-50-38.jpg', 'photo_2026-04-29_23-50-40.jpg',
    'photo_2026-04-29_23-50-42.jpg', 'photo_2026-04-29_23-50-44.jpg',
    'photo_2026-04-29_23-50-50.jpg', 'photo_2026-04-29_23-50-54.jpg',
    'photo_2026-04-29_23-50-59.jpg'
];

async function login() {
    const c = document.getElementById('cid').value, p = document.getElementById('pin').value;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("Неверный PIN");
        } else {
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { personalCode:c, pin:p, balance:1000, marketBalance:0 });
        }
        document.getElementById('auth').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        updateUI(); tab('coins', document.querySelector('.n-btn'));
    } catch(e) { alert("Ошибка подключения"); }
}

function updateUI() {
    if(!user) return;
    document.getElementById('bal-main').innerText = Math.floor(user.balance).toLocaleString() + " ₽";
    document.getElementById('bal-market').innerText = Math.floor(user.marketBalance || 0).toLocaleString() + " ₽";
}

async function tab(t, btn) {
    const s = document.getElementById('screen');
    s.innerHTML = `<h3 style="margin:20px; color:var(--green); letter-spacing:1px;">${t.toUpperCase()}</h3>`;
    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');

    if(t === 'coins') {
        ["КивиГаз", "КивиКристалл", "КивиНефть"].forEach((name, i) => {
            const pr = Math.floor(Math.random() * 20000) + 1000;
            s.innerHTML += `<div class="item" style="animation-delay: ${i*0.1}s">
                <div class="img-box"><img src="photo_2026-04-29_23-50-11.jpg"></div>
                <div style="flex:1"><b>${name}</b><br><small style="color:#666">${pr} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('${name}', ${pr}, 'photo_2026-04-29_23-50-11.jpg')">КУПИТЬ</button>
            </div>`;
        });
    }
    
    if(t === 'nft') {
        kiwiPhotos.forEach((img, idx) => {
            const pr = Math.floor(Math.random() * 150000) + 5000;
            s.innerHTML += `<div class="item" style="animation-delay: ${idx*0.05}s">
                <div class="img-box"><img src="${img}"></div>
                <div style="flex:1"><b>Киви NFT #${idx + 500}</b><br><small style="color:#666">${pr} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('NFT КИВИ', ${pr}, '${img}')">КУПИТЬ</button>
            </div>`;
        });
    }

    if(t === 'work') {
        s.innerHTML += `<div style="text-align:center; padding-top:40px; animation: fadeUp 0.4s ease;">
            <p style="color:gray;">МАЙНИНГ ВАЛЮТЫ МАРКЕТА</p>
            <h1 id="clicks" style="font-size:3.5em; color:var(--blue); margin:15px 0;">0</h1>
            <button class="mine-btn" onclick="mine()">КЛИК</button>
        </div>`;
    }

    if(t === 'inv') {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
        if(res.documents.length === 0) s.innerHTML += "<p style='padding:30px; opacity:0.3;'>Склад пуст...</p>";
        res.documents.forEach((doc, i) => {
            s.innerHTML += `<div class="item" id="card-${doc.$id}" style="animation-delay: ${i*0.1}s">
                <div class="img-box"><img src="${doc.image}"></div>
                <div style="flex:1"><b>${doc.name}</b></div>
                <button class="btn sell" onclick="sellItem('${doc.$id}', ${doc.price}, this)">ПРОДАТЬ</button>
            </div>`;
        });
    }

    if(t === 'me') {
        s.innerHTML += `<div style="background:#111; margin:15px; padding:30px; border-radius:20px; border:1px solid #222; text-align:center; animation: fadeUp 0.4s ease;">
            <div style="width:70px; height:70px; background:#222; border-radius:50%; margin: 0 auto 15px; display:flex; align-items:center; justify-content:center; border:2px solid var(--green);">
                 <span style="font-size:2em;">🥝</span>
            </div>
            <p style="color:gray; margin-bottom:5px;">ДОСТУПНО К ВЫВОДУ</p>
            <h2 style="color:var(--blue); margin:0;">${Math.floor(user.marketBalance || 0)} ₽</h2>
            <button class="btn buy" style="width:100%; padding:18px; margin-top:25px; border-radius:12px;" onclick="withdraw()">ВЫВЕСТИ В БАНК</button>
            <p style="font-size:0.75em; color:gray; margin-top:15px;">Мин. сумма: 500 ₽ | Комиссия: 90%</p>
        </div>`;
    }
}

async function buyAsset(n, p, i) {
    if(user.balance < p) return alert("Недостаточно средств в Банке");
    user.balance -= p; updateUI();
    try {
        await db.createDocument(DB_ID, MARKET, ID.unique(), { name:n, price:p, ownerId:user.$id, image:i });
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
    } catch(e) {}
}

async function sellItem(id, price, btn) {
    const card = document.getElementById(`card-${id}`);
    if(card.classList.contains('removing')) return;
    
    // 1. Плавная анимация удаления
    card.classList.add('removing');
    
    // 2. Расчет денег
    const earn = Math.floor(price * 0.1); 
    user.marketBalance = (user.marketBalance || 0) + earn;
    updateUI();

    try {
        // 3. Удаление из базы
        await db.deleteDocument(DB_ID, MARKET, id);
        await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance });
        
        // 4. Окончательное удаление из DOM после анимации
        setTimeout(() => card.remove(), 400);
    } catch(e) {
        card.classList.remove('removing');
        alert("Ошибка продажи");
    }
}

function mine() {
    const now = Date.now();
    if(now - lastClick < 70) return;
    lastClick = now;
    let c = parseInt(document.getElementById('clicks').innerText) + 1;
    document.getElementById('clicks').innerText = c;
    if(c % 20 === 0) {
        user.marketBalance += 30;
        updateUI();
        db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: user.marketBalance });
    }
}

async function withdraw() {
    const mb = user.marketBalance || 0;
    if(mb < 500) return alert("Минимальный вывод: 500 ₽");
    
    const payout = Math.floor(mb * 0.1); 
    const fee = mb - payout;

    if(confirm(`Вывод: ${mb} ₽\nКомиссия: ${fee} ₽\nНа карту: ${payout} ₽\n\nПодтвердить?`)) {
        user.balance += payout;
        user.marketBalance = 0;
        updateUI();
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance, marketBalance: 0 });
        tab('me', null);
    }
}
</script>
</body>
</html>
