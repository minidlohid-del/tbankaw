<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI MARKET | БИРЖА</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #00ff00; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Сетка товаров */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { background: #111; border: 1px solid #00ff0033; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00ff00; transform: scale(1.02); box-shadow: 0 0 15px #00ff0022; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; font-size: 1em; color: #aaa; }
        .card p { color: #00ff00; font-weight: bold; font-size: 1.3em; margin: 5px 0; }
        
        .buy-btn { background: #008000; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .buy-btn:hover { background: #00ff00; color: black; }
        .buy-btn:disabled { background: #333; color: #777; cursor: not-allowed; }

        /* Экран входа */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 12px; margin: 10px; border-radius: 6px; border: 1px solid #333; width: 260px; background: #111; color: white; text-align: center; font-size: 1.1em; }
        input:focus { border-color: #00ff00; outline: none; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-screen">
        <h1 style="font-size: 2.5em;">ВХОД В БИРЖУ</h1>
        <input type="text" id="user-code" placeholder="КОД">
        <input type="password" id="user-pin" placeholder="PIN">
        <button class="buy-btn" style="width: 286px; font-size: 1.1em;" onclick="login()">ВОЙТИ</button>
    </div>

    <!-- Основной контент -->
    <div class="container" id="main-content" style="display:none;">
        <h1>KIWI EXCHANGE | MARKET</h1>
        <div style="text-align: right; margin-bottom: 20px; font-size: 1.2em;">
            ВАШ БАЛАНС: <span id="balance" style="color:#00ff00; font-weight: bold;">0</span> ₽
        </div>
        <div class="market-grid" id="market-list">
            <!-- Здесь появятся киви -->
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;

const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('69f223f4002d7c30c1b9'); // Project ID

const databases = new Databases(client);

const DB_ID = 'bank_db';     // Database ID
const COLL_MARKET = 'market'; // Table market
const COLL_USERS = 'users';   // Table users

let currentUser = null;

async function login() {
    const code = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;

    try {
        const response = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code),
            Query.equal('pin', pin)
        ]);

        if (response.documents.length > 0) {
            currentUser = response.documents[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('balance').innerText = currentUser.balance;
            loadMarket();
        } else {
            alert("ОШИБКА: Неверные данные доступа!");
        }
    } catch (error) {
        console.error("Technical details:", error);
        alert("Ошибка подключения! Проверь Platform в Appwrite.");
    }
}

async function loadMarket() {
    try {
        const response = await databases.listDocuments(DB_ID, COLL_MARKET);
        const list = document.getElementById('market-list');
        list.innerHTML = '';

        response.documents.forEach(item => {
            const isSold = item.ownerId && item.ownerId !== "NULL";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.image}" alt="kiwi">
                <h3>${item.name}</h3>
                <p>${item.price} ₽</p>
                <button class="buy-btn" ${isSold ? 'disabled' : ''} onclick="buyItem('${item.$id}', ${item.price})">
                    ${isSold ? 'ПРОДАНО' : 'КУПИТЬ'}
                </button>
            `;
            list.appendChild(card);
        });
    } catch (error) {
        console.error("Load error:", error);
    }
}

async function buyItem(itemId, price) {
    if (currentUser.balance < price) {
        alert("НЕДОСТАТОЧНО СРЕДСТВ!");
        return;
    }

    try {
        const newBalance = currentUser.balance - price;
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, {
            balance: newBalance
        });
        currentUser.balance = newBalance;
        document.getElementById('balance').innerText = newBalance;

        await databases.updateDocument(DB_ID, COLL_MARKET, itemId, {
            ownerId: currentUser.$id
        });

        alert("УСПЕШНАЯ ПОКУПКА!");
        loadMarket();
    } catch (error) {
        console.error("Buy error:", error);
        alert("Ошибка транзакции.");
    }
}
</script>
</body>
</html>
