<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | FINAL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #3399ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { padding: 10px 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-container { width: 100%; position: relative; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 16px; }
        #search-results { position: absolute; width: 100%; background: #151515; z-index: 1000; border-radius: 0 0 10px 10px; display: none; border: 1px solid var(--green); max-height: 250px; overflow-y: auto; }
        .search-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; }
        .item { display: flex; align-items: center; background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        .img-box { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .n-btn.active { color: var(--green); }
        .btn { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .gift { background: var(--blue); color: white; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--green)">KIWI ELITE</h1>
        <input type="text" id="cid" placeholder="ЦИФРЫ КАРТЫ" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <button class="btn buy" style="width:300px; margin-top:15px" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size: 0.9em;">ID: <span id="pub-id" style="color:var(--green); font-weight: bold;">...</span></div>
                <div style="color:var(--green); font-weight:bold; font-size:1.2em;"><span id="bal">0</span> ₽</div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Введите цифры для поиска..." oninput="liveSearch()">
                <div id="search-results"></div>
            </div>
        </div>
        <div class="container" id="screen"></div>
        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins')">БИРЖА</button>
            <button class="n-btn" onclick="tab('nfts')">МАРКЕТ</button>
            <button class="n-btn" onclick="tab('inv')">ИНВЕНТАРЬ</button>
            <button class="n-btn" onclick="tab('me')">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';
let user = null;

async function login() {
    const c = String(document.getElementById('cid').value), p = String(document.getElementById('pin').value);
    if(!c || !p) return;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("Неверный PIN");
        } else {
            const genID = "ID" + Math.floor(100000 + Math.random() * 899999);
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { personalCode: c, pin: p, balance: 35000, publicID: genID });
        }
        if(!user.publicID || user.publicID === "undefined") user.publicID = "ID" + c;
        startApp();
    } catch(e) { alert("Ошибка подключения"); }
}

function startApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('pub-id').innerText = user.publicID;
    updateUI(); tab('coins');
}

function updateUI() { document.getElementById('bal').innerText = user.balance.toLocaleString(); }

async function liveSearch() {
    const val = document.getElementById('search-input').value.trim();
    const resDiv = document.getElementById('search-results');
    if(val.length < 1) { resDiv.style.display = 'none'; return; }
    try {
        const queryStr = val.startsWith('ID') ? val : "ID" + val;
        const r = await db.listDocuments(DB_ID, USERS, [Query.startsWith('publicID', queryStr), Query.limit(5)]);
        resDiv.innerHTML = '';
        if(r.documents.length > 0) {
            resDiv.style.display = 'block';
            r.documents.forEach(u => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `<span>👤 ${u.publicID}</span> <small style="color:var(--green)">${u.balance} ₽</small>`;
                item.onclick = () => { alert(`Игрок: ${u.publicID}\nБаланс: ${u.balance} ₽`); resDiv.style.display = 'none'; };
                resDiv.appendChild(item);
            });
        } else { resDiv.style.display = 'none'; }
    } catch(e) {}
}

async function tab(t) {
    const screen = document.getElementById('screen');
    screen.innerHTML = `<h2 style="color:var(--green);">${t.toUpperCase()}</h2>`;
    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
    if(t === 'coins') renderMarket('Coin', 10, 5000);
    if(t === 'nfts') renderNFTsFromDB();
    if(t === 'inv') renderInventory();
    if(t === 'me') renderProfile();
}

// Теперь цены РАЗНЫЕ благодаря Math.random
function renderMarket(type, count, basePrice) {
    const screen = document.getElementById('screen');
    const photo = "photo_2026-04-29_23-50-11.jpg";
    for(let i=1; i<=count; i++) {
        let randomPrice = basePrice + Math.floor(Math.random() * 2000); // Разброс в 2000р
        screen.innerHTML += `
            <div class="item">
                <div class="img-box"><img src="${photo}"></div>
                <div style="flex:1"><b>${type} #${i}</b><br><small>${randomPrice} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('${type} #${i}', ${randomPrice}, '${photo}')">КУПИТЬ</button>
            </div>`;
    }
}

async function renderNFTsFromDB() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.limit(40)]);
        res.documents.forEach(doc => {
            // Если цена в базе одинаковая, визуально меняем её здесь или берем из базы
            let dPrice = doc.price || 10000;
            screen.innerHTML += `
                <div class="item">
                    <div class="img-box"><img src="${doc.image}" onerror="this.src='https://via.placeholder.com/55?text=NFT'"></div>
                    <div style="flex:1"><b>${doc.name}</b><br><small>${dPrice} ₽</small></div>
                    <button class="btn buy" onclick="buyAsset('${doc.name}', ${dPrice}, '${doc.image}')">КУПИТЬ</button>
                </div>`;
        });
    } catch(e) {}
}

async function buyAsset(name, price, img) {
    if(user.balance < price) return alert("Недостаточно средств!");
    user.balance -= price; updateUI();
    try {
        await db.createDocument(DB_ID, MARKET, ID.unique(), { name: name, price: price, ownerId: user.$id, image: img });
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
        alert("Успешно куплено!");
    } catch(e) { alert("Ошибка БД"); }
}

async function renderInventory() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
        if(res.documents.length === 0) screen.innerHTML += "<p>Инвентарь пуст</p>";
        res.documents.forEach(doc => {
            screen.innerHTML += `
                <div class="item">
                    <div class="img-box"><img src="${doc.image}"></div>
                    <div style="flex:1"><b>${doc.name}</b></div>
                    <button class="btn gift" onclick="giftItem('${doc.$id}', '${doc.name}')">ПОДАРИТЬ</button>
                </div>`;
        });
    } catch(e) {}
}

async function giftItem(itemId, itemName) {
    const targetDigits = prompt(`Кому передать "${itemName}"?\nВведите цифры ID (например: 123456):`);
    if(!targetDigits) return;
    const targetFullID = "ID" + targetDigits.replace(/\D/g, ""); // Убираем лишнее, оставляем цифры
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('publicID', targetFullID)]);
        if(res.documents.length === 0) return alert("Игрок с таким ID не найден!");
        if(res.documents[0].$id === user.$id) return alert("Нельзя дарить самому себе!");
        
        await db.updateDocument(DB_ID, MARKET, itemId, { ownerId: res.documents[0].$id });
        alert(`Предмет "${itemName}" передан игроку ${targetFullID}`);
        tab('inv');
    } catch(e) { alert("Ошибка при передаче"); }
}

function renderProfile() {
    const displayID = user.publicID && user.publicID !== "undefined" ? user.publicID : ("ID" + user.personalCode);
    document.getElementById('screen').innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #222; text-align:center;">
            <p style="color:gray;">ВАШ ID В СЕТИ</p>
            <h2 style="color:var(--green); font-size:2.5em; margin:10px 0;">${displayID}</h2>
            <div style="border-top:1px solid #222; padding-top:15px; margin-top:15px;">
                <p>БАЛАНС: <b>${user.balance.toLocaleString()} ₽</b></p>
                <p>КАРТА: <b>${user.personalCode}</b></p>
            </div>
        </div>`;
}

document.addEventListener('click', (e) => {
    if(!e.target.closest('.search-container')) document.getElementById('search-results').style.display = 'none';
});
</script>
</body>
</html>
