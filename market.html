<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE EXCHANGE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        .yellow-circle { width: 12px; height: 12px; background: #ffdd2d; border-radius: 50%; display: inline-block; }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; }
        .h-scroll { display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; padding-bottom: 10px; }
        .h-scroll::-webkit-scrollbar { display: none; }
        .tab-btn.active { color: #ffdd2d; border-bottom: 2px solid #ffdd2d; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-screen" class="p-6 pt-20 max-w-sm mx-auto">
        <h1 class="text-3xl font-black italic text-yellow-400 mb-8 uppercase text-center italic">T-BANK MARKET</h1>
        <div class="glass-card p-6">
            <input id="login-code" type="password" maxlength="3" placeholder="3 цифры" class="w-full bg-transparent border-b border-zinc-800 p-4 mb-4 text-center text-2xl outline-none focus:border-yellow-400 transition-all">
            <input id="login-pin" type="password" maxlength="4" placeholder="ПИН-КОД" class="w-full bg-transparent border-b border-zinc-800 p-4 mb-8 text-center text-xl outline-none focus:border-yellow-400 transition-all">
            <button onclick="auth()" class="w-full bg-yellow-400 text-black font-bold py-4 rounded-xl active:scale-95 transition-all">ВОЙТИ В ТЕРМИНАЛ</button>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="main-ui" class="hidden pb-24">
        <div class="p-4 flex justify-between items-center sticky top-0 bg-black z-10 border-b border-zinc-900">
            <div>
                <p id="user-at" class="text-zinc-500 text-[10px] uppercase tracking-widest">ID: @loading...</p>
                <p id="user-balance" class="text-xl font-bold text-yellow-400">0 ₽</p>
            </div>
            <button onclick="location.reload()" class="p-2 text-xs text-zinc-500 uppercase font-bold">Выход</button>
        </div>

        <div class="flex justify-around border-b border-zinc-900 mb-4 bg-zinc-950">
            <button onclick="switchTab('crypto')" id="tab-crypto" class="tab-btn py-3 px-2 text-[10px] font-bold active uppercase">Крипта</button>
            <button onclick="switchTab('market')" id="tab-market" class="tab-btn py-3 px-2 text-[10px] font-bold text-zinc-500 uppercase">Рынок Киви</button>
            <button onclick="switchTab('inv')" id="tab-inv" class="tab-btn py-3 px-2 text-[10px] font-bold text-zinc-500 uppercase">Инвентарь</button>
            <button onclick="switchTab('profile')" id="tab-profile" class="tab-btn py-3 px-2 text-[10px] font-bold text-zinc-500 uppercase">Профиль</button>
        </div>

        <!-- Раздел КРИПТА -->
        <div id="section-crypto" class="p-4 space-y-6">
            <div class="h-scroll" id="crypto-list">
                <!-- Заполняется JS -->
            </div>
            
            <!-- РИСК ИГРА -->
            <div class="glass-card p-5 border-yellow-500/10">
                <p class="text-[10px] text-zinc-500 uppercase mb-3 font-bold">Риск-Терминал (25% Шанс)</p>
                <div class="flex gap-2">
                    <input id="bet-val" type="number" placeholder="Сумма ставки" class="bg-black border border-zinc-800 rounded-lg p-3 flex-1 text-sm outline-none focus:border-yellow-500">
                    <button id="bet-btn" onclick="playRisk()" class="bg-yellow-400 text-black px-6 rounded-lg font-bold text-xs uppercase">ИГРАТЬ</button>
                </div>
                <p id="bet-timer" class="text-[9px] mt-2 text-zinc-600 text-center uppercase tracking-tighter">КД 10 секунд после игры</p>
            </div>
        </div>

        <!-- Раздел РЫНОК -->
        <div id="section-market" class="hidden p-4 grid grid-cols-2 gap-4">
            <!-- Заполняется JS из Appwrite -->
        </div>
    </div>

    <!-- Модалка сделки -->
    <div id="trade-modal" class="fixed inset-0 bg-black hidden z-50 p-6">
        <button onclick="closeTrade()" class="text-zinc-500 mb-6 uppercase text-[10px] font-bold tracking-widest">← Назад к торгам</button>
        <div id="trade-content"></div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);
const DB_ID = 'bank_db';
const COLL_USERS = 'users';
const COLL_MARKET = 'market';

let currentUser = null;
let lastBetTime = 0;

const cryptoAssets = [
    { id: 'gas', name: 'кивиГаз', price: 1204, slot: 20 },
    { id: 'crys', name: 'кивиКристалл', price: 2349, slot: 15 },
    { id: 'coin', name: 'кивиКоин', price: 50, slot: 1000 },
    { id: 'serv', name: 'кивиУслуги', price: 890, slot: 5 }
];

async function auth() {
    const code = document.getElementById('login-code').value;
    const pin = document.getElementById('login-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            initApp();
        } else { alert("НЕВЕРНЫЕ ДАННЫЕ"); }
    } catch (e) { alert("ОШИБКА БАЗЫ: Проверьте ID проекта и таблицы"); }
}

function initApp() {
    document.getElementById('user-at').innerText = `@${currentUser.$id.slice(-6)}`;
    updateBalanceDisplay();
    renderCrypto();
    renderMarket();
}

function updateBalanceDisplay() {
    document.getElementById('user-balance').innerText = currentUser.balance.toLocaleString() + " ₽";
}

function switchTab(tab) {
    ['crypto', 'market', 'inv', 'profile'].forEach(t => {
        document.getElementById('section-' + t)?.classList.add('hidden');
        document.getElementById('tab-' + t).classList.remove('active', 'text-yellow-400');
        document.getElementById('tab-' + t).classList.add('text-zinc-500');
    });
    document.getElementById('section-' + tab)?.classList.remove('hidden');
    document.getElementById('tab-' + tab).classList.add('active', 'text-yellow-400');
}

function renderCrypto() {
    const list = document.getElementById('crypto-list');
    list.innerHTML = cryptoAssets.map(asset => `
        <div onclick="openTrade('${asset.name}', 'crypto', ${asset.price})" class="glass-card p-4 min-w-[140px] border-zinc-800">
            <div class="yellow-circle mb-3"></div>
            <p class="text-[10px] text-zinc-500 uppercase font-bold">${asset.name}</p>
            <p class="text-lg font-black italic">${asset.price} ₽</p>
        </div>
    `).join('');
}

async function renderMarket() {
    const list = document.getElementById('section-market');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET);
        list.innerHTML = res.documents.map(kiwi => `
            <div onclick="openTrade('${kiwi.name}', 'kiwi', ${kiwi.price}, '${kiwi.image}')" class="glass-card p-3 text-center border-zinc-800">
                <img src="${kiwi.image}" class="w-full h-20 object-contain mb-2">
                <p class="text-[9px] text-zinc-500 font-bold uppercase">${kiwi.name}</p>
                <p class="text-sm font-black">${kiwi.price} ₽</p>
                <p class="text-[8px] text-zinc-600 mt-1">СЛОТ: 2 шт</p>
            </div>
        `).join('');
    } catch (e) { list.innerHTML = "<p class='text-xs text-zinc-600 col-span-2'>Добавьте товары в таблицу market</p>"; }
}

function openTrade(name, type, price, img = null) {
    const modal = document.getElementById('trade-modal');
    const content = document.getElementById('trade-content');
    modal.classList.remove('hidden');
    
    // Генерация волатильного графика
    const history = Array.from({length: 12}, () => Math.floor(price * (0.8 + Math.random() * 0.4)));
    const comm = Math.floor(price * 0.05 + 50); // Комиссия

    content.innerHTML = `
        <div class="flex flex-col items-center mb-8">
            ${img ? `<img src="${img}" class="h-32 mb-4">` : `<div class="yellow-circle !w-16 !h-16 mb-4"></div>`}
            <h2 class="text-2xl font-black italic uppercase">${name}</h2>
            <p class="text-[10px] text-zinc-500 tracking-widest mt-1">Свободно в слоте: 20 шт</p>
        </div>

        <div class="text-center mb-8">
            <p class="text-xs text-zinc-500 uppercase mb-1 font-bold">Текущая цена</p>
            <div class="text-5xl font-black italic text-yellow-400">${price} ₽</div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="alert('Недостаточно прав для покупки')" class="bg-zinc-900 border border-zinc-800 text-white font-bold py-4 rounded-2xl uppercase text-[10px]">Купить+ (0)</button>
            <button onclick="alert('У вас нет этого актива')" class="bg-zinc-900 border border-zinc-800 text-white font-bold py-4 rounded-2xl uppercase text-[10px]">Продать- (0)</button>
        </div>
        
        <div class="text-center mb-6">
            <p class="text-zinc-500 text-[9px] uppercase font-bold tracking-tighter">Комиссия биржи: ${comm} ₽</p>
        </div>
        
        <div class="glass-card p-4 h-40">
             <canvas id="tradeChart"></canvas>
        </div>
    `;
    
    setTimeout(() => {
        const ctx = document.getElementById('tradeChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(() => ''),
                datasets: [{ data: history, borderColor: '#ffdd2d', borderWidth: 2, tension: 0.4, pointRadius: 0 }]
            },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }, 100);
}

function closeTrade() { document.getElementById('trade-modal').classList.add('hidden'); }

async function playRisk() {
    const now = Date.now();
    if (now - lastBetTime < 10000) {
        alert("ТЕРМИНАЛ ОХЛАЖДАЕТСЯ. Подождите " + Math.ceil((10000 - (now - lastBetTime))/1000) + " сек.");
        return;
    }
    
    const amount = parseInt(document.getElementById('bet-val').value);
    
    // ПРОВЕРКА НА МИНУС
    if (!amount || amount <= 0) {
        alert("ВВЕДИТЕ СУММУ СТАВКИ");
        return;
    }
    if (amount > currentUser.balance) {
        alert("НЕДОСТАТОЧНО СРЕДСТВ НА БАЛАНСЕ");
        return;
    }
    
    lastBetTime = now;
    const win = Math.random() < 0.25;
    
    try {
        if (win) {
            currentUser.balance += amount * 2;
            alert("🔥 ПОБЕДА! + " + (amount * 2) + " ₽");
        } else {
            currentUser.balance -= amount;
            alert("💀 ПРОИГРЫШ! - " + amount + " ₽");
        }
        
        // Сразу сохраняем в базу банка
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: currentUser.balance });
        updateBalanceDisplay();
        
    } catch (e) {
        alert("Ошибка при сохранении баланса");
    }
}
</script>
</body>
</html>
