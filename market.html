<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiMarket — Фарминг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        .kiwi-coin { 
            width: 240px; height: 240px; 
            background: radial-gradient(circle, #ff8c00 0%, #cc7000 100%);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.3), inset 0 0 20px rgba(255,255,255,0.2);
            display: flex; items-center; justify-content: center;
            cursor: pointer; transition: transform 0.05s active;
        }
        .kiwi-coin:active { transform: scale(0.95); }
        .sync-indicator { font-size: 10px; font-weight: 900; color: #ff8c00; text-transform: uppercase; letter-spacing: 2px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <!-- ЭКРАН ВХОДА (Если не авторизован через банк) -->
    <div id="auth-section" class="w-full max-w-xs p-6 bg-zinc-900 rounded-[32px] border border-white/5">
        <h2 class="text-center font-black italic text-orange-500 mb-6 uppercase">Вход в Маркет</h2>
        <input id="auth-code" type="text" placeholder="Код входа банка" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-3 text-center font-bold">
        <input id="auth-pin" type="password" placeholder="Пин-код" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-4 text-center font-bold">
        <button onclick="linkBank()" class="w-full bg-orange-500 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Начать фарминг</button>
    </div>

    <!-- ИНТЕРФЕЙС МАРКЕТА -->
    <div id="market-section" class="hidden flex flex-col items-center">
        <div class="text-center mb-10">
            <p id="sync-label" class="sync-indicator mb-2 opacity-0">Синхронизация...</p>
            <h2 id="balance-disp" class="text-5xl font-black italic tracking-tighter">0 ₽</h2>
            <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mt-2">Ваш текущий баланс</p>
        </div>

        <div class="kiwi-coin" id="coin-trigger">
            <span class="text-8xl font-black italic text-black/20">K</span>
        </div>

        <p class="mt-12 text-zinc-600 text-[10px] uppercase font-bold">Жми на монету, чтобы заработать</p>
        <button onclick="location.href='index.html'" class="mt-6 text-orange-500 text-xs font-black uppercase border-b border-orange-500/30 pb-1">Вернуться в банк</button>
    </div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const { Client, Databases, Query } = Appwrite;

const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

let currentUser = null;
let clickQueue = 0;
let syncTimeout = null;

// Привязка к аккаунту банка
async function linkBank() {
    const code = document.getElementById('auth-code').value;
    const pin = document.getElementById('auth-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            startMarket();
        } else alert("Аккаунт не найден");
    } catch (e) { alert("Ошибка базы данных"); }
}

function startMarket() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('market-section').classList.remove('hidden');
    document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
    
    // Обработка клика
    const coin = document.getElementById('coin-trigger');
    coin.addEventListener('pointerdown', handleFarmClick);
}

// ГЛАВНАЯ ЛОГИКА С ЗАЩИТОЙ ОТ ЗАВИСАНИЙ
function handleFarmClick(e) {
    // 1. Мгновенно обновляем интерфейс
    currentUser.balance += 1;
    document.getElementById('balance-disp').innerText = currentUser.balance.toLocaleString() + " ₽";
    
    // 2. Накапливаем очередь кликов
    clickQueue++;

    // Визуальный эффект при клике
    document.getElementById('sync-label').classList.remove('opacity-0');
    
    // 3. Сбрасываем старый таймер
    clearTimeout(syncTimeout);

    // 4. Отправляем в базу только если клики прекратились на 800мс[cite: 1]
    syncTimeout = setTimeout(async () => {
        try {
            console.log("Отправка пачки кликов в Appwrite:", clickQueue);
            
            // ОДИН запрос вместо десятков[cite: 1]
            await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
                balance: currentUser.balance
            });
            
            clickQueue = 0;
            document.getElementById('sync-label').classList.add('opacity-0');
            console.log("Синхронизация завершена");
        } catch (e) {
            console.error("Ошибка синхронизации:", e);
            // Если произошла ошибка, баланс останется на экране, 
            // и следующая пачка кликов попробует сохранить всё вместе.[cite: 1]
        }
    }, 800);
}
</script>
</body>
</html>
