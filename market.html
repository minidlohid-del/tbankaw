<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiwiMarket — Фарминг</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; }
        .kiwi-coin { 
            width: 220px; height: 220px; 
            background: radial-gradient(circle, #ff8c00 0%, #cc7000 100%);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 140, 0, 0.2);
            display: flex; items-center; justify-content: center;
            cursor: pointer; transition: transform 0.05s;
            touch-action: manipulation;
        }
        .kiwi-coin:active { transform: scale(0.92); }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #555; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .nav-btn.active { color: #ff8c00; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- ВХОД -->
    <div id="auth-section" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-xs p-8 glass rounded-[32px] text-center">
            <h2 class="text-orange-500 font-black italic mb-6">KIWI MARKET</h2>
            <input id="auth-code" type="text" placeholder="КОД ВХОДА" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-3 text-center font-bold">
            <input id="auth-pin" type="password" placeholder="ПИН-КОД" class="w-full p-4 rounded-2xl bg-black border border-zinc-800 mb-6 text-center font-bold">
            <button onclick="linkBank()" class="w-full bg-orange-500 py-4 rounded-2xl font-black uppercase text-[10px]">Войти</button>
        </div>
    </div>

    <!-- ИНТЕРФЕЙС МАРКЕТА -->
    <div id="market-section" class="hidden flex-1 flex flex-col">
        
        <!-- ВЕРХНЯЯ ПАНЕЛЬ С БАЛАНСАМИ -->
        <header class="p-6 flex justify-between items-start">
            <div class="text-left">
                <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Баланс Маркета</p>
                <h2 id="market-balance-disp" class="text-2xl font-black italic text-white">0 ₽</h2>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-zinc-500 font-black uppercase tracking-widest">Баланс Банка</p>
                <h2 id="bank-balance-disp" class="text-2xl font-black italic text-orange-500">0 ₽</h2>
            </div>
        </header>

        <!-- ЦЕНТРАЛЬНАЯ ЧАСТЬ -->
        <main class="flex-1 flex flex-col items-center justify-center">
            <div class="kiwi-coin" id="coin-trigger">
                <span class="text-8xl font-black italic text-black/20 text-center">K</span>
            </div>
            <p id="sync-status" class="mt-8 text-orange-500 text-[8px] font-black uppercase tracking-[0.4em] opacity-0 transition">Синхронизация...</p>
        </main>

        <!-- НИЖНЕЕ МЕНЮ -->
        <nav class="glass p-6 pb-10 rounded-t-[40px] flex justify-around items-center">
            <button class="nav-btn" onclick="location.href='index.html'">
                <span>Меню</span>
            </button>
            <button class="nav-btn active">
                <span>Работа</span>
            </button>
            <button class="nav-btn" onclick="withdrawFunds()">
                <div class="bg-orange-500 text-black px-3 py-1 rounded-full mb-1">ВЫВОД</div>
            </button>
            <button class="nav-btn">
                <span>Профиль</span>
            </button>
        </nav>
    </div>

<script>
const DB_ID = 'bank_db'; 
const COLL_ID = 'users'; 
const { Client, Databases, Query } = Appwrite;

const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

let currentUser = null;
let marketBalance = 0;
let syncTimeout = null;

async function linkBank() {
    const code = document.getElementById('auth-code').value;
    const pin = document.getElementById('auth-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_ID, [
            Query.equal('personalCode', code), Query.equal('pin', pin)
        ]);
        if (res.documents.length > 0) {
            currentUser = res.documents[0];
            marketBalance = currentUser.market_wallet || 0; 
            startMarket();
        } else alert("Ошибка данных");
    } catch (e) { alert("Ошибка сети"); }
}

function startMarket() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('market-section').classList.remove('hidden');
    updateDisplay();
    
    document.getElementById('coin-trigger').addEventListener('pointerdown', (e) => {
        marketBalance += 1;
        updateDisplay();
        saveProgress();
    });
}

function updateDisplay() {
    document.getElementById('market-balance-disp').innerText = marketBalance.toLocaleString() + " ₽";
    document.getElementById('bank-balance-disp').innerText = (currentUser.balance || 0).toLocaleString() + " ₽";
}

function saveProgress() {
    document.getElementById('sync-status').classList.remove('opacity-0');
    clearTimeout(syncTimeout);
    syncTimeout = setTimeout(async () => {
        try {
            await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
                market_wallet: marketBalance
            });
            document.getElementById('sync-status').classList.add('opacity-0');
        } catch (e) { console.error("Ошибка сохранения"); }
    }, 1000);
}

// ИСПРАВЛЕННЫЙ ВЫВОД С ОБНУЛЕНИЕМ
async function withdrawFunds() {
    if (marketBalance < 500) return alert("Минимальный вывод: 500 ₽");

    const amountToReceive = Math.floor(marketBalance * 0.1); 
    const confirmWithdraw = confirm(`Вывести ${marketBalance} ₽?\nВы получите ${amountToReceive} ₽ (Комиссия 90%)`);
    
    if (!confirmWithdraw) return;

    try {
        // 1. Сначала локально всё считаем
        const newBankBalance = (currentUser.balance || 0) + amountToReceive;
        
        // 2. Отправляем в базу ОБНУЛЕНИЕ маркета и НОВЫЙ баланс банка
        await databases.updateDocument(DB_ID, COLL_ID, currentUser.$id, {
            balance: newBankBalance,
            market_wallet: 0 // ОБНУЛЯЕМ ТУТ
        });

        // 3. Если база ответила успешно — обновляем данные в приложении
        marketBalance = 0; 
        currentUser.balance = newBankBalance;
        currentUser.market_wallet = 0;
        
        updateDisplay();
        alert("Средства переведены в банк!");
    } catch (e) {
        alert("Ошибка транзакции. Попробуйте позже.");
    }
}
</script>
</body>
</html>
