<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI MARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { text-align: center; color: #00ff00; }
        
        /* Сетка товаров */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00ff00; transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; font-size: 1.1em; }
        .card p { color: #00ff00; font-weight: bold; font-size: 1.2em; }
        
        .buy-btn { background: #00ff00; color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .buy-btn:disabled { background: #555; cursor: not-allowed; }

        /* Окно входа */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 250px; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-screen">
        <h1>ВХОД В БАНК</h1>
        <input type="text" id="user-code" placeholder="Код пользователя (напр. 574)">
        <input type="password" id="user-pin" placeholder="PIN-код">
        <button class="buy-btn" style="width: 270px;" onclick="login()">ВОЙТИ</button>
    </div>

    <!-- Основной контент -->
    <div class="container" id="main-content" style="display:none;">
        <h1>KIWI MARKET</h1>
        <div style="text-align: right; margin-bottom: 20px;">
            Баланс: <span id="balance" style="color:#00ff00">0</span> ₽
        </div>
        <div class="market-grid" id="market-list">
            <!-- Сюда попадут товары из базы -->
        </div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;

const client = new Client()
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('69f223f4002d7c30c1b9'); // Твой Project ID с фото

const databases = new Databases(client);

const DB_ID = 'bank_db';     // Твой Database ID
const COLL_MARKET = 'market'; // Твой Table ID для рынка
const COLL_USERS = 'users';   // Твой Table ID для юзеров

let currentUser = null;

async function login() {
    const code = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;

    try {
        const response = await databases.listDocuments(DB_ID, COLL_USERS, [
            Query.equal('code', code),
            Query.equal('pin', pin)
        ]);

        if (response.documents.length > 0) {
            currentUser = response.documents[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('balance').innerText = currentUser.balance;
            loadMarket();
        } else {
            alert("Неверный код или PIN!");
        }
    } catch (error) {
        console.error(error);
        alert("Ошибка подключения к базе!");
    }
}

async function loadMarket() {
    try {
        const response = await databases.listDocuments(DB_ID, COLL_MARKET);
        const list = document.getElementById('market-list');
        list.innerHTML = '';

        response.documents.forEach(item => {
            const isSold = item.ownerId && item.ownerId !== "NULL";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.image}" alt="kiwi">
                <h3>${item.name}</h3>
                <p>${item.price} ₽</p>
                <button class="buy-btn" ${isSold ? 'disabled' : ''} onclick="buyItem('${item.$id}', ${item.price})">
                    ${isSold ? 'ПРОДАНО' : 'КУПИТЬ'}
                </button>
            `;
            list.appendChild(card);
        });
    } catch (error) {
        console.error("Ошибка загрузки товаров:", error);
    }
}

async function buyItem(itemId, price) {
    if (currentUser.balance < price) {
        alert("Недостаточно средств!");
        return;
    }

    try {
        // 1. Обновляем баланс юзера
        const newBalance = currentUser.balance - price;
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, {
            balance: newBalance
        });
        currentUser.balance = newBalance;
        document.getElementById('balance').innerText = newBalance;

        // 2. Помечаем товар как купленный
        await databases.updateDocument(DB_ID, COLL_MARKET, itemId, {
            ownerId: currentUser.$id
        });

        alert("Покупка успешна!");
        loadMarket();
    } catch (error) {
        console.error("Ошибка при покупке:", error);
        alert("Произошла ошибка при оплате.");
    }
}
</script>
</body>
</html>
