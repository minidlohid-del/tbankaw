<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | FIXED VERSION</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #3399ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        
        .header { padding: 10px 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .search-container { width: 100%; position: relative; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box; }
        
        .container { padding: 15px; }
        .item { display: flex; align-items: center; background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        .img-box { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .n-btn.active { color: var(--green); }

        .btn { padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; margin-right: 5px; }
        .gift { background: var(--blue); color: white; }
    </style>
</head>
<body>

    <!-- ВХОД -->
    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--green)">KIWI ELITE</h1>
        <input type="text" id="cid" placeholder="CID КАРТЫ" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <input type="password" id="pin" placeholder="PIN-КОД" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <button class="btn buy" style="width:300px; margin-top:15px" onclick="login()">ПОДТВЕРДИТЬ</button>
    </div>

    <!-- ОСНОВНОЕ -->
    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size: 0.9em;">ID: <span id="pub-id" style="color:var(--green); font-weight:bold;">ЗАГРУЗКА...</span></div>
                <div style="color:var(--green); font-weight:bold; font-size:1.2em;"><span id="bal">0</span> ₽</div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search" placeholder="Поиск игрока по ID..." oninput="searchUser()">
                <div id="search-results" style="position:absolute; width:100%; background:#111; z-index:10; border-radius:0 0 10px 10px; display:none;"></div>
            </div>
        </div>

        <div class="container" id="screen"></div>

        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins')">БИРЖА</button>
            <button class="n-btn" onclick="tab('nfts')">NFT</button>
            <button class="n-btn" onclick="tab('inv')">СКЛАД</button>
            <button class="n-btn" onclick="tab('me')">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);

const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';
let user = null;
const IMAGE_URL = "photo_2026-04-29_23-50-11"; // Твое фото

async function login() {
    const c = document.getElementById('cid').value, p = document.getElementById('pin').value;
    if(!c || !p) return;

    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(user.pin !== p) return alert("Неверный PIN");
        } else {
            // Создание если нет
            user = await db.createDocument(DB_ID, USERS, ID.unique(), {
                personalCode: c, pin: p, balance: 50000, 
                publicID: "ID" + Math.floor(100000 + Math.random() * 899999)
            });
        }
        // Фикс undefined ID: если в базе пусто, ставим дефолт
        if(!user.publicID) user.publicID = "ID" + Math.floor(100000 + Math.random() * 899999);
        
        showApp();
    } catch(e) {
        alert("Ошибка Appwrite. Вход в оффлайн режиме.");
        user = { publicID: "OFFLINE-" + c, balance: 50000, $id: "local" };
        showApp();
    }
}

function showApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('pub-id').innerText = user.publicID;
    updateUI();
    tab('coins');
}

function updateUI() { document.getElementById('bal').innerText = user.balance.toLocaleString(); }

function tab(t) {
    const screen = document.getElementById('screen');
    screen.innerHTML = `<h2 style="color:var(--green); text-transform:uppercase;">${t}</h2>`;
    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
    
    if(t === 'coins') renderCoins();
    if(t === 'nfts') renderNFTs();
    if(t === 'inv') renderInventory();
    if(t === 'me') renderProfile();
}

function renderCoins() {
    const screen = document.getElementById('screen');
    for(let i=1; i<=15; i++) {
        let price = (i * 3000) + Math.floor(Math.random() * 1000);
        screen.innerHTML += `
            <div class="item">
                <div class="img-box"><img src="${IMAGE_URL}"></div>
                <div style="flex:1"><b>КивиКоин #${i}</b><br><small>${price} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('Коин #${i}', ${price})">КУПИТЬ</button>
            </div>`;
    }
}

function renderNFTs() {
    const screen = document.getElementById('screen');
    for(let i=1; i<=100; i++) {
        let price = 2000 + (i * 950);
        screen.innerHTML += `
            <div class="item">
                <div class="img-box"><img src="${IMAGE_URL}"></div>
                <div style="flex:1"><b>KIWI NFT #${i}</b><br><small>${price} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('NFT #${i}', ${price})">ВЗЯТЬ</button>
            </div>`;
    }
}

async function buyAsset(name, price) {
    if(user.balance < price) return alert("Не хватает денег!");
    user.balance -= price;
    updateUI();

    try {
        if(user.$id !== "local") {
            await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
            await db.createDocument(DB_ID, MARKET, ID.unique(), {
                name: name, price: price, ownerId: user.$id, image: IMAGE_URL
            });
        }
        alert("Успешно куплено: " + name);
    } catch(e) { alert("Ошибка сохранения покупки"); }
}

async function renderInventory() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
        if(res.documents.length === 0) screen.innerHTML += "<p>Тут пока пусто...</p>";
        res.documents.forEach(doc => {
            screen.innerHTML += `
                <div class="item">
                    <div class="img-box"><img src="${doc.image || IMAGE_URL}"></div>
                    <div style="flex:1"><b>${doc.name}</b></div>
                    <button class="btn sell" onclick="sellItem('${doc.$id}', ${doc.price})">💰</button>
                    <button class="btn gift" onclick="giftItem('${doc.$id}', '${doc.name}')">🎁</button>
                </div>`;
        });
    } catch(e) { screen.innerHTML += "<p>Ошибка загрузки склада</p>"; }
}

async function sellItem(id, price) {
    user.balance += Math.floor(price * 0.85);
    updateUI();
    try {
        await db.deleteDocument(DB_ID, MARKET, id);
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
        tab('inv');
    } catch(e) {}
}

async function giftItem(id, name) {
    const target = prompt("Кому подарить? Введи PUBLIC ID (например ID123456):");
    if(!target) return;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('publicID', target)]);
        if(res.documents.length === 0) return alert("Игрок не найден");
        const friend = res.documents[0];
        await db.updateDocument(DB_ID, MARKET, id, { ownerId: friend.$id });
        alert("Подарок '" + name + "' отправлен игроку " + target);
        tab('inv');
    } catch(e) { alert("Ошибка передачи"); }
}

async function searchUser() {
    const q = document.getElementById('search').value, resDiv = document.getElementById('search-results');
    if(q.length < 3) { resDiv.style.display = 'none'; return; }
    const r = await db.listDocuments(DB_ID, USERS, [Query.startsWith('publicID', q)]);
    resDiv.innerHTML = '';
    if(r.documents.length > 0) {
        resDiv.style.display = 'block';
        r.documents.forEach(u => {
            const d = document.createElement('div');
            d.style.padding = '10px'; d.style.borderBottom = '1px solid #222';
            d.innerText = "🔍 " + u.publicID;
            d.onclick = () => alert("Это игрок: " + u.publicID + "\nБаланс: " + u.balance + " ₽");
            resDiv.appendChild(d);
        });
    }
}

function renderProfile() {
    const screen = document.getElementById('screen');
    screen.innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #222;">
            <p>МОЙ ПУБЛИЧНЫЙ ID: <br><b style="color:var(--green); font-size:1.5em;">${user.publicID}</b></p>
            <p>БАЛАНС: ${user.balance} ₽</p>
            <p>CID КАРТЫ: ${user.personalCode}</p>
        </div>
    `;
}
</script>
</body>
</html>
