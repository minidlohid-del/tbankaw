<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | MAX VERSION</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --main-green: #00ff00; --bg-dark: #000; --card-bg: #111; --red: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }
        
        .list-item { display: flex; align-items: center; background: var(--card-bg); margin-bottom: 8px; padding: 12px; border-radius: 12px; border: 1px solid #222; }
        .circle-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid var(--main-green); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 100; }
        .nav-btn { background: none; border: none; color: #555; font-size: 0.7em; cursor: pointer; font-weight: bold; }
        .nav-btn.active { color: var(--main-green); }

        .action-btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-buy { background: var(--main-green); color: black; }
        
        /* Сетка для 1000 NFT */
        .nft-scroll-area { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen" style="position:fixed; inset:0; background:#000; z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--main-green)">KIWI ELITE</h1>
        <input type="text" id="user-code" placeholder="CID КАРТЫ" style="padding:14px; margin:10px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;">
        <input type="password" id="user-pin" placeholder="PIN-КОД" style="padding:14px; margin:10px; width:260px; background:#111; border:1px solid #333; color:white; border-radius:8px; text-align:center;">
        <button class="action-btn btn-buy" style="width:290px" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div style="font-size: 0.9em; opacity: 0.7;">ID: <span id="my-public-id">...</span></div>
            <div style="color:var(--main-green); font-weight:bold;"><span id="header-balance">0</span> ₽</div>
        </div>

        <div class="container" id="content-area"></div>

        <nav class="bottom-nav">
            <div class="nav-btn active" onclick="showTab('crypto')">Биржа</div>
            <div class="nav-btn" onclick="showTab('nft')">Рынок NFT</div>
            <div class="nav-btn" onclick="showTab('inventory')">Склад</div>
            <div class="nav-btn" onclick="showTab('profile')">Профиль</div>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

const DB_ID = 'bank_db';
const COLL_USERS = 'users';
const COLL_MARKET = 'market';

let currentUser = null;

// Названия для 15 монеток
const coinNames = ["Kiwi-1", "Kiwi-2", "Kiwi-3", "Kiwi-4", "Kiwi-5", "Kiwi-6", "Kiwi-7", "Kiwi-8", "Kiwi-9", "Kiwi-10", "Kiwi-11", "Kiwi-12", "Kiwi-13", "Kiwi-14", "Kiwi-15"];

async function login() {
    const cid = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;
    if(!cid || !pin) return;

    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', cid)]);
        if(res.documents.length > 0) {
            const user = res.documents[0];
            if(user.pin === pin) {
                currentUser = user;
                startApp();
            } else { alert("Неверный PIN"); }
        } else {
            const randomID = Math.floor(100000 + Math.random() * 900000);
            const newUser = await databases.createDocument(DB_ID, COLL_USERS, ID.unique(), {
                personalCode: cid,
                pin: pin,
                balance: 50000,
                publicID: String(randomID)
            });
            currentUser = newUser;
            startApp();
        }
    } catch(e) { alert("Ошибка входа"); }
}

function startApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('my-public-id').innerText = currentUser.publicID;
    updateUI();
    showTab('crypto');
}

function updateUI() {
    document.getElementById('header-balance').innerText = currentUser.balance.toLocaleString();
}

function showTab(tab) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const container = document.getElementById('content-area');
    container.innerHTML = `<h2 style="color:var(--main-green); margin-bottom:20px;">${tab.toUpperCase()}</h2>`;
    
    if(tab === 'crypto') renderCrypto();
    if(tab === 'nft') renderNFTMarket();
    if(tab === 'profile') renderProfile();
}

// 15 монеток по возрастанию
function renderCrypto() {
    const container = document.getElementById('content-area');
    coinNames.forEach((name, index) => {
        const price = (index + 1) * 1500;
        container.innerHTML += `
            <div class="list-item">
                <div style="flex-grow:1"><b>${name}</b></div>
                <div style="margin-right:15px">${price} ₽</div>
                <button class="action-btn btn-buy" onclick="buyAsset(${price})">КУПИТЬ</button>
            </div>`;
    });
}

// Покупка активов
async function buyAsset(price) {
    if(currentUser.balance < price) return alert("Недостаточно средств!");
    try {
        const newBalance = currentUser.balance - price;
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: newBalance });
        currentUser.balance = newBalance;
        updateUI();
        alert("Покупка успешна!");
    } catch(e) { alert("Ошибка транзакции"); }
}

// 1000 NFT по возрастанию цены
function renderNFTMarket() {
    const container = document.getElementById('content-area');
    const list = document.createElement('div');
    list.className = 'nft-scroll-area';
    
    // Генерируем 1000 позиций (в реальности лучше грузить из базы, но тут спавним для вида)
    for(let i = 1; i <= 1000; i++) {
        const price = Math.floor(2000 + (i * (98000 / 1000)));
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
            <img src="photo_2026-04-29_23-50-11" class="circle-img">
            <div style="flex-grow:1"><b>KIWI NFT #${i}</b></div>
            <div style="margin-right:10px; font-weight:bold; color:var(--main-green)">${price} ₽</div>
            <button class="action-btn btn-buy" style="padding:5px 10px" onclick="buyAsset(${price})">ВЗЯТЬ</button>
        `;
        list.appendChild(item);
    }
    container.appendChild(list);
}

function renderProfile() {
    const container = document.getElementById('content-area');
    container.innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #222;">
            <p style="opacity:0.5; margin:0">ВАШ ПУБЛИЧНЫЙ ID:</p>
            <h2 style="color:var(--main-green); margin:10px 0">${currentUser.publicID}</h2>
            <hr style="border:0; border-top:1px solid #222; margin:15px 0">
            <p>CID КАРТЫ: ${currentUser.personalCode}</p>
            <p>БАЛАНС: ${currentUser.balance} ₽</p>
        </div>
    `;
}
</script>
</body>
</html>
