<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | DUAL BALANCE SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --green: #00ff00; --bg: #000; --card: #111; --red: #ff3333; --blue: #3399ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { padding: 10px 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .search-container { width: 100%; position: relative; margin-top: 10px; }
        .search-input { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box; }
        #search-results { position: absolute; width: 100%; background: #151515; z-index: 1000; border-radius: 0 0 10px 10px; display: none; border: 1px solid var(--green); max-height: 200px; overflow-y: auto; }
        .search-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .container { padding: 15px; }
        .item { display: flex; align-items: center; background: var(--card); margin-bottom: 10px; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        .img-box { width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; overflow: hidden; border: 1px solid var(--green); flex-shrink: 0; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; z-index: 100; }
        .n-btn { background: none; border: none; color: #555; font-size: 0.7em; font-weight: bold; cursor: pointer; }
        .n-btn.active { color: var(--green); }
        .btn { padding: 8px 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .buy { background: var(--green); color: black; }
        .sell { background: var(--red); color: white; }
        .withdraw-btn { background: var(--blue); color: white; width: 100%; margin-top: 10px; padding: 15px; }
        .work-zone { text-align: center; padding: 20px; }
        .mine-btn { width: 150px; height: 150px; border-radius: 50%; border: 5px solid var(--green); background: none; color: var(--green); font-size: 1.5em; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #loader { width: 100%; height: 10px; background: #111; border-radius: 5px; margin: 20px 0; display: none; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: var(--green); transition: 0.3s; }
        .balance-info { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--green)">KIWI ELITE</h1>
        <input type="text" id="cid" placeholder="ЦИФРЫ КАРТЫ" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <input type="password" id="pin" placeholder="PIN" style="padding:15px; margin:5px; width:270px; background:#111; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <button class="btn buy" style="width:300px; margin-top:15px" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="app" style="display:none;">
        <div class="header">
            <div class="row">
                <div style="font-size: 0.9em; opacity: 0.8;">ID: <span id="pub-id" style="color:var(--green);">...</span></div>
                <div style="text-align: right;">
                    <div style="color:var(--green); font-weight:bold; font-size:1.1em;"><span id="bal-main">0</span> ₽ (БАНК)</div>
                    <div style="color:var(--blue); font-size:0.9em;"><span id="bal-market">0</span> ₽ (МАРКЕТ)</div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="search-input" placeholder="Поиск игроков..." oninput="liveSearch()">
                <div id="search-results"></div>
            </div>
        </div>

        <div class="container" id="screen"></div>

        <nav class="nav">
            <button class="n-btn active" onclick="tab('coins')">БИРЖА</button>
            <button class="n-btn" onclick="tab('nfts')">МАРКЕТ</button>
            <button class="n-btn" onclick="tab('work')">РАБОТА</button>
            <button class="n-btn" onclick="tab('inv')">ИНВЕНТАРЬ</button>
            <button class="n-btn" onclick="tab('me')">ПРОФИЛЬ</button>
        </nav>
    </div>

<script>
const { Client, Databases, Query, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const db = new Databases(client);
const DB_ID = 'bank_db', USERS = 'users', MARKET = 'market';

let user = null;
let clicks = 0;
let marketBalance = 0; // Временный баланс для сессии, в идеале добавить поле в БД 'marketBalance'

async function login() {
    const c = String(document.getElementById('cid').value), p = String(document.getElementById('pin').value);
    if(!c || !p) return;
    try {
        const res = await db.listDocuments(DB_ID, USERS, [Query.equal('personalCode', c)]);
        if(res.documents.length > 0) {
            user = res.documents[0];
            if(String(user.pin) !== p) return alert("Неверный PIN");
            // Инициализируем баланс маркета из базы, если такого поля нет - будет 0
            marketBalance = user.marketBalance || 0;
        } else {
            const genID = "ID" + Math.floor(100000 + Math.random() * 899999);
            user = await db.createDocument(DB_ID, USERS, ID.unique(), { 
                personalCode: c, pin: p, balance: 1000, publicID: genID, marketBalance: 0 
            });
            marketBalance = 0;
        }
        startApp();
    } catch(e) { alert("Ошибка входа"); }
}

function startApp() {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('pub-id').innerText = user.publicID;
    updateUI();
    tab('coins');
}

function updateUI() { 
    document.getElementById('bal-main').innerText = Math.floor(user.balance).toLocaleString(); 
    document.getElementById('bal-market').innerText = Math.floor(marketBalance).toLocaleString(); 
}

// ВЫВОД СРЕДСТВ
async function withdraw() {
    if(marketBalance < 50) return alert("Минимальный вывод от 50 ₽");
    const fee = 15;
    const amount = marketBalance;
    const toDeposit = amount - fee;
    
    if(confirm(`Вывести ${amount} ₽?\nКомиссия: ${fee} ₽\nНа счет поступит: ${toDeposit} ₽`)) {
        user.balance += toDeposit;
        marketBalance = 0;
        updateUI();
        try {
            await db.updateDocument(DB_ID, USERS, user.$id, { 
                balance: user.balance, 
                marketBalance: 0 
            });
            alert("Средства переведены в банк!");
            tab('me');
        } catch(e) { alert("Ошибка транзакции"); }
    }
}

async function tab(t) {
    const screen = document.getElementById('screen');
    screen.innerHTML = `<h2 style="color:var(--green);">${t.toUpperCase()}</h2>`;
    document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
    
    if(t === 'coins') renderMarket('Coin', 8);
    if(t === 'nfts') renderNFTs();
    if(t === 'work') renderWork();
    if(t === 'inv') renderInventory();
    if(t === 'me') renderProfile();
}

function renderWork() {
    const screen = document.getElementById('screen');
    screen.innerHTML += `
        <div class="work-zone" id="work-ui">
            <div class="balance-info" style="color:var(--blue)">Баланс работы: ${marketBalance} ₽</div>
            <button class="btn buy" style="width:200px; padding:20px" onclick="startLoading()">НАЧАТЬ РАБОТАТЬ</button>
            <div id="loader"><div id="progress"></div></div>
        </div>`;
}

function startLoading() {
    const loader = document.getElementById('loader');
    const prog = document.getElementById('progress');
    loader.style.display = 'block';
    let w = 0;
    const interval = setInterval(() => {
        w += 20;
        prog.style.width = w + '%';
        if(w >= 100) { clearInterval(interval); showMiningUI(); }
    }, 200);
}

function showMiningUI() {
    const workUI = document.getElementById('work-ui');
    workUI.innerHTML = `
        <h1 id="click-count" style="color:var(--green); font-size:3em; margin:0;">0</h1>
        <button class="mine-btn" onclick="mine()">МАЙНИТЬ</button>
        <p style="margin-top:20px; font-size:0.8em; color:gray;">10 кликов = +30₽ на МАРКЕТ</p>
    `;
}

async function mine() {
    clicks++;
    document.getElementById('click-count').innerText = clicks;
    if(clicks % 10 === 0) {
        marketBalance += 30;
        updateUI();
        await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: marketBalance });
    }
    if(clicks % 15 === 0) {
        await db.createDocument(DB_ID, MARKET, ID.unique(), {
            name: "Дешевый Киви", price: 40, ownerId: user.$id, image: "photo_2026-04-29_23-50-11.jpg"
        });
    }
}

async function sellItem(id, p) {
    const earn = Math.floor(p * 0.8);
    marketBalance += earn; // Деньги с продажи идут на баланс маркета
    updateUI();
    try {
        await db.deleteDocument(DB_ID, MARKET, id);
        await db.updateDocument(DB_ID, USERS, user.$id, { marketBalance: marketBalance });
        tab('inv');
    } catch(e) {}
}

async function buyAsset(name, price, img) {
    if(user.balance < price) return alert("Недостаточно денег в БАНКЕ!");
    user.balance -= price; // Покупка ВСЕГДА с основного счета
    updateUI();
    try {
        await db.createDocument(DB_ID, MARKET, ID.unique(), { name: name, price: price, ownerId: user.$id, image: img });
        await db.updateDocument(DB_ID, USERS, user.$id, { balance: user.balance });
        alert("Куплено!");
    } catch(e) {}
}

function renderProfile() {
    document.getElementById('screen').innerHTML += `
        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #222; text-align:center;">
            <p style="color:gray; font-size:0.8em;">ID: ${user.publicID}</p>
            <div style="margin:20px 0;">
                <div style="font-size:1.2em;">БАНК: <b style="color:var(--green)">${user.balance} ₽</b></div>
                <div style="font-size:1.2em;">МАРКЕТ: <b style="color:var(--blue)">${marketBalance} ₽</b></div>
            </div>
            <button class="btn withdraw-btn" onclick="withdraw()">ВЫВЕСТИ В БАНК (Комиссия 15₽)</button>
        </div>`;
}

// Остальные функции (renderNFTs, renderInventory, liveSearch, renderMarket) остаются без изменений
async function renderInventory() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.equal('ownerId', user.$id)]);
        if(res.documents.length === 0) screen.innerHTML += "<p>Пусто</p>";
        res.documents.forEach(doc => {
            screen.innerHTML += `
                <div class="item">
                    <div class="img-box"><img src="${doc.image}"></div>
                    <div style="flex:1"><b>${doc.name}</b></div>
                    <button class="btn sell" onclick="sellItem('${doc.$id}', ${doc.price})">💸 ПРОДАТЬ</button>
                </div>`;
        });
    } catch(e) {}
}

async function renderNFTs() {
    const screen = document.getElementById('screen');
    try {
        const res = await db.listDocuments(DB_ID, MARKET, [Query.limit(20)]);
        res.documents.forEach(doc => {
            screen.innerHTML += `
                <div class="item">
                    <div class="img-box"><img src="${doc.image}" onerror="this.src='https://via.placeholder.com/55?text=NFT'"></div>
                    <div style="flex:1"><b>${doc.name}</b><br><small>${doc.price} ₽</small></div>
                    <button class="btn buy" onclick="buyAsset('${doc.name}', ${doc.price}, '${doc.image}')">КУПИТЬ</button>
                </div>`;
        });
    } catch(e) {}
}

function renderMarket(type, count) {
    const screen = document.getElementById('screen');
    for(let i=1; i<=count; i++) {
        let p = (i * 2000);
        screen.innerHTML += `
            <div class="item">
                <div class="img-box"><img src="photo_2026-04-29_23-50-11.jpg"></div>
                <div style="flex:1"><b>${type} v${i}</b><br><small>${p} ₽</small></div>
                <button class="btn buy" onclick="buyAsset('${type} v${i}', ${p}, 'photo_2026-04-29_23-50-11.jpg')">КУПИТЬ</button>
            </div>`;
    }
}

async function liveSearch() {
    const val = document.getElementById('search-input').value.trim();
    const resDiv = document.getElementById('search-results');
    if(val.length < 2) { resDiv.style.display = 'none'; return; }
    try {
        const query = val.startsWith('ID') ? val : "ID" + val;
        const r = await db.listDocuments(DB_ID, USERS, [Query.startsWith('publicID', query)]);
        resDiv.innerHTML = '';
        if(r.documents.length > 0) {
            resDiv.style.display = 'block';
            r.documents.forEach(u => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `👤 ${u.publicID}`;
                item.onclick = () => alert(`Игрок: ${u.publicID}\nБанк: ${u.balance} ₽`);
                resDiv.appendChild(item);
            });
        }
    } catch(e) {}
}
</script>
</body>
</html>
