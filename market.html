<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIWI ELITE | FINAL UPDATE</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
    <style>
        :root { --main-green: #00ff00; --bg-dark: #000; --card-bg: #111; --red: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: white; margin: 0; padding-bottom: 80px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #080808; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .search-container { position: relative; }
        .search-box input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px 12px; border-radius: 20px; width: 140px; }
        
        /* Выпадающий список поиска */
        #search-results { position: absolute; top: 45px; left: 0; width: 200px; background: #111; border: 1px solid var(--main-green); border-radius: 10px; display: none; max-height: 200px; overflow-y: auto; z-index: 101; }
        .search-item { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; font-size: 0.9em; }
        .search-item:hover { background: #222; color: var(--main-green); }

        .container { padding: 15px; }
        .list-item { display: flex; align-items: center; background: var(--card-bg); margin-bottom: 10px; padding: 12px; border-radius: 12px; border: 1px solid #222; }
        .circle-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 1px solid var(--main-green); }
        .item-info { flex-grow: 1; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-btn { background: none; border: none; color: #555; font-size: 0.75em; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-btn.active { color: var(--main-green); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.98); display: none; flex-direction: column; align-items: center; padding-top: 40px; z-index: 200; }
        .action-btn { padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-buy { background: var(--main-green); color: black; }
        .btn-sell { background: var(--red); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" style="position:fixed; inset:0; background:#000; z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--main-green)">KIWI ELITE</h1>
        <input type="text" id="user-code" placeholder="ID" style="padding:12px; margin:10px; width:250px;">
        <input type="password" id="user-pin" placeholder="PIN" style="padding:12px; margin:10px; width:250px;">
        <button class="action-btn btn-buy" style="width:275px" onclick="login()">ВОЙТИ</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="header">
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search-user" placeholder="Поиск @id..." oninput="liveSearch()">
                </div>
                <div id="search-results"></div>
            </div>
            <div style="color:var(--main-green); font-weight:bold;"><span id="header-balance">0</span> ₽</div>
        </div>

        <div class="container" id="content-area"></div>

        <nav class="bottom-nav">
            <div class="nav-btn active" onclick="showTab('crypto')">Биржа</div>
            <div class="nav-btn" onclick="showTab('nft')">NFT</div>
            <div class="nav-btn" onclick="showTab('inventory')">Инвентарь</div>
            <div class="nav-btn" onclick="showTab('profile')">Профиль</div>
        </nav>
    </div>

    <!-- Модалка для чужого профиля -->
    <div id="user-modal" class="modal">
        <button onclick="closeUserModal()" style="position:absolute; right:20px; top:20px; background:none; border:none; color:white; font-size:2em;">&times;</button>
        <div id="user-profile-data" style="text-align:center; margin-top:50px;"></div>
    </div>

<script>
const { Client, Databases, Query } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('69f223f4002d7c30c1b9');
const databases = new Databases(client);

const DB_ID = 'bank_db';
const COLL_USERS = 'users';
const COLL_MARKET = 'market';

let currentUser = null;

async function login() {
    const code = document.getElementById('user-code').value;
    const pin = document.getElementById('user-pin').value;
    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', code), Query.equal('pin', pin)]);
        if(res.documents.length > 0) {
            currentUser = res.documents[0];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('header-balance').innerText = currentUser.balance.toLocaleString();
            showTab('crypto');
        } else { alert("Ошибка!"); }
    } catch(e) { alert("Ошибка сети"); }
}

// ЖИВОЙ ПОИСК
async function liveSearch() {
    const val = document.getElementById('search-user').value.replace('@', '');
    const resBox = document.getElementById('search-results');
    if(val.length < 1) { resBox.style.display = 'none'; return; }

    try {
        const res = await databases.listDocuments(DB_ID, COLL_USERS, [Query.startsWith('personalCode', val)]);
        resBox.innerHTML = '';
        if(res.documents.length > 0) {
            resBox.style.display = 'block';
            res.documents.forEach(user => {
                const d = document.createElement('div');
                d.className = 'search-item';
                d.innerText = '@' + user.personalCode;
                d.onclick = () => showUserProfile(user);
                resBox.appendChild(d);
            });
        } else { resBox.style.display = 'none'; }
    } catch(e) {}
}

async function showUserProfile(user) {
    document.getElementById('search-results').style.display = 'none';
    const modal = document.getElementById('user-modal');
    const dataBox = document.getElementById('user-profile-data');
    modal.style.display = 'flex';
    
    // Считаем сколько у него NFT
    const nftRes = await databases.listDocuments(DB_ID, COLL_MARKET, [Query.equal('ownerId', user.$id)]);
    
    dataBox.innerHTML = `
        <div style="width:100px; height:100px; background:var(--main-green); border-radius:50%; margin: 0 auto 20px; display:flex; align-items:center; justify-content:center; color:black; font-size:2em; font-weight:bold;">
            ${user.personalCode[0]}
        </div>
        <h2 style="color:var(--main-green)">@${user.personalCode}</h2>
        <p>NFT КИВИ В ВЛАДЕНИИ: <b style="font-size:1.5em">${nftRes.documents.length}</b></p>
        <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
        <p style="opacity:0.5; font-size:0.8em">Монетки скрыты настройками приватности</p>
    `;
}

function closeUserModal() { document.getElementById('user-modal').style.display = 'none'; }

function showTab(tab) {
    const container = document.getElementById('content-area');
    container.innerHTML = `<h2 style="color:var(--main-green)">${tab.toUpperCase()}</h2>`;
    
    if(tab === 'inventory') renderInventory();
    if(tab === 'crypto') container.innerHTML += "<p>Биржа монет загружается...</p>"; // Тут твоя прошлая логика монет
    if(tab === 'nft') container.innerHTML += "<p>NFT загружаются...</p>"; // Тут твоя прошлая логика NFT
}

async function renderInventory() {
    const container = document.getElementById('content-area');
    try {
        const res = await databases.listDocuments(DB_ID, COLL_MARKET, [Query.equal('ownerId', currentUser.$id)]);
        if(res.documents.length === 0) { container.innerHTML += "<p>Инвентарь пуст</p>"; return; }
        
        res.documents.forEach(nft => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.style.flexDirection = 'column';
            div.innerHTML = `
                <div style="display:flex; width:100%; align-items:center;">
                    <img src="${nft.image}" class="circle-img">
                    <b>${nft.name}</b>
                </div>
                <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
                    <button class="action-btn btn-sell" onclick="processSale('${nft.$id}', ${nft.price})">ПРОДАТЬ</button>
                    <button class="action-btn" style="background:#444; color:white;" onclick="processGift('${nft.$id}')">ПОДАРИТЬ</button>
                </div>
            `;
            container.appendChild(div);
        });
    } catch(e) {}
}

// РЕАЛЬНОЕ ДАРЕНИЕ (Исчезает из инвентаря)
async function processGift(nftId) {
    const targetCode = prompt("Введите ID получателя:");
    if(!targetCode) return;

    try {
        const userRes = await databases.listDocuments(DB_ID, COLL_USERS, [Query.equal('personalCode', targetCode.replace('@', ''))]);
        if(userRes.documents.length === 0) { alert("ID не найден!"); return; }
        
        const friendId = userRes.documents[0].$id;
        // Обновляем владельца в базе
        await databases.updateDocument(DB_ID, COLL_MARKET, nftId, { ownerId: friendId });
        
        alert("Подарок отправлен!");
        showTab('inventory'); // Перезагружаем вкладку, предмет исчезнет
    } catch(e) { alert("Ошибка передачи"); }
}

// РЕАЛЬНАЯ ПРОДАЖА (Исчезает из инвентаря)
async function processSale(nftId, price) {
    if(!confirm("Продать этот NFT за " + price + " ₽?")) return;

    try {
        // 1. Начисляем деньги игроку
        const newBalance = currentUser.balance + price;
        await databases.updateDocument(DB_ID, COLL_USERS, currentUser.$id, { balance: newBalance });
        currentUser.balance = newBalance;
        document.getElementById('header-balance').innerText = newBalance.toLocaleString();

        // 2. Убираем владельца у NFT (делаем его снова доступным в магазине)
        await databases.updateDocument(DB_ID, COLL_MARKET, nftId, { ownerId: "" });

        alert("Продано!");
        showTab('inventory'); // Перезагружаем вкладку
    } catch(e) { alert("Ошибка продажи"); }
}
</script>
</body>
</html>
