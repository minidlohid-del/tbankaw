<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T-Bank Private Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: black; color: white; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        .t-card-gradient { background: linear-gradient(135deg, #27272a 0%, #000000 100%); border: 1px solid rgba(255, 255, 255, 0.1); }
        .t-yellow-shadow { box-shadow: 0 10px 25px -5px rgba(250, 204, 21, 0.4); }
        .hidden { display: none !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app" class="h-screen w-full relative">
        
        <!-- ЭКРАН ВХОДА И РЕГИСТРАЦИИ -->
        <div id="auth-screen" class="flex flex-col h-full p-8 justify-center items-center max-w-md mx-auto animate-fade">
            <div class="w-24 h-24 bg-yellow-400 rounded-[2rem] mb-8 flex items-center justify-center t-yellow-shadow rotate-3">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            
            <h1 id="auth-title" class="text-4xl font-black italic text-yellow-400 mb-2 tracking-tighter uppercase">T-BANK</h1>
            <p id="total-users" class="text-zinc-600 text-[10px] uppercase tracking-[0.3em] mb-12 font-bold italic">Загрузка сети...</p>
            
            <div class="w-full space-y-4">
                <div id="reg-fields" class="space-y-4">
                    <input id="reg-name" type="text" placeholder="Имя и Фамилия" class="w-full bg-zinc-900/80 p-5 rounded-2xl border border-white/5 outline-none focus:border-yellow-400/50 transition-all">
                </div>
                
                <div id="login-fields" class="hidden space-y-4">
                    <input id="login-pcode" type="text" placeholder="Личный код (3 цифры)" class="w-full bg-zinc-900/80 p-5 rounded-2xl border border-white/5 outline-none text-center text-xl font-bold tracking-widest" maxlength="3">
                </div>

                <input id="auth-pin" type="password" placeholder="ПИН-код" class="w-full bg-zinc-900/80 p-5 rounded-2xl border border-white/5 outline-none text-center text-xl font-bold tracking-[0.5em]" maxlength="4">
                
                <button onclick="submitAuth()" id="auth-btn" class="w-full bg-yellow-400 text-black font-black py-5 rounded-2xl t-yellow-shadow uppercase text-lg mt-4 active:scale-95 transition-transform">Открыть счет</button>
                
                <button onclick="toggleAuthMode()" id="toggle-btn" class="w-full text-zinc-500 text-xs font-bold py-4 uppercase tracking-widest">Уже есть счет? Войти</button>
            </div>
        </div>

        <!-- ГЛАВНЫЙ ИНТЕРФЕЙС БАНКА -->
        <div id="main-screen" class="hidden max-w-md mx-auto flex flex-col h-full animate-fade">
            <header class="p-6 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-12 h-12 rounded-2xl bg-yellow-400 flex items-center justify-center font-black text-black text-2xl italic shadow-lg shadow-yellow-400/20"></div>
                    <div>
                        <p id="user-name-top" class="font-black italic text-white leading-tight uppercase text-sm"></p>
                        <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">Premium Client</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-zinc-900 p-3 rounded-xl border border-white/5 active:scale-90 transition-all">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9"/></svg>
                </button>
            </header>

            <main class="flex-1 px-6 overflow-y-auto pb-10">
                <div id="view-main">
                    <div class="t-card-gradient p-8 rounded-[3rem] relative overflow-hidden mb-10 mt-2">
                        <div class="absolute top-0 right-0 p-6 opacity-10 italic font-black text-4xl">T-BANK</div>
                        <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Доступный остаток</p>
                        <h2 id="balance-disp" class="text-5xl font-black italic mb-12 tracking-tighter"></h2>
                        <div class="flex justify-between items-end">
                            <p id="card-disp" class="font-mono text-xs tracking-[0.3em] text-zinc-400"></p>
                            <div class="flex gap-1">
                                <div class="w-6 h-6 rounded-full bg-red-500/80"></div>
                                <div class="w-6 h-6 rounded-full bg-yellow-500/80 -ml-3"></div>
                            </div>
                        </div>
                    </div>

                    <button onclick="showTransfer()" class="w-full bg-white text-black py-6 rounded-[2rem] flex items-center justify-center gap-4 font-black italic shadow-xl active:scale-95 transition-all uppercase mb-12 tracking-tight">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m5 12 7-7 7 7m-7-7v14"/></svg>
                        Перевести
                    </button>

                    <div class="space-y-6">
                        <div class="flex justify-between items-center px-2">
                            <h3 class="font-black italic text-zinc-400 text-xs uppercase tracking-widest">Последние операции</h3>
                            <div class="h-[1px] flex-1 bg-zinc-800 ml-4"></div>
                        </div>
                        <div id="history-list" class="space-y-4"></div>
                    </div>
                </div>

                <!-- ОКНО ПЕРЕВОДА -->
                <div id="view-transfer" class="hidden py-4 animate-fade">
                    <div class="flex items-center gap-4 mb-10">
                        <button onclick="showMainView()" class="p-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="m15 18-6-6 6-6"/></svg></button>
                        <h2 class="text-2xl font-black italic text-yellow-400 uppercase">Новый перевод</h2>
                    </div>
                    
                    <div class="space-y-12">
                        <div class="space-y-4">
                            <p class="text-[10px] text-zinc-500 font-black px-2 uppercase tracking-[0.2em]">Номер телефона получателя</p>
                            <input id="target-phone" type="text" placeholder="+7 999 000 00 00" class="w-full bg-zinc-900/50 p-6 rounded-[2rem] outline-none border border-white/5 text-2xl font-bold tracking-tight focus:border-yellow-400 transition-all">
                        </div>
                        
                        <div class="text-center space-y-4">
                            <p class="text-[10px] text-zinc-500 font-black uppercase tracking-[0.2em]">Сумма перевода</p>
                            <div class="flex items-center justify-center gap-2">
                                <input id="transfer-amount" type="number" placeholder="0" class="bg-transparent text-7xl font-black text-center outline-none text-white w-2/3">
                                <span class="text-4xl font-black italic text-yellow-400">₽</span>
                            </div>
                        </div>

                        <button onclick="processTransfer()" class="w-full bg-yellow-400 text-black py-7 rounded-[2.5rem] font-black t-yellow-shadow text-xl uppercase italic active:scale-95 transition-all">Отправить деньги</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://kbawfxxnydhczyblwagm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6lMskE4Ar4WAZvwLMj-dlg_M2Z5KM3P';
        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = false;
        let currentUser = null;

        // ПОЛУЧЕНИЕ ВСЕХ ЮЗЕРОВ ИЗ БАЗЫ
        async function fetchStats() {
            const { count } = await supabase.from('users').select('*', { count: 'exact', head: true });
            document.getElementById('total-users').innerText = `Сеть: ${count || 0} участников`;
        }
        fetchStats();

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? 'ВХОД' : 'T-BANK';
            document.getElementById('reg-fields').classList.toggle('hidden');
            document.getElementById('login-fields').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isLoginMode ? 'Войти в банк' : 'Открыть счет';
            document.getElementById('toggle-btn').innerText = isLoginMode ? 'Нет аккаунта? Создать' : 'Уже есть счет? Войти';
        }

        async function submitAuth() {
            const pin = document.getElementById('auth-pin').value;
            if (pin.length < 4) return alert("ПИН должен быть 4 цифры");

            if(isLoginMode) {
                const pcode = document.getElementById('login-pcode').value;
                const { data, error } = await supabase.from('users').select('*').eq('pin', pin).eq('personalCode', pcode).single();
                if(data) renderApp(data);
                else alert("Доступ запрещен: проверьте данные");
            } else {
                const name = document.getElementById('reg-name').value;
                if(!name) return alert("Введите имя");
                
                const pCode = Math.floor(100 + Math.random() * 899).toString();
                const phone = "+79" + Math.floor(100000000 + Math.random() * 900000000);
                
                const { data, error } = await supabase.from('users').insert([{
                    name, pin, personalCode: pCode, balance: 25000,
                    phone: phone, card: "4276 0000 " + Math.floor(1000 + Math.random() * 8999), history: []
                }]).select();

                if(data) {
                    alert(`Счет открыт!\n\nВаш телефон: ${phone}\nВаш Личный Код: ${pCode}\n\nЗАПОМНИТЕ КОД ДЛЯ ВХОДА!`);
                    renderApp(data[0]);
                } else alert("Ошибка регистрации в базе");
            }
        }

        function renderApp(user) {
            currentUser = user;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            
            document.getElementById('user-name-top').innerText = user.name;
            document.getElementById('user-avatar').innerText = user.name[0];
            document.getElementById('balance-disp').innerText = user.balance.toLocaleString() + " ₽";
            document.getElementById('card-disp').innerText = user.card;
            
            const list = document.getElementById('history-list');
            list.innerHTML = (user.history && user.history.length) ? '' : '<p class="text-center py-10 text-zinc-700 italic text-sm">История операций пуста</p>';
            
            if(user.history) {
                user.history.forEach(h => {
                    list.innerHTML += `
                    <div class="bg-zinc-900/40 p-5 rounded-3xl flex justify-between items-center border border-white/[0.02]">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-lg">${h.type === 'plus' ? '↓' : '↑'}</div>
                            <div><p class="text-sm font-black italic uppercase">${h.title}</p><p class="text-[10px] text-zinc-600 font-bold">${h.date}</p></div>
                        </div>
                        <span class="font-black italic ${h.type === 'plus' ? 'text-green-500' : 'text-white'}">
                            ${h.type === 'plus' ? '+' : ''}${h.amt.toLocaleString()}
                        </span>
                    </div>`;
                });
            }
        }

        function showTransfer() {
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-transfer').classList.remove('hidden');
        }

        function showMainView() {
            document.getElementById('view-transfer').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
        }

        async function processTransfer() {
            const targetPhone = document.getElementById('target-phone').value.trim();
            const amount = Number(document.getElementById('transfer-amount').value);
            
            if(!targetPhone || amount <= 0) return alert("Введите данные корректно");
            if(amount > currentUser.balance) return alert("Недостаточно средств");

            // Поиск по ВСЕЙ базе
            const { data: target, error } = await supabase.from('users').select('*').eq('phone', targetPhone).single();
            
            if(!target) return alert("Получатель с таким номером не найден в базе T-Bank");
            if(target.id === currentUser.id) return alert("Нельзя переводить самому себе");

            const date = new Date().toLocaleDateString('ru-RU', {day:'numeric', month:'short'});

            // Списываем у нас
            const myNewHistory = [{title: `Перевод: ${target.name}`, amt: -amount, type: 'minus', date}, ...(currentUser.history || [])];
            const { data: updatedMe } = await supabase.from('users').update({ 
                balance: currentUser.balance - amount, 
                history: myNewHistory 
            }).eq('id', currentUser.id).select().single();

            // Зачисляем другу
            const targetNewHistory = [{title: `От: ${currentUser.name}`, amt: amount, type: 'plus', date}, ...(target.history || [])];
            await supabase.from('users').update({ 
                balance: target.balance + amount, 
                history: targetNewHistory 
            }).eq('id', target.id);

            alert("ПЕРЕВОД ВЫПОЛНЕН УСПЕШНО!");
            renderApp(updatedMe);
            showMainView();
        }
    </script>
</body>
</html>
